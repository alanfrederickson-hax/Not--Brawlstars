/* =================================================================================
   CLASSES (Object Oriented Programming)
   While an "Object" (like bluePlayer) is a single, specific item, a "Class" is a BLUEPRINT.
   We want to make 3 menu buttons. Instead of writing the code for a button 3 times,
   we write a "Class" (blueprint) once. 
   Then we just say `new Button(...)` and it builds a fresh object using this blueprint!
   ================================================================================= */


// --- Custom Button Class ---
class Button {
  // 'constructor' is the factory machine. When we say `new Button(arguments)`,
  // the constructor takes those arguments and sets up the new button's internal properties.
  // We use `this.property` to say "THIS specific button's property".
  constructor(id, text, x, y, w, h, baseColor, textColor) {
    this.id = id;
    this.text = text;
    this.x = x;
    this.y = y;
    this.w = w; // Width
    this.h = h; // Height
    this.baseColor = color(baseColor);
    // Here we calculate a slightly darker version of the base color to act as a 3D shadow underneath the button!
    this.shadowColor = color(
      red(this.baseColor) * 0.7,
      green(this.baseColor) * 0.7,
      blue(this.baseColor) * 0.7
    );
    this.textColor = color(textColor);
    this.hover = false; // Is the mouse currently over this button?
    this.scale = 1.0; // The visual size multiplier (used for the pop-out animation)
  }


  // A Method (a function that belongs to a class).
  // update() checks if the mouse coordinates (mx, my) are inside the button's rectangle.
  update(mx, my) {
    // This is a "Bounding Box" collision check. It verifies the mouse is between the left/right and top/bottom edges.
    if (
      mx > this.x - this.w / 2 &&
      mx < this.x + this.w / 2 &&
      my > this.y - this.h / 2 &&
      my < this.y + this.h / 2
    ) {
      this.hover = true;
      // 'lerp' stands for Linear Interpolation. It smoothly transitions a number from point A to point B over time.
      // Here, it smoothly grows the button from size 1.0 to 1.1 when hovered.
      this.scale = lerp(this.scale, 1.1, 0.2);
    } else {
      this.hover = false;
      this.scale = lerp(this.scale, 1.0, 0.2); // Shrink back down if not hovered
    }
  }


  // Handles the visual rendering of the button to the canvas
  draw() {
    push(); // 'push' saves the current drawing settings (like what color paintbrush we are using)
    translate(this.x, this.y); // 'translate' moves the invisible starting point (0,0) of the canvas to the button's center.
    scale(this.scale); // Make everything drawn next slightly bigger based on the hover scale


    // Draw shadow (bottom layer)
    fill(this.shadowColor);
    noStroke();
    rectMode(CENTER);
    rect(0, 8, this.w, this.h, 15); // The '15' makes the corners rounded! We offset Y by 8 to make it look 3D.


    // Draw main button top layer
    fill(this.baseColor);
    stroke(0);
    strokeWeight(4);
    rect(0, 0, this.w, this.h, 15);


    // Draw text
    fill(this.textColor);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(this.h * 0.45);
    text(this.text, 0, -this.h * 0.05); // Offset text slightly up so it's centered perfectly on the 3D button
    pop(); // 'pop' throws away the settings we changed, preventing them from bleeding into other drawings.
  }


  // Returns true or false. We call this when the user physically clicks the mouse.
  isClicked(mx, my) {
    return this.hover; // If we were hovering when we clicked, then yes, it was clicked!
  }
}


// --- Player Class (Lobby visuals only) ---
// This is purely for displaying the large character models floating on the lobby screen.
class Player {
  constructor(id, name, offsetX, col) {
    this.id = id; 
    this.name = name; 
    this.offsetX = offsetX; 
    this.color = color(col);
    this.yOffset = 0; 
  }


  draw() {
    let px = width / 2 + this.offsetX;
    let py = height / 2 + 50 + this.yOffset;


    push();
    // Draw the dark oval shadow on the ground under the character
    fill(0, 0, 0, 100);
    noStroke();
    ellipse(px, height / 2 + 130, 100, 30);


    // Find the loaded image from our brawlerImages dictionary
    let img = brawlerImages[this.name];
    if (img) { // Safety check: Did the image actually load successfully from the internet?
      let aspect = img.width / img.height; // Figure out the original rectangle shape (aspect ratio)
      let drawH = 160; // We force the height to be 160 pixels
      let drawW = drawH * aspect; // And calculate the width based on the aspect ratio so it doesn't look stretched!
      imageMode(CENTER);
      image(img, px, py, drawW, drawH);
    }


    // Draw the character nameplate
    fill(0, 150); // Semi-transparent black
    noStroke();
    rectMode(CORNER);
    // Use textWidth() to make the background box dynamically wrap around short or long names perfectly!
    rect(
      px - textWidth(this.name) / 2 - 10,
      py - 115,
      textWidth(this.name) + 20,
      30,
      5
    );
    fill(255);
    textAlign(CENTER, CENTER);
    textSize(20);
    text(this.name, px, py - 100);
    pop();


    // If this player won the last game, draw a golden crown over their head
    if (lastWinner === this.id) {
      push();
      fill("#f1c40f"); // Hex code for gold
      stroke(0);
      strokeWeight(2);
      
      // beginShape() and vertex() allow us to draw custom polygons by defining the points manually, like connect-the-dots!
      beginShape();
      vertex(px - 20, py - 130); // bottom left corner
      vertex(px - 25, py - 160); // top left spike
      vertex(px - 10, py - 145); // inner left dip
      vertex(px, py - 165);      // top middle spike
      vertex(px + 10, py - 145); // inner right dip
      vertex(px + 25, py - 160); // top right spike
      vertex(px + 20, py - 130); // bottom right corner
      endShape(CLOSE); // CLOSE tells the code to draw a final line connecting the last point back to the first point.
      pop();
    }
  }


  // Runs every frame to update animation logic
  update() {
    // Math.sin() creates an infinite, smooth up-and-down wave. 
    // It oscillates between -1 and 1 over time. By multiplying it by 5, the character floats up and down 5 pixels!
    this.yOffset = sin(frameCount * 0.05 + this.offsetX) * 5;
  }
}

// setup() runs ONCE exactly after preload finishes. It configures the canvas and audio logic.
function setup() {
  // Make the drawing area take up the full browser window (Responsive design!)
  createCanvas(windowWidth, windowHeight);
  textFont(Lilita);


  // --- Cache the Lobby Background to FIX LAG ---
  // createGraphics() creates an invisible, off-screen piece of paper. 
  // We draw the heavy neon rings onto this off-screen paper ONCE.
  // Then, in our draw loop, we just paste that flat image. This saves the computer
  // from having to do hundreds of math calculations 60 times a second!
  bgGraphics = createGraphics(windowWidth, windowHeight);
  renderStaticBackground();


  // --- Load the Audio ---
  // Using HTML5 Audio objects to manage our mp3 files
  lobbyMusic = new Audio("https://files.catbox.moe/re03vh.mp3");
  lobbyMusic.loop = true; 
  lobbyMusic.volume = 0.4; 


  gameMusic = new Audio("https://files.catbox.moe/pswebv.mp3");
  gameMusic.loop = true;
  gameMusic.volume = 0.4;


  // Setup the initial User Interface (UI) buttons and models
  initScene();
}


/* =================================================================================
           GAME INITIALIZATION LOGIC
           These functions reset specific parts of the game (Lobby, Map, Stats).
           We use functions for this so that when a match ends, we can just call them
           again to reset the board without forcing the user to refresh the web page!
           ================================================================================= */


// Sets up the Lobby UI (Character models and Menu Buttons)
function initScene() {
  buttons = []; // Clear any old buttons
  players = []; // Clear any old models
  
  // Create two initial players defaulting to Shelly. 
  // We push them into the array using our `new Player` blueprint (Class) from earlier!
  players.push(new Player("blue", "Shelly", -100, "#3498db"));
  players.push(new Player("red", "Shelly", 100, "#e74c3c"));


  // Calculate proportional sizes for the buttons based on screen width.
  // We use min() so that on huge screens, the button doesn't stretch to be massively distorted.
  let playW = min(width * 0.25, 250);
  let playH = playW * 0.35;
  
  // Push the PLAY button into the array
  buttons.push(
    new Button("play", "PLAY", width - playW / 2 - 40, height - playH / 2 - 40, playW, playH, "#f1c40f", "#ffffff")
  );


  let sideBtnW = min(width * 0.15, 180);
  let sideBtnH = sideBtnW * 0.4;
  // Push the left and right brawler selection buttons
  buttons.push(
    new Button("brawlers_left", "BRAWLERS", sideBtnW / 2 + 20, height / 2, sideBtnW, sideBtnH, "#9b59b6", "#ffffff")
  );
  buttons.push(
    new Button("brawlers_right", "BRAWLERS", width - sideBtnW / 2 - 20, height / 2, sideBtnW, sideBtnH, "#2ecc71", "#ffffff")
  );
}


// Builds the physical walls for the combat arena
function initMap() {
  walls = []; // Empty the array to start fresh
  
  // Each wall is pushed as a simple Javascript Object {x, y, w, h}.
  // We calculate their positions based on `width` and `height` of the screen,
  // which ensures the map scales perfectly to fit any monitor size!
  walls.push({ x: width / 2 - 40, y: height / 2 - 100, w: 80, h: 200 }); // Center block
  walls.push({ x: width / 2 - 150, y: height * 0.15, w: 300, h: 60 });   // Top cover
  walls.push({ x: width / 2 - 150, y: height * 0.85 - 60, w: 300, h: 60 }); // Bottom cover
  walls.push({ x: width * 0.2, y: height * 0.3, w: 60, h: 250 });        // Left cover
  walls.push({ x: width * 0.8 - 60, y: height * 0.4, w: 60, h: 250 });   // Right cover
}


// Triggered when "PLAY" is clicked. It sets up the logic for a full Best-of-3 Match.
function initGame() {
  blueWins = 0; // Reset match score
  redWins = 0; 
  initMap(); // Build the pristine, unbroken map


  // Grab the string (text) of the currently selected brawler from the lobby models
  let p1Name = players[0].name;
  bluePlayer.brawler = p1Name;
  
  // Here is where the BRAWLER_STATS dictionary shines! 
  // We set the player's maxHP to whatever the dictionary says it should be.
  bluePlayer.maxHp = BRAWLER_STATS[p1Name].hp;
  bluePlayer.damage = BRAWLER_STATS[p1Name].damage;
  bluePlayer.superDesc = BRAWLER_STATS[p1Name].superDesc;
  bluePlayer.hits = 0; // Reset their super charge meter


  // Do the exact same setup for the red player
  let p2Name = players[1].name;
  redPlayer.brawler = p2Name;
  redPlayer.maxHp = BRAWLER_STATS[p2Name].hp;
  redPlayer.damage = BRAWLER_STATS[p2Name].damage;
  redPlayer.superDesc = BRAWLER_STATS[p2Name].superDesc;
  redPlayer.hits = 0;


  // Now that the big match stats are loaded, set up the specific data for Round 1
  startNextRound();
}


// Resets positions and health between rounds of a Best-of-3 match.
// It DOES NOT reset the map or the super charge, so those persist (carry over) between rounds!
function startNextRound() {
  // Clear all active attacks from the air from the previous round by emptying the arrays
  projectiles = [];
  smashEffects = [];
  bombs = [];
  puddles = [];
  dougSplashes = [];


  // Reset Blue properties
  bluePlayer.x = width * 0.1; // Spawn on left side (10% of screen width)
  bluePlayer.y = height / 2;  // Spawn in vertical middle
  bluePlayer.hp = bluePlayer.maxHp; // Heal to full
  bluePlayer.cooldown = 0;
  bluePlayer.ammo = 3;        // Full reload
  bluePlayer.reloadTimer = 0;
  bluePlayer.stunTicks = 0;
  bluePlayer.attackWindup = 0;
  bluePlayer.leonShots = 0;
  bluePlayer.edgarShots = 0;
  bluePlayer.lastCombatTime = frameCount; // Set their last fight time to right now so they don't instantly auto-heal
  bluePlayer.dashTicks = 0;
  bluePlayer.jumpTicks = 0;
  bluePlayer.isInvisible = false;
  bluePlayer.invisTicks = 0;
  bluePlayer.hotdogTicks = 0;


  // Reset Red properties
  redPlayer.x = width * 0.9; // Spawn on right side (90% of screen width)
  redPlayer.y = height / 2;
  redPlayer.hp = redPlayer.maxHp;
  redPlayer.cooldown = 0;
  redPlayer.ammo = 3;
  redPlayer.reloadTimer = 0;
  redPlayer.stunTicks = 0;
  redPlayer.attackWindup = 0;
  redPlayer.leonShots = 0;
  redPlayer.edgarShots = 0;
  redPlayer.lastCombatTime = frameCount;
  redPlayer.dashTicks = 0;
  redPlayer.jumpTicks = 0;
  redPlayer.isInvisible = false;
  redPlayer.invisTicks = 0;
  redPlayer.hotdogTicks = 0;
}


/* =================================================================================
           COLLISION & PHYSICS LOGIC
           Functions that calculate whether things are hitting walls or being blocked.
           ================================================================================= */


// Checks if a circular player is colliding with a rectangular wall
function checkWallCollision(px, py, radius) {
  // `for...of` loop: This looks at every item inside the `walls` array one at a time.
  // It temporarily calls the item `w` so we can do math with it.
  for (let w of walls) {
    // Math to find the closest point on the rectangle's edge to the circle's center point.
    // constrain() forces a number to stay within a minimum and maximum range.
    let cx = constrain(px, w.x, w.x + w.w); 
    let cy = constrain(py, w.y, w.y + w.h);
    
    // Calculate distance squared between closest point and circle center using the Pythagorean theorem (A^2 + B^2 = C^2)
    // We compare distance squared against radius squared to save the computer from having to process heavy Square Root math!
    let distSq = (px - cx) * (px - cx) + (py - cy) * (py - cy);
    if (distSq < radius * radius) {
      return true; // We hit a wall!
    }
  }
  return false; // Loop finished and hit nothing
}


// Checks if a single tiny point (like a bullet) is inside a rectangular wall
function checkProjWallCollision(px, py) {
  for (let w of walls) {
    // Standard bounding box check: Is the point between the Left & Right edges AND Top & Bottom edges?
    if (px >= w.x && px <= w.x + w.w && py >= w.y && py <= w.y + w.h) {
      return true;
    }
  }
  return false;
}


// Fixes a bug where jumping brawlers (Piper, Edgar) land inside a wall and get permanently stuck.
function resolveWallStuck(player) {
  let pRad = player.r / 2;
  for (let w of walls) {
    // If the player overlaps the wall rectangle
    if (
      player.x + pRad > w.x &&
      player.x - pRad < w.x + w.w &&
      player.y + pRad > w.y &&
      player.y - pRad < w.y + w.h
    ) {
      // Find the absolute distances from the player to each of the 4 edges of the wall
      let distLeft = Math.abs(player.x + pRad - w.x);
      let distRight = Math.abs(player.x - pRad - (w.x + w.w));
      let distTop = Math.abs(player.y + pRad - w.y);
      let distBottom = Math.abs(player.y - pRad - (w.y + w.h));


      // Find the smallest (minimum) distance out of those 4 options.
      // Then, forcibly teleport (push) the player out via that shortest path!
      let minD = Math.min(distLeft, distRight, distTop, distBottom);
      if (minD === distLeft) player.x = w.x - pRad;
      else if (minD === distRight) player.x = w.x + w.w + pRad;
      else if (minD === distTop) player.y = w.y - pRad;
      else if (minD === distBottom) player.y = w.y + w.h + pRad;
    }
  }
}


/* =================================================================================
           COMBAT & ABILITY LOGIC
           Functions handling attacks, spawning bullets, and applying special abilities.
           ================================================================================= */


// This is the master function called whenever a player presses their attack button.
// It takes 3 arguments: The player who fired (shooter), who they are aiming at (target), and a boolean (isSuper).
function shootProjectile(shooter, target, isSuper = false) {
  // Basic checks: You can't shoot if stunned or if your attack cooldown isn't finished
  if (shooter.cooldown > 0 || shooter.stunTicks > 0) return; // 'return' immediately stops the function from running further


  // 1. Verify resources before doing ANYTHING
  if (isSuper) {
    let requiredHits = BRAWLER_STATS[shooter.brawler].hitsToSuper;
    if (shooter.hits < requiredHits) return; // Haven't hit enough enemies yet
  } else {
    // Regular attack: make sure they have at least 1 ammo
    if (shooter.ammo <= 0) return;
  }


  // 2. Consume resources 
  if (isSuper) {
    shooter.hits = 0; // Spend the super charge back to 0
  } else {
    shooter.ammo--; // Subtract 1 from current ammo
  }


  shooter.lastCombatTime = frameCount; // Updates the timestamp to prevent auto-healing during a fight


  // If Leon attacks, he instantly loses his invisibility (unless he is activating his super right now)
  if (!(shooter.brawler === "Leon" && isSuper)) {
    shooter.isInvisible = false;
    shooter.invisTicks = 0;
  }


  // --- Auto-Aim Targeting Math ---
  let angle;
  if (target.isInvisible) {
    // If the enemy is invisible, auto-aim fails and picks a random direction between 0 and 360 degrees (TWO_PI in radians)
    angle = random(TWO_PI);
  } else {
    // Math.atan2(y, x) is an incredibly useful geometry function.
    // If you give it the distance between two objects, it calculates the exact angle (in radians) needed to point from one to the other!
    angle = atan2(target.y - shooter.y, target.x - shooter.x);
  }


  // ============================================
  // SPECIAL BRAWLER ATTACK LOGIC
  // Some brawlers don't shoot standard flying bullets. We handle them uniquely here.
  // ============================================


  // --- Doug Attack & Super ---
  if (shooter.brawler === "Doug") {
    if (isSuper) {
      shooter.hotdogTicks = 900; // Super gives revive buff for 15 seconds (60 frames per second * 15)
    } else {
      // Doug's main attack instantly heals himself
      shooter.hp = Math.min(shooter.hp + 480, shooter.maxHp);
      
      let aoeRadius = BRAWLER_STATS["Doug"].range / 2;
      // Spawn visual pink circle effect in the dougSplashes array
      dougSplashes.push({
        x: shooter.x,
        y: shooter.y,
        radius: BRAWLER_STATS["Doug"].range,
        life: 15,
      });


      // Deal Area of Effect (AoE) damage immediately to anyone inside the radius using the dist() function
      if (dist(shooter.x, shooter.y, target.x, target.y) < aoeRadius + target.r / 2) {
        target.hp -= shooter.damage;
        shooter.hits++;
        target.lastCombatTime = frameCount;
      }
    }
    shooter.cooldown = shooter.maxCooldown;
    return; // Doug doesn't spawn standard projectiles, so stop the function here
  }


  // --- Barley Super ---
  if (shooter.brawler === "Barley" && isSuper) {
    // Calculate where the center puddle should land
    let cx = shooter.x + cos(angle) * BRAWLER_STATS["Barley"].range;
    let cy = shooter.y + sin(angle) * BRAWLER_STATS["Barley"].range;
    let spacing = 60;


    // Array representing a 5-dot shape pattern (like the face of a dice) using X,Y offsets
    let offsets = [
      [0, 0],
      [-spacing, -spacing],
      [spacing, -spacing],
      [-spacing, spacing],
      [spacing, spacing],
    ];


    // Loop through the offsets and spawn 5 projectiles targeting each specific spot
    for (let off of offsets) {
      let tx = cx + off[0];
      let ty = cy + off[1];
      let tAngle = atan2(ty - shooter.y, tx - shooter.x); // Calculate angle to offset target
      let tDist = dist(shooter.x, shooter.y, tx, ty);     // Calculate distance to offset target


      // Push the data packet (Object) into the projectiles array!
      projectiles.push({
        x: shooter.x,
        y: shooter.y,
        startX: shooter.x,
        startY: shooter.y,
        maxRange: tDist,
        brawlerName: shooter.brawler,
        vx: cos(tAngle) * 12, // Trigonometry: Calculate horizontal velocity based on angle
        vy: sin(tAngle) * 12, // Trigonometry: Calculate vertical velocity based on angle
        damage: shooter.damage,
        owner: shooter.id,
        ignoresWalls: true, // Barley lobs over walls
        isSuper: true,
        active: true,
      });
    }
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }


  // --- Leon Super ---
  if (shooter.brawler === "Leon" && isSuper) {
    shooter.isInvisible = true;
    shooter.invisTicks = 360; // Set timer to 360 frames (6 seconds)
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }


  // --- Piper Super ---
  if (shooter.brawler === "Piper" && isSuper) {
    // To jump AWAY from the target, we take the target angle and add PI.
    // (In radians, PI represents half a circle or 180 degrees!)
    let jumpAngle = angle + PI;
    shooter.jumpTicks = 45; // Jump animation lasts 45 frames 
    let jumpDist = 350;     // Total distance she travels


    // Calculate how fast she must move per frame to travel 350 pixels in 45 frames
    shooter.jumpVx = cos(jumpAngle) * (jumpDist / 45);
    shooter.jumpVy = sin(jumpAngle) * (jumpDist / 45);


    // Drop 4 bombs at takeoff location arranged in a square
    let offsets = [
      [-15, -15],
      [15, -15],
      [-15, 15],
      [15, 15],
    ];
    for (let off of offsets) {
      bombs.push({
        x: shooter.x + off[0],
        y: shooter.y + off[1],
        ticks: 60, // Fuse timer is 60 frames (1 second)
        damage: 1800, 
        owner: shooter.id,
      });
    }
    shooter.cooldown = shooter.maxCooldown;
    return;
  }


  // --- Edgar Super ---
  if (shooter.brawler === "Edgar" && isSuper) {
    let jumpAngle = angle;
    shooter.jumpTicks = 45;
    
    // Jump TOWARDS enemy. Capped at max 400 distance. 
    // Using Math.min ensures he doesn't overshoot if the enemy is really close.
    // A ternary operator `Condition ? TrueOutput : FalseOutput` is used here.
    // If enemy is invisible, he blindly jumps 300 pixels forward instead of tracking them.
    let jumpDist = target.isInvisible
      ? 300
      : Math.min(400, dist(shooter.x, shooter.y, target.x, target.y));
    shooter.jumpVx = cos(jumpAngle) * (jumpDist / 45);
    shooter.jumpVy = sin(jumpAngle) * (jumpDist / 45);
    shooter.cooldown = shooter.maxCooldown;
    return;
  }


  // --- Mortis Dash & Super ---
  if (shooter.brawler === "Mortis") {
    if (isSuper) {
      // Fire a wide purple bat swarm that heals Mortis when it hits
      projectiles.push({
        x: shooter.x,
        y: shooter.y,
        startX: shooter.x,
        startY: shooter.y,
        maxRange: BRAWLER_STATS["Mortis"].range * 2, // Doubles range for super
        brawlerName: shooter.brawler,
        vx: cos(angle) * 15,
        vy: sin(angle) * 15, 
        damage: 1800,
        owner: shooter.id,
        ignoresWalls: true,
        isSuper: true,
        active: true,
      });
      shooter.cooldown = shooter.maxCooldown;
    } else {
      // Standard Dash: Turn his body into the projectile!
      shooter.dashTicks = 12; // Dash lasts 12 frames
      let dashSpeed = BRAWLER_STATS["Mortis"].range / 12; // Speed required to cover range
      shooter.dashVx = cos(angle) * dashSpeed;
      shooter.dashVy = sin(angle) * dashSpeed;
      shooter.hasDamagedInDash = false; // Reset to ensure he only damages enemies ONCE during this motion
      shooter.cooldown = shooter.maxCooldown;
    }
    return; 
  }


  // --- Frank Windup ---
  if (shooter.brawler === "Frank") {
    // Frank's mechanic: His attack animation gets faster the lower his health is!
    let hpRatio = Math.max(0.1, shooter.hp / shooter.maxHp);
    // Windup takes between 10 to 50 frames depending on the hpRatio calculation
    shooter.attackWindup = floor(10 + 40 * hpRatio); 
    shooter.windupAngle = angle;
    shooter.windupIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown + shooter.attackWindup; // Add windup time to cooldown so he can't spam it
    return; // Stop here, attack executes later in the draw loop
  }


  // --- Leon Sequential Firing ---
  if (shooter.brawler === "Leon") {
    let projCount = BRAWLER_STATS["Leon"].projectiles;
    if (isSuper) projCount *= 2;
    // Instead of firing all 4 blades at once, tell Leon he has X shots queued up to be fired over time
    shooter.leonShots = projCount;
    shooter.leonTimer = 0; // Fire first one immediately
    shooter.leonAngle = angle;
    shooter.leonIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }


  // --- Edgar Sequential Firing ---
  if (shooter.brawler === "Edgar" && !isSuper) {
    // Edgar queues up his two punches to fire one after the other rapidly
    shooter.edgarShots = BRAWLER_STATS["Edgar"].projectiles;
    shooter.edgarTimer = 0;
    shooter.edgarAngle = angle;
    shooter.cooldown = shooter.maxCooldown;
    return;
  }


  // ============================================
  // STANDARD PROJECTILE SPAWNING LOGIC
  // If the brawler wasn't caught by the special cases above, they shoot normal bullets here.
  // ============================================


  // Determine if the attack type ignores walls (Using a Javascript array .includes() method)
  let ignoresWalls =
    ["Doug", "Dynamike", "Barley"].includes(shooter.brawler) ||
    (shooter.brawler === "Colt" && isSuper);


  // Look up how many projectiles this specific brawler fires using our updated Stats Dictionary
  let projCount = isSuper
    ? BRAWLER_STATS[shooter.brawler].superProjectiles
    : BRAWLER_STATS[shooter.brawler].projectiles;


  // We use a standard "for" loop to fire multiple projectiles at once!
  // It starts with i=0, runs the code block, adds 1 to i (i++), and repeats until i hits projCount.
  for (let i = 0; i < projCount; i++) {
    let finalAngle = angle;
    let speed = 12;
    let spawnX = shooter.x;
    let spawnY = shooter.y;


    // Mathematical Modifiers for multi-projectile attacks (spreads, lines, etc)
    if (projCount > 1) {
      if (shooter.brawler === "Colt") {
        // Colt fires in a straight line burst. By decreasing the speed slightly for each bullet generated in the loop,
        // they naturally trail behind each other creating a stream effect!
        speed = 12 - i * (isSuper ? 1.0 : 1.5);
      } else if (shooter.brawler === "Dynamike" && !isSuper) {
        // Dynamike sticks travel side-by-side, offset perpendicularly from the aiming angle
        let perpAngle = angle + PI / 2; // Add 90 degrees (PI/2) to find the perpendicular angle
        let offset = i === 0 ? -12 : 12; // Shift first stick left, second stick right
        spawnX += cos(perpAngle) * offset;
        spawnY += sin(perpAngle) * offset;
      } else {
        // Wide shotgun spread (Shelly)
        let spreadAmount = isSuper ? 1.0 : 0.5; // Spread angle width (in radians) 
        let startAngle = angle - spreadAmount / 2; // Calculate leftmost angle to start firing from
        let angleStep = spreadAmount / (projCount - 1); // Calculate distance between each bullet
        finalAngle = startAngle + i * angleStep; // Apply offset for this specific bullet
      }
    }


    // Actually create the projectile object and push it to the active array so the engine draws it
    projectiles.push({
      x: spawnX,
      y: spawnY,
      startX: spawnX, // Track origin point so we can delete the bullet if it goes past its max range
      startY: spawnY,
      maxRange: BRAWLER_STATS[shooter.brawler].range,
      brawlerName: shooter.brawler,
      vx: cos(finalAngle) * speed, // Velocity X
      vy: sin(finalAngle) * speed, // Velocity Y
      damage: shooter.damage,
      owner: shooter.id,
      ignoresWalls: ignoresWalls,
      isSuper: isSuper,
      active: true, // Setting to false later marks it for deletion by the engine
    });
  }


  shooter.cooldown = shooter.maxCooldown;
}


// --- Additional Combat Helper Functions ---


// Executes Frank's attack after his windup timer hits 0
function executeFrankSmash(frank, enemy) {
  let range = frank.windupIsSuper
    ? BRAWLER_STATS["Frank"].superRange
    : BRAWLER_STATS["Frank"].range;
  let spreadAngle = PI / 3; // Defines a 60-degree wide triangle cone area in front of him


  // Spawn visual triangle effect
  smashEffects.push({
    x: frank.x,
    y: frank.y,
    angle: frank.windupAngle,
    range: range,
    spread: spreadAngle,
    life: 15,
    isSuper: frank.windupIsSuper,
  });


  // Complex Math: Check if enemy is inside the triangle cone
  // 1. Check if they are within distance
  let distToEnemy = dist(frank.x, frank.y, enemy.x, enemy.y);
  let eRad = enemy.r / 2;


  if (distToEnemy - eRad <= range) {
    // 2. Determine exact angle to enemy relative to where Frank aimed
    let angleToEnemy = atan2(enemy.y - frank.y, enemy.x - frank.x);
    let diff = angleToEnemy - frank.windupAngle;


    // Normalize angle to handle math wrapping around a circle (e.g. 359 degrees and 1 degree are right next to each other)
    while (diff > PI) diff -= TWO_PI;
    while (diff < -PI) diff += TWO_PI;


    // If they are within the cone spread angle, apply damage
    if (abs(diff) <= spreadAngle / 2) {
      enemy.hp -= frank.damage;
      frank.hits++;
      frank.lastCombatTime = frameCount;
      enemy.lastCombatTime = frameCount;
      if (frank.windupIsSuper) {
        enemy.stunTicks = floor(2.48 * 60); // Apply 2.48s Stun duration by multiplying seconds by 60 frames
      }
    }
  }


  // Frank Super Wall Breaking Logic
  if (frank.windupIsSuper) {
    // Loop backwards through walls array. 
    // We loop backwards when we might DELETE (splice) items because if we went forwards,
    // the array items would shift left and we would accidentally skip checking the next wall!
    for (let i = walls.length - 1; i >= 0; i--) {
      let w = walls[i];
      // Find approximate center of the wall to test against the triangle cone
      let wx = w.x + w.w / 2;
      let wy = w.y + w.h / 2;
      let distToWall = dist(frank.x, frank.y, wx, wy);


      if (distToWall <= range + Math.max(w.w, w.h) / 2) {
        let angleToWall = atan2(wy - frank.y, wx - frank.x);
        let diff = angleToWall - frank.windupAngle;
        while (diff > PI) diff -= TWO_PI;
        while (diff < -PI) diff += TWO_PI;


        if (abs(diff) <= spreadAngle / 2) {
          walls.splice(i, 1); // Delete the wall array item (Breaks the wall permanently)
        }
      }
    }
  }
}


// Spawns one of Leon's queued blades and offsets the angle so they curve slightly to the side
function fireLeonBlade(leon) {
  let totalShots =
    BRAWLER_STATS["Leon"].projectiles * (leon.leonIsSuper ? 2 : 1);
  let shotIndex = totalShots - leon.leonShots;


  // Each shot curves slightly more to the left
  let angleOffset = -(shotIndex * 0.15);
  let finalAngle = leon.leonAngle + angleOffset;


  projectiles.push({
    x: leon.x,
    y: leon.y,
    startX: leon.x,
    startY: leon.y,
    maxRange: BRAWLER_STATS["Leon"].range,
    brawlerName: "Leon",
    vx: cos(finalAngle) * 12,
    vy: sin(finalAngle) * 12,
    damage: leon.damage,
    owner: leon.id,
    ignoresWalls: false,
    isSuper: leon.leonIsSuper,
    active: true,
  });
}


// Spawns one of Edgar's queued punches straight ahead
function fireEdgarPunch(edgar) {
  projectiles.push({
    x: edgar.x,
    y: edgar.y,
    startX: edgar.x,
    startY: edgar.y,
    maxRange: BRAWLER_STATS["Edgar"].range,
    brawlerName: "Edgar",
    vx: cos(edgar.edgarAngle) * 12,
    vy: sin(edgar.edgarAngle) * 12,
    damage: edgar.damage,
    owner: edgar.id,
    ignoresWalls: false,
    isSuper: false,
    active: true,
  });
}


/* =================================================================================
           VISUAL RENDERING LOGIC
           Functions specifically focused on drawing shapes, images, and HUDs to the screen.
           ================================================================================= */


// This function draws the specific weapon for each brawler.
function drawWeapon(player, angle) {
  // push() saves our current drawing settings (like colors and coordinates) so we don't mess up the rest of the game
  push();


  // By translating to the player's position, we treat the player as point (0,0) on a graph.
  // Then, rotate() turns the entire invisible grid so "Right" is pointing directly at the enemy!
  // This means we just draw the weapon facing right, and the computer does the hard work pointing it.
  translate(player.x, player.y);
  rotate(angle);


  // A 'switch' statement acts like multiple 'if/else' statements to check the brawler name neatly
  switch (player.brawler) {
    case "Shelly":
      let wImg = brawlerImages["ShellyWeapon"];
      if (wImg && wImg.width > 0) {
        let aspect = wImg.width / wImg.height;
        let drawH = 25;
        let drawW = drawH * aspect;
        push();
        translate(20, 0); // Move weapon out slightly from body center


        // scale(-1, 1) flips an image horizontally like a mirror. 
        // We do this because the raw image file of Shelly's shotgun naturally faces left!
        scale(-1, 1);


        // If player is aiming to the left side of the screen, the entire grid is rotated past 180 degrees, 
        // making the gun appear upside down. This check flips it vertically to fix it!
        if (cos(angle) < 0) {
          scale(1, -1);
        }


        imageMode(CENTER);
        image(wImg, 0, 0, drawW, drawH);
        pop();
      } else {
        // Fallback Shotgun graphic if image fails to load
        fill(150);
        rect(15, -5, 30, 10);
      }
      break;
    case "Colt":
      // Dual Pistols drawn using basic rectangles
      fill(100);
      rect(15, -12, 15, 6); // Left pistol
      rect(15, 6, 15, 6); // Right pistol
      break;
    case "Leon":
      // Shurikens created by crossing two rectangles
      fill("yellow");
      rect(20, -2, 10, 4);
      rect(23, -5, 4, 10);
      break;
    case "Piper":
      // Sniper Umbrella (Line and a half-circle Arc)
      stroke("#00a8ff");
      strokeWeight(4);
      line(10, 0, 40, 0);
      fill("#00a8ff");
      noStroke();
      arc(40, 0, 20, 20, -PI / 2, PI / 2);
      break;
    case "Mortis":
      // Shovel
      fill("#8B4513");
      rect(10, -3, 30, 6);
      fill(150);
      rect(40, -10, 10, 20);
      break;
    case "Dynamike":
      // 2 Dynamite sticks with little white fuses
      fill("red");
      rect(15, -12, 15, 8);
      rect(15, 4, 15, 8);
      fill("white");
      rect(30, -10, 4, 4);
      rect(30, 6, 4, 4);
      break;
    case "Frank":
      // Hammer
      if (player.attackWindup > 0) {
        rotate(-PI / 4); // Visually tilts hammer backwards during his windup delay
      }
      fill("#8B4513");
      rect(10, -5, 40, 10);
      fill(100);
      rect(45, -20, 25, 40);
      break;
    case "Edgar":
      // Scarf stripes (Using lines drawn on top of each other)
      stroke(0);
      strokeWeight(6);
      line(0, -15, -20, -25);
      stroke("white");
      strokeWeight(3);
      line(0, -15, -20, -25);


      stroke(0);
      strokeWeight(6);
      line(0, 15, -20, 25);
      stroke("white");
      strokeWeight(3);
      line(0, 15, -20, 25);
      noStroke();
      break;
    case "Doug":
      // Mustard Bottle
      fill("#d4af37");
      rect(15, -8, 20, 16, 5); // The 5 makes the rectangle corners rounded
      fill("red");
      rect(35, -2, 6, 4);
      break;
    case "Barley":
      // Molotov bottle with an orange flame rag
      fill("green");
      rect(20, -6, 12, 12, 4);
      rect(32, -3, 8, 6);
      fill("orange");
      rect(40, -4, 6, 8);
      break;
  }


  // pop() restores the settings we saved earlier so we don't mess up the rest of the game canvas!
  pop();
}


// draw() is the main engine loop provided by p5.js. It runs exactly 60 times every single second.
// We use it as a traffic director to decide which part of our game code to run based on the gameState.
function draw() {
  if (gameState === "LOBBY") {
    drawLobby();
  } else if (gameState === "GAME") {
    drawGame();
  }
}


// Renders the main menu
function drawLobby() {
  drawBackground(); // Pastes the cached image to save frame rate
  
  // Call update and draw methods for all our created Class Objects
  for (let player of players) {
    player.update();
    player.draw();
  }
  for (let btn of buttons) {
    btn.update(mouseX, mouseY);
    btn.draw();
  }
  drawMenus();
}


// ================================================================================
// MAIN GAME ENGINE LOOP: Handles all moving parts, rendering, and logic while fighting.
// ================================================================================
function drawGame() {
  background("#e6cc98"); // Draw map sand color over the entire screen to clear the previous frame


  // --- Process Active Combat States (Leon, Frank, Edgar windups and queues) ---
  let playersArray = [
    [bluePlayer, redPlayer],
    [redPlayer, bluePlayer],
  ];
  
  // Loop through both players checking their active combat states
  for (let [p, enemy] of playersArray) {
    if (p.stunTicks > 0) {
      p.attackWindup = 0; // Cancel windup immediately if stunned
      p.leonShots = 0; // Cancel queued shots if stunned
      p.edgarShots = 0;
    } else {
      // Decrement timers (subtract 1) and trigger attacks when they hit 0
      if (p.attackWindup > 0) {
        p.attackWindup--;
        if (p.attackWindup === 0) executeFrankSmash(p, enemy);
      }
      if (p.leonShots > 0) {
        if (p.leonTimer <= 0) {
          fireLeonBlade(p);
          p.leonShots--; // Shot fired, remove it from queue
          p.leonTimer = 6; // Set 6-frame delay before next shot fires
        } else {
          p.leonTimer--;
        }
      }
      if (p.edgarShots > 0) {
        if (p.edgarTimer <= 0) {
          fireEdgarPunch(p);
          p.edgarShots--;
          p.edgarTimer = 4; // Fast delay
        } else {
          p.edgarTimer--;
        }
      }
    }
  }


  // --- Cooldowns & Reloading ---
  // Reduce shooting cooldown timers every frame
  if (bluePlayer.cooldown > 0) bluePlayer.cooldown--;
  if (redPlayer.cooldown > 0) redPlayer.cooldown--;


  // Handle ammo reloading over time
  for (let p of [bluePlayer, redPlayer]) {
    if (p.ammo < 3) {
      p.reloadTimer++;
      if (p.reloadTimer >= BRAWLER_STATS[p.brawler].reloadTime) {
        p.ammo++; // Give 1 ammo back
        p.reloadTimer = 0; // Reset timer to start working on the next ammo slot
      }
    } else {
      p.reloadTimer = 0; // Don't reload if already full
    }
  }


  // --- Auto-Heal (out of combat for 180 frames = ~3 seconds) ---
  if (
    frameCount - bluePlayer.lastCombatTime > 180 &&
    bluePlayer.hp > 0 &&
    bluePlayer.hp < bluePlayer.maxHp
  ) {
    // min() ensures we heal rapidly but mathematically cannot heal above maxHP
    bluePlayer.hp = min(
      bluePlayer.maxHp,
      bluePlayer.hp + bluePlayer.maxHp * 0.002
    );
  }
  if (
    frameCount - redPlayer.lastCombatTime > 180 &&
    redPlayer.hp > 0 &&
    redPlayer.hp < redPlayer.maxHp
  ) {
    redPlayer.hp = min(redPlayer.maxHp, redPlayer.hp + redPlayer.maxHp * 0.002);
  }


  // --- Invisibility Tickers ---
  // Countdown Leon's invisibility timer. When 0, strip the buff.
  if (bluePlayer.invisTicks > 0) {
    bluePlayer.invisTicks--;
    if (bluePlayer.invisTicks <= 0) bluePlayer.isInvisible = false;
  }
  if (redPlayer.invisTicks > 0) {
    redPlayer.invisTicks--;
    if (redPlayer.invisTicks <= 0) redPlayer.isInvisible = false;
  }


  // --- Movement Logic (With Sliding Wall Collision) ---
  let bRad = bluePlayer.r / 2;
  let rRad = redPlayer.r / 2;
  let nextX, nextY; // Variables to test the position they WANT to move to before confirming it


  // -- Blue Player Handling (WASD, Dash, or Jump) --
  if (bluePlayer.stunTicks > 0) {
    // If stunned, they cannot move. Render a yellow star above them to show the status.
    bluePlayer.stunTicks--;
    if (!bluePlayer.isInvisible) {
      fill("yellow");
      textAlign(CENTER, CENTER);
      textSize(20);
      text("★", bluePlayer.x, bluePlayer.y - bluePlayer.r - 20);
    }
  } else if (bluePlayer.attackWindup > 0) {
    // Immobilized during Frank's windup. No movement allowed.
  } else if (bluePlayer.jumpTicks > 0) {
    // Jumping logic (Piper/Edgar). This skips wall collision so they hop perfectly over obstacles!
    bluePlayer.jumpTicks--;
    bluePlayer.x += bluePlayer.jumpVx;
    bluePlayer.y += bluePlayer.jumpVy;
    // Once they hit the ground (ticks reach 0), make sure they aren't stuck inside a wall graphic
    if (bluePlayer.jumpTicks === 0) resolveWallStuck(bluePlayer);
  } else if (bluePlayer.dashTicks > 0) {
    // Mortis dash logic
    bluePlayer.dashTicks--;
    nextX = bluePlayer.x + bluePlayer.dashVx;
    nextY = bluePlayer.y + bluePlayer.dashVy;
    // Test X and Y movement independently to allow sliding smoothly along walls instead of hitting an invisible brick wall
    if (!checkWallCollision(nextX, bluePlayer.y, bRad)) bluePlayer.x = nextX;
    if (!checkWallCollision(bluePlayer.x, nextY, bRad)) bluePlayer.y = nextY;


    // Mortis dash damage check: if his body overlaps the enemy while dashing, apply damage
    if (
      !bluePlayer.hasDamagedInDash &&
      dist(bluePlayer.x, bluePlayer.y, redPlayer.x, redPlayer.y) <
        bRad + rRad + 20
    ) {
      redPlayer.hp -= bluePlayer.damage;
      redPlayer.lastCombatTime = frameCount;
      bluePlayer.lastCombatTime = frameCount;
      bluePlayer.hits++;
      bluePlayer.hasDamagedInDash = true; // Flips boolean so he doesn't shred the enemy instantly by hitting them every frame
    }
  } else {
    // Normal WASD movement (We do standard KeyIsDown checks so multiple keys work together for diagonals)
    nextY = bluePlayer.y;
    if (keyIsDown(87)) nextY -= bluePlayer.speed; // W (Up is negative Y in programming!)
    if (keyIsDown(83)) nextY += bluePlayer.speed; // S
    if (!checkWallCollision(bluePlayer.x, nextY, bRad)) bluePlayer.y = nextY;


    nextX = bluePlayer.x;
    if (keyIsDown(65)) nextX -= bluePlayer.speed; // A
    if (keyIsDown(68)) nextX += bluePlayer.speed; // D
    if (!checkWallCollision(nextX, bluePlayer.y, bRad)) bluePlayer.x = nextX;
  }


  // -- Red Player Handling (Arrows, Dash, or Jump) -- 
  // (This is completely identical logic to Blue, but uses arrow keys instead of WASD)
  if (redPlayer.stunTicks > 0) {
    redPlayer.stunTicks--;
    if (!redPlayer.isInvisible) {
      fill("yellow");
      textAlign(CENTER, CENTER);
      textSize(20);
      text("★", redPlayer.x, redPlayer.y - redPlayer.r - 20);
    }
  } else if (redPlayer.attackWindup > 0) {
    // Immobilized during Frank's windup
  } else if (redPlayer.jumpTicks > 0) {
    redPlayer.jumpTicks--;
    redPlayer.x += redPlayer.jumpVx;
    redPlayer.y += redPlayer.jumpVy;
    if (redPlayer.jumpTicks === 0) resolveWallStuck(redPlayer);
  } else if (redPlayer.dashTicks > 0) {
    redPlayer.dashTicks--;
    nextX = redPlayer.x + redPlayer.dashVx;
    nextY = redPlayer.y + redPlayer.dashVy;
    if (!checkWallCollision(nextX, redPlayer.y, rRad)) redPlayer.x = nextX;
    if (!checkWallCollision(redPlayer.x, nextY, rRad)) redPlayer.y = nextY;


    if (
      !redPlayer.hasDamagedInDash &&
      dist(redPlayer.x, redPlayer.y, bluePlayer.x, bluePlayer.y) <
        bRad + rRad + 20
    ) {
      bluePlayer.hp -= redPlayer.damage;
      bluePlayer.lastCombatTime = frameCount;
      redPlayer.lastCombatTime = frameCount;
      redPlayer.hits++;
      redPlayer.hasDamagedInDash = true;
    }
  } else {
    nextY = redPlayer.y;
    if (keyIsDown(UP_ARROW)) nextY -= redPlayer.speed;
    if (keyIsDown(DOWN_ARROW)) nextY += redPlayer.speed;
    if (!checkWallCollision(redPlayer.x, nextY, rRad)) redPlayer.y = nextY;


    nextX = redPlayer.x;
    if (keyIsDown(LEFT_ARROW)) nextX -= redPlayer.speed;
    if (keyIsDown(RIGHT_ARROW)) nextX += redPlayer.speed;
    if (!checkWallCollision(nextX, redPlayer.y, rRad)) redPlayer.x = nextX;
  }


  // Constrain players to the screen borders so they can't walk off canvas
  bluePlayer.x = constrain(bluePlayer.x, bRad, width - bRad);
  bluePlayer.y = constrain(bluePlayer.y, bRad, height - bRad);
  redPlayer.x = constrain(redPlayer.x, rRad, width - rRad);
  redPlayer.y = constrain(redPlayer.y, rRad, height - rRad);


  // --- Shooting Input Checks ---
  // If the key is held down, attempt to execute an attack.
  // The shootProjectile() function has built-in checks to block the attack if on cooldown or out of ammo.
  // The numbers are JavaScript KeyCodes. (E is 69, Q is 81).
  if (keyIsDown(69)) shootProjectile(bluePlayer, redPlayer, false); // Main Attack
  if (keyIsDown(81)) shootProjectile(bluePlayer, redPlayer, true);  // Super


  if (keyIsDown(16)) shootProjectile(redPlayer, bluePlayer, false); // Shift
  if (keyIsDown(191)) shootProjectile(redPlayer, bluePlayer, true); // /


  // --- Draw Frank Smash Effects (Triangles) ---
  // Loop backwards to safely delete expired items from the array using splice()
  for (let i = smashEffects.length - 1; i >= 0; i--) {
    let fx = smashEffects[i];
    fx.life--;
    push();
    translate(fx.x, fx.y);
    rotate(fx.angle);
    // Dynamically reduce alpha (transparency) as life goes down to make it cleanly fade out into nothingness
    fill(
      fx.isSuper
        ? color(241, 196, 15, fx.life * 15)
        : color(255, 50, 50, fx.life * 15)
    );
    noStroke();
    beginShape();
    vertex(0, 0);
    let hs = fx.spread / 2;
    vertex(cos(-hs) * fx.range, sin(-hs) * fx.range);
    vertex(cos(hs) * fx.range, sin(hs) * fx.range);
    endShape(CLOSE);
    pop();
    if (fx.life <= 0) smashEffects.splice(i, 1);
  }


  // --- Draw Walls ---
  stroke("#c79f58");
  strokeWeight(4);
  fill("#b88b44"); // Darker sand/rock color
  rectMode(CORNER);
  for (let w of walls) {
    rect(w.x, w.y, w.w, w.h, 10);
  }


  // --- Draw Piper & Dynamike Bombs ---
  for (let i = bombs.length - 1; i >= 0; i--) {
    let b = bombs[i];
    b.ticks--; // Countdown to explosion


    // Draw bomb visual based on character type
    if (b.isDynamike) {
      push();
      fill(b.radius > 50 ? "#8B4513" : "red"); // Super Barrel is brown, normal stick is red
      rectMode(CENTER);
      if (b.radius > 50) rect(b.x, b.y, 20, 24, 3);
      else rect(b.x, b.y, 10, 20, 2);
      
      // Using modulo (%) math to create a blinking yellow fuse effect every 10 frames
      if (b.ticks % 10 < 5) {
        fill("yellow");
        circle(b.x, b.y - 10, 6);
      }
      pop();
    } else {
      // Piper Grenade Visual
      fill(0);
      noStroke();
      circle(b.x, b.y, 14);
      if (b.ticks % 10 < 5) {
        fill("red");
        circle(b.x, b.y, 8);
      }
    }


    // Explosion Execution
    if (b.ticks <= 0) {
      // Explode Visual
      fill(255, 100, 0, 150);
      let r = b.radius || 40; // Default to 40 radius if none is provided
      circle(b.x, b.y, r * 2);


      // --- Wall Breaking for Explosions ---
      let breaksWalls = (b.isDynamike && b.radius > 50) || !b.isDynamike; // Piper bombs and Dyna Super break walls
      if (breaksWalls) {
        for (let j = walls.length - 1; j >= 0; j--) {
          let w = walls[j];
          // Complex Box-to-Circle Collision math to see if explosion radius hits the wall rectangle
          let testX = b.x;
          let testY = b.y;
          if (b.x < w.x) testX = w.x;
          else if (b.x > w.x + w.w) testX = w.x + w.w;
          if (b.y < w.y) testY = w.y;
          else if (b.y > w.y + w.h) testY = w.y + w.h;


          let distance = dist(b.x, b.y, testX, testY);
          if (distance <= r) {
            walls.splice(j, 1); // Break wall
          }
        }
      }


      // Check Area-of-Effect (AoE) Damage on Players
      if (
        b.owner !== "blue" &&
        dist(b.x, b.y, bluePlayer.x, bluePlayer.y) < bRad + r
      ) {
        bluePlayer.hp -= b.damage;
        redPlayer.hits++;
        bluePlayer.lastCombatTime = frameCount;
      }
      if (
        b.owner !== "red" &&
        dist(b.x, b.y, redPlayer.x, redPlayer.y) < rRad + r
      ) {
        redPlayer.hp -= b.damage;
        bluePlayer.hits++;
        redPlayer.lastCombatTime = frameCount;
      }
      bombs.splice(i, 1); // Remove the bomb object completely after it explodes
    }
  }


  // --- Draw Doug Splashes ---
  for (let i = dougSplashes.length - 1; i >= 0; i--) {
    let ds = dougSplashes[i];
    ds.life--;
    push();
    fill(255, 105, 180, ds.life * 15); // Transparent Pink
    noStroke();
    circle(ds.x, ds.y, ds.radius);
    pop();
    if (ds.life <= 0) dougSplashes.splice(i, 1);
  }


  // --- Draw & Update Barley Puddles ---
  for (let i = puddles.length - 1; i >= 0; i--) {
    let pd = puddles[i];
    pd.ticks--;


    push();
    fill(255, 140, 0, 120); // Orange/Fire puddle
    noStroke();
    circle(pd.x, pd.y, pd.radius * 2);
    pop();


    // Deal "tick" damage over time (every 30 frames = 0.5s) instead of instantly
    if (pd.ticks % 30 === 0) {
      if (
        pd.owner !== "blue" &&
        dist(pd.x, pd.y, bluePlayer.x, bluePlayer.y) < pd.radius + bRad
      ) {
        bluePlayer.hp -= pd.damage;
        bluePlayer.lastCombatTime = frameCount;
        redPlayer.hits++;
      }
      if (
        pd.owner !== "red" &&
        dist(pd.x, pd.y, redPlayer.x, redPlayer.y) < pd.radius + rRad
      ) {
        redPlayer.hp -= pd.damage;
        redPlayer.lastCombatTime = frameCount;
        bluePlayer.hits++;
      }
    }
    if (pd.ticks <= 0) puddles.splice(i, 1);
  }


  // --- Draw & Update Standard Projectiles ---
  for (let i = projectiles.length - 1; i >= 0; i--) {
    let p = projectiles[i];
    
    // Move projectile by its exact velocity coordinates
    p.x += p.vx;
    p.y += p.vy;


    // Max Range Deletion: Calculate how far it has travelled from its start point
    let travelDist = dist(p.startX, p.startY, p.x, p.y);
    if (travelDist > p.maxRange) {
      p.active = false;
    }


    // --- Colt & Shelly Super Wall Break ---
    if (p.isSuper && (p.brawlerName === "Colt" || p.brawlerName === "Shelly")) {
      for (let j = walls.length - 1; j >= 0; j--) {
        let w = walls[j];
        if (p.x >= w.x && p.x <= w.x + w.w && p.y >= w.y && p.y <= w.y + w.h) {
          walls.splice(j, 1); // Break the wall instantly on contact!
        }
      }
    }


    // Draw the bullet graphics
    noStroke();
    if (p.brawlerName === "Dynamike") {
      push();
      fill(p.isSuper ? "#8B4513" : "red");
      translate(p.x, p.y);
      rotate(frameCount * 0.2); // Multiply frame count to make the stick slowly spin in the air visually
      rectMode(CENTER);
      if (p.isSuper) rect(0, 0, 20, 24, 3);
      else rect(0, 0, 8, 16, 2);
      pop();
    } else if (p.isSuper) {
      if (p.brawlerName === "Mortis") {
        // Wide purple bat shot for Mortis super
        fill("#8e44ad");
        push();
        translate(p.x, p.y);
        rotate(atan2(p.vy, p.vx)); // Angles the oval bat perfectly in the direction it is flying!
        ellipse(0, 0, 15, 40);
        pop();
      } else {
        fill("#f1c40f"); // Standard yellow super bullet
        circle(p.x, p.y, 18);
      }
    } else {
      // Standard team-colored bullets for normal attacks
      fill(p.owner === "blue" ? "#3498db" : "#e74c3c");
      circle(p.x, p.y, 14);
    }


    // Wall collision handling: Stop bullet if it doesn't have the ignoring-walls trait
    if (!p.ignoresWalls && checkProjWallCollision(p.x, p.y)) {
      p.active = false;
    }


    // Screen boundary deletion: Keep memory clean by deleting bullets that fly off-screen
    if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
      p.active = false;
    }


    // Hit Detection with Players
    let hitRadius = p.isSuper && p.brawlerName === "Mortis" ? 20 : 7; // Mortis bat has a much larger hitbox
    let hitEnemy = false;


    // Check collision against Blue Player
    if (
      p.owner !== "blue" &&
      dist(p.x, p.y, bluePlayer.x, bluePlayer.y) < bRad + hitRadius
    ) {
      hitEnemy = true;
      // Barley/Dynamike projectiles don't instantly damage directly (they act as spawners for pools/bombs)
      if (p.brawlerName !== "Barley" && p.brawlerName !== "Dynamike") {
        let dmg = p.damage;
        if (p.brawlerName === "Piper") {
          // Piper damage scaling logic: 30% damage point blank, scaling linearly up to 100% damage at max range!
          dmg *= constrain(travelDist / p.maxRange, 0.3, 1.0);
        }
        bluePlayer.hp -= dmg;
        bluePlayer.lastCombatTime = frameCount;
        redPlayer.lastCombatTime = frameCount;
        redPlayer.hits++; // Add charge to the enemy's super meter


        // Special on-hit abilities
        if (p.isSuper && p.brawlerName === "Mortis") {
          redPlayer.hp = min(redPlayer.hp + p.damage, redPlayer.maxHp); // Mortis lifesteal heal
        }
        if (p.brawlerName === "Edgar") {
          redPlayer.hp = min(redPlayer.hp + dmg * 0.5, redPlayer.maxHp); // Edgar 50% lifesteal
        }
      }
    }
    // Check collision against Red Player (Identical logic)
    if (
      p.owner !== "red" &&
      dist(p.x, p.y, redPlayer.x, redPlayer.y) < rRad + hitRadius
    ) {
      hitEnemy = true;
      if (p.brawlerName !== "Barley" && p.brawlerName !== "Dynamike") {
        let dmg = p.damage;
        if (p.brawlerName === "Piper") {
          dmg *= constrain(travelDist / p.maxRange, 0.3, 1.0);
        }
        redPlayer.hp -= dmg;
        redPlayer.lastCombatTime = frameCount;
        bluePlayer.lastCombatTime = frameCount;
        bluePlayer.hits++;


        if (p.isSuper && p.brawlerName === "Mortis") {
          bluePlayer.hp = min(bluePlayer.hp + p.damage, bluePlayer.maxHp);
        }
        if (p.brawlerName === "Edgar") {
          bluePlayer.hp = min(bluePlayer.hp + dmg * 0.5, bluePlayer.maxHp);
        }
      }
    }


    // If bullet hit, mark inactive and flag it
    if (hitEnemy) {
      p.active = false;
      p.hitEnemy = true;
    }


    // If marked inactive, spawn necessary secondary objects before completely deleting the bullet
    if (!p.active) {
      if (p.brawlerName === "Barley") {
        // Spawn puddle
        puddles.push({
          x: p.x,
          y: p.y,
          radius: 45,
          damage: p.damage / 2,
          ticks: 180,
          owner: p.owner,
        });
      } else if (p.brawlerName === "Dynamike") {
        // Spawn bomb
        let blastRadius = p.isSuper ? 90 : 45;
        let dmg = p.isSuper ? 4400 : 1600;
        let fuse = p.hitEnemy ? 0 : 30; // Explode instantly if it bonks an enemy directly, else 0.5s fuse on the ground
        bombs.push({
          x: p.x,
          y: p.y,
          ticks: fuse,
          damage: dmg,
          owner: p.owner,
          radius: blastRadius,
          isDynamike: true,
        });
      }
      projectiles.splice(i, 1); // Delete bullet array item from memory completely!
    }
  }


  // --- Draw Players ---
  noStroke();


  // Calculate angles so visual weapons point at the enemy.
  // atan2 computes the angle between the two coordinate points.
  let blueAngle = atan2(redPlayer.y - bluePlayer.y, redPlayer.x - bluePlayer.x);
  let redAngle = atan2(bluePlayer.y - redPlayer.y, bluePlayer.x - redPlayer.x);


  // Blue Player Visuals
  // Ensure we don't draw them if they are dead (hp <= 0) or invisible!
  if (bluePlayer.hp > 0 && !bluePlayer.isInvisible) {
    // If blue player has enough hits for their super, draw a yellow ring underneath to indicate readiness!
    if (bluePlayer.hits >= BRAWLER_STATS[bluePlayer.brawler].hitsToSuper) {
      noFill();
      stroke("yellow");
      strokeWeight(4);
      circle(bluePlayer.x, bluePlayer.y, bluePlayer.r + 15);
      noStroke();
    }


    fill(0, 0, 0, 50); // Small drop shadow
    ellipse(bluePlayer.x, bluePlayer.y + bRad, bluePlayer.r, bRad);
    fill("#3498db"); // Main blue circle
    circle(bluePlayer.x, bluePlayer.y, bluePlayer.r);


    // Call our function to draw the weapon on top
    drawWeapon(bluePlayer, blueAngle);


    // Doug Hotdog Visual (Moved so it sits cleanly on top of the blue circle head)
    if (bluePlayer.hotdogTicks > 0) {
      push();
      fill("#d2691e");
      rectMode(CENTER);
      rect(bluePlayer.x, bluePlayer.y - bRad - 5, 24, 10, 5);
      fill("#e74c3c");
      rect(bluePlayer.x, bluePlayer.y - bRad - 5, 28, 6, 5);
      pop();
    }
  }


  // Red Player Visuals
  if (redPlayer.hp > 0 && !redPlayer.isInvisible) {
    if (redPlayer.hits >= BRAWLER_STATS[redPlayer.brawler].hitsToSuper) {
      noFill();
      stroke("yellow");
      strokeWeight(4);
      circle(redPlayer.x, redPlayer.y, redPlayer.r + 15);
      noStroke();
    }


    fill(0, 0, 0, 50);
    ellipse(redPlayer.x, redPlayer.y + rRad, redPlayer.r, rRad);
    fill("#e74c3c");
    circle(redPlayer.x, redPlayer.y, redPlayer.r);


    drawWeapon(redPlayer, redAngle);


    if (redPlayer.hotdogTicks > 0) {
      push();
      fill("#d2691e");
      rectMode(CENTER);
      rect(redPlayer.x, redPlayer.y - rRad - 5, 24, 10, 5);
      fill("#e74c3c");
      rect(redPlayer.x, redPlayer.y - rRad - 5, 28, 6, 5);
      pop();
    }
  }


  // --- Draw Health Bars & Ammo Bars ---
  let barW = 60; // Max pixel width of the bar
  let barH = 10;
  rectMode(CENTER);


  // Render Blue HUD directly over the character
  if (bluePlayer.hp > 0 && !bluePlayer.isInvisible) {
    fill(0); // Black backing outline
    rectMode(CENTER);
    rect(bluePlayer.x, bluePlayer.y - bluePlayer.r - 10, barW + 4, barH + 4, 4);
    fill("#2ecc71"); // Green fill color
    
    // Calculate what percentage of health is left (e.g. 0.5 for 50%)
    let hpPctB = max(0, bluePlayer.hp / bluePlayer.maxHp);
    rectMode(CORNER);
    // Draw the green bar width based on the percentage
    rect(
      bluePlayer.x - barW / 2,
      bluePlayer.y - bluePlayer.r - 10 - barH / 2,
      barW * hpPctB,
      barH,
      2
    );
    
    // Print the actual HP number inside the bar
    fill(255);
    textSize(10);
    textAlign(CENTER, CENTER);
    // Math.floor cleans up ugly decimals generated during auto-healing
    text(
      Math.floor(bluePlayer.hp),
      bluePlayer.x,
      bluePlayer.y - bluePlayer.r - 10
    );


    // Draw segmented Ammo Bar below health
    let ammoY = bluePlayer.y - bluePlayer.r + 2;
    fill(0);
    rectMode(CENTER);
    rect(bluePlayer.x, ammoY, barW + 4, 6, 2);
    rectMode(CORNER);
    let segW = barW / 3; // Divide the bar perfectly into 3 ammo segments
    for (let i = 0; i < 3; i++) {
      if (i < bluePlayer.ammo) {
        fill("#f39c12"); // Ready Ammo (Solid Orange)
        rect(bluePlayer.x - barW / 2 + i * segW + 1, ammoY - 2, segW - 2, 4, 1);
      } else if (i === bluePlayer.ammo) {
        fill(255, 165, 0, 100); // Reloading Ammo (Faded Orange rendering progress)
        // Draw partial segment based on reload timer progress
        let reloadPct =
          bluePlayer.reloadTimer / BRAWLER_STATS[bluePlayer.brawler].reloadTime;
        rect(
          bluePlayer.x - barW / 2 + i * segW + 1,
          ammoY - 2,
          (segW - 2) * reloadPct,
          4,
          1
        );
      }
    }
  }


  // Render Red HUD directly over character (Identical logic)
  if (redPlayer.hp > 0 && !redPlayer.isInvisible) {
    fill(0);
    rectMode(CENTER);
    rect(redPlayer.x, redPlayer.y - redPlayer.r - 10, barW + 4, barH + 4, 4);
    fill("#2ecc71");
    let hpPctR = max(0, redPlayer.hp / redPlayer.maxHp);
    rectMode(CORNER);
    rect(
      redPlayer.x - barW / 2,
      redPlayer.y - redPlayer.r - 10 - barH / 2,
      barW * hpPctR,
      barH,
      2
    );
    fill(255);
    textSize(10);
    textAlign(CENTER, CENTER);
    text(Math.floor(redPlayer.hp), redPlayer.x, redPlayer.y - redPlayer.r - 10);


    // Draw Ammo Bar
    let ammoY = redPlayer.y - redPlayer.r + 2;
    fill(0);
    rectMode(CENTER);
    rect(redPlayer.x, ammoY, barW + 4, 6, 2);
    rectMode(CORNER);
    let segW = barW / 3;
    for (let i = 0; i < 3; i++) {
      if (i < redPlayer.ammo) {
        fill("#f39c12");
        rect(redPlayer.x - barW / 2 + i * segW + 1, ammoY - 2, segW - 2, 4, 1);
      } else if (i === redPlayer.ammo) {
        fill(255, 165, 0, 100);
        let reloadPct =
          redPlayer.reloadTimer / BRAWLER_STATS[redPlayer.brawler].reloadTime;
        rect(
          redPlayer.x - barW / 2 + i * segW + 1,
          ammoY - 2,
          (segW - 2) * reloadPct,
          4,
          1
        );
      }
    }
  }


  // --- Draw Screen Edge HUD (Stats Displays) ---
  rectMode(CORNER);


  // Blue Screen Corner HUD Box
  fill(0, 150);
  rect(20, height - 100, 360, 80, 10);
  fill(255);
  textAlign(LEFT, TOP);
  textSize(20);


  // Look up the projectile count to display in the HUD dynamically (e.g. 600 (x5))
  let bProj = BRAWLER_STATS[bluePlayer.brawler].projectiles;
  let bDmgText =
    bProj > 1 ? `${bluePlayer.damage} (x${bProj})` : bluePlayer.damage;
  text(`${bluePlayer.brawler} - ATK: ${bDmgText}`, 30, height - 90);


  textSize(14);
  fill(200);
  text(`${bluePlayer.superDesc}\nE to Attack | Q to Super`, 30, height - 60);


  // Red Screen Corner HUD Box
  fill(0, 150);
  rect(width - 380, height - 100, 360, 80, 10);
  fill(255);
  textAlign(RIGHT, TOP);
  textSize(20);


  let rProj = BRAWLER_STATS[redPlayer.brawler].projectiles;
  let rDmgText =
    rProj > 1 ? `${redPlayer.damage} (x${rProj})` : redPlayer.damage;
  text(`ATK: ${rDmgText} - ${redPlayer.brawler}`, width - 30, height - 90);


  textSize(14);
  fill(200);
  text(
    `${redPlayer.superDesc}\nSHIFT to Attack | / to Super`,
    width - 30,
    height - 60
  );


  // Instructions to exit in top left
  fill(0, 150);
  noStroke();
  textSize(20);
  textAlign(LEFT, TOP);
  text("ESC = Lobby | Blue: WASD | Red: Arrows", 20, 20);


  // Draw round score (Best of 3 Tracking in top corners)
  fill("#f1c40f");
  textSize(24);
  textAlign(LEFT, TOP);
  text(`WINS: ${blueWins}`, 20, height - 135);
  textAlign(RIGHT, TOP);
  text(`WINS: ${redWins}`, width - 20, height - 135);


  // --- Win / Tie / Respawn Conditions ---


  // First, check Doug Revive mechanic
  if (bluePlayer.hp <= 0 && bluePlayer.hotdogTicks > 0) {
    bluePlayer.hp = bluePlayer.maxHp;
    bluePlayer.hotdogTicks = 0; // Consume the hotdog so it can't be used twice
  }
  if (redPlayer.hp <= 0 && redPlayer.hotdogTicks > 0) {
    redPlayer.hp = redPlayer.maxHp;
    redPlayer.hotdogTicks = 0;
  }


  // Check if the round is actually over by seeing if someone is fully dead
  let roundOver = false;
  if (bluePlayer.hp <= 0 && redPlayer.hp <= 0) {
    roundOver = true; // Tie round! No points awarded.
  } else if (bluePlayer.hp <= 0) {
    redWins++; // Give point to red
    roundOver = true;
  } else if (redPlayer.hp <= 0) {
    blueWins++; // Give point to blue
    roundOver = true;
  }


  // Process round over logic
  if (roundOver) {
    if (blueWins >= 2 || redWins >= 2) {
      // First to 2 wins! Match is completely over! Return to Lobby UI
      if (blueWins === redWins) lastWinner = "tie";
      else if (blueWins > redWins) lastWinner = "blue";
      else lastWinner = "red";


      gameState = "LOBBY"; // Switch the state machine back to Lobby mode
      gameMusic.pause();
      lobbyMusic.play().catch((e) => {}); // Swap the audio tracks
    } else {
      // Match continues! Reset positions for the next round
      startNextRound();
    }
  }
}


/* =================================================================================
   OPTIMIZATION & CACHING
   ================================================================================= */


// Optimization: Generates the complicated neon background circles ONCE and saves it to a graphic object.
// This prevents the game from lagging by avoiding calculating 100 huge circles every single frame.
function renderStaticBackground() {
  bgGraphics.background("#1a2a6c");
  let center_x = bgGraphics.width / 2;
  let center_y = bgGraphics.height / 2;


  bgGraphics.noFill();
  // Loop from max screen size down to 0, drawing circles smaller and smaller inwards
  for (let r = max(bgGraphics.width, bgGraphics.height); r > 0; r -= 15) {
    // map() converts a number from one range to another. 
    // Here we map radius size to a 0-1 scale so we can use it to calculate the color gradient.
    let inter = map(r, 0, max(bgGraphics.width, bgGraphics.height), 0, 1);
    let c = lerpColor(color("#11998e"), color("#38ef7d"), inter); // Smooth color gradient
    bgGraphics.stroke(c);
    bgGraphics.strokeWeight(16);
    bgGraphics.ellipse(center_x, center_y, r, r * 0.8);
  }


  // Add center darkening shadow effect
  bgGraphics.fill(0, 0, 0, 80);
  bgGraphics.noStroke();
  bgGraphics.ellipse(
    bgGraphics.width / 2,
    bgGraphics.height / 2 + 120,
    400,
    100
  );
}


// Simply pastes the pre-rendered image to the screen. SUPER fast compared to drawing from scratch!
function drawBackground() {
  imageMode(CORNER);
  image(bgGraphics, 0, 0);
}


// Renders the pop-up Character Select menus in the Lobby
function drawMenus() {
  // .concat() merges two arrays. We add a "BACK" button to the top of our brawler list!
  let menuItems = ["<- BACK"].concat(brawlerList); 
  let itemHeight = height / menuItems.length; // Space them evenly top-to-bottom


  // Draw Player 1's left-side menu
  if (leftMenuOpen) {
    fill(0, 0, 0, 230); // Transparent black background overlay
    rectMode(CORNER);
    rect(0, 0, width / 2, height);
    
    // Loop through and draw all character names
    for (let i = 0; i < menuItems.length; i++) {
      let y = i * itemHeight;
      // Box collision logic to create a hover highlight effect
      if (
        mouseX > 0 &&
        mouseX < width / 2 &&
        mouseY > y &&
        mouseY < y + itemHeight
      ) {
        fill(255, 255, 255, 40); // White highlight
        rect(0, y, width / 2, itemHeight);
      }
      stroke(255, 255, 255, 50);
      strokeWeight(1);
      line(0, y + itemHeight, width / 2, y + itemHeight); // Divider line
      
      if (i === 0) fill(255, 100, 100); // Highlight "BACK" button in Red
      else fill(255);
      
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(min(itemHeight * 0.4, 40));
      text(menuItems[i], width / 4, y + itemHeight / 2 - 5);
    }
  }


  // Draw Player 2's right-side menu (Identical logic)
  if (rightMenuOpen) {
    fill(0, 0, 0, 230);
    rectMode(CORNER);
    rect(width / 2, 0, width / 2, height);
    for (let i = 0; i < menuItems.length; i++) {
      let y = i * itemHeight;
      if (
        mouseX > width / 2 &&
        mouseX < width &&
        mouseY > y &&
        mouseY < y + itemHeight
      ) {
        fill(255, 255, 255, 40);
        rect(width / 2, y, width / 2, itemHeight);
      }
      stroke(255, 255, 255, 50);
      strokeWeight(1);
      line(width / 2, y + itemHeight, width, y + itemHeight);
      if (i === 0) fill(255, 100, 100);
      else fill(255);
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(min(itemHeight * 0.4, 40));
      text(menuItems[i], width * 0.75, y + itemHeight / 2 - 5);
    }
  }
}


/* =================================================================================
           INPUT EVENTS
           Native p5.js functions that trigger when hardware (mouse, keyboard) is used.
           ================================================================================= */


function mousePressed() {
  // Browsers strictly block auto-playing audio until the user manually clicks the page.
  // This catches the very first click on the game window and forces the music to start!
  if (gameState === "LOBBY" && lobbyMusic.paused) {
    lobbyMusic
      .play()
      .catch((e) => console.log("Waiting for user to interact..."));
  }


  // Menu clicks only work in Lobby state. Ignore clicks during fighting.
  if (gameState !== "LOBBY") return; 


  let menuItems = ["<- BACK"].concat(brawlerList);
  let itemHeight = height / menuItems.length;


  // Handle clicking items inside the Left character select menu
  if (leftMenuOpen && mouseX < width / 2) {
    // Math.floor rounds down. E.g., if mouse is at Y=200, and itemHeight is 50, 200/50 = index 4!
    let index = floor(mouseY / itemHeight); 
    if (index === 0) {
      leftMenuOpen = false; // "BACK" clicked, close menu
    } else if (index > 0 && index < menuItems.length) {
      players[0].name = menuItems[index]; // Update selected brawler string inside Player 1's object
      leftMenuOpen = false;
    }
    return;
  }


  // Handle clicking items inside the Right character select menu
  if (rightMenuOpen && mouseX > width / 2) {
    let index = floor(mouseY / itemHeight);
    if (index === 0) {
      rightMenuOpen = false;
    } else if (index > 0 && index < menuItems.length) {
      players[1].name = menuItems[index];
      rightMenuOpen = false;
    }
    return;
  }


  // Loop through our physical UI buttons array and trigger their programmed logic if clicked
  for (let btn of buttons) {
    if (btn.isClicked(mouseX, mouseY)) {
      if (btn.id === "play") {
        gameState = "GAME";
        lobbyMusic.pause(); // Pause menu music
        gameMusic.currentTime = 0; // Rewind battle music to 0:00
        gameMusic.play().catch((e) => {});
        initGame(); // Kick off the match preparation function!
      } else if (btn.id === "brawlers_left") {
        leftMenuOpen = !leftMenuOpen; // Toggle boolean (if true -> false, if false -> true)
      } else if (btn.id === "brawlers_right") {
        rightMenuOpen = !rightMenuOpen;
      }
    }
  }
}


function keyPressed() {
  // keyCode inside p5.js automatically tracks standard keyboard buttons.
  // ESCAPE allows quitting mid-match gracefully.
  if (keyCode === ESCAPE && gameState === "GAME") {
    gameState = "LOBBY";
    gameMusic.pause();
    lobbyMusic.play().catch((e) => {});
  }
}


function windowResized() {
  // Allows the canvas to shrink or grow dynamically if the user resizes their browser window
  resizeCanvas(windowWidth, windowHeight);


  // Since our cached background graphic is heavily dependent on specific screen sizes, 
  // we have to delete it and rebuild it!
  bgGraphics = createGraphics(windowWidth, windowHeight);
  renderStaticBackground();


  // Re-run initialization to fix the positions of players and walls based on new screen width
  if (gameState === "LOBBY") initScene();
  else if (gameState === "GAME") initMap();
}
