// --- Custom Button Class ---
// Used to create the PLAY button and BRAWLER menu buttons
class Button {
  // constructor sets up the initial state of the button when created
  constructor(id, text, x, y, w, h, baseColor, textColor) {
    this.id = id;
    this.text = text;
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.baseColor = color(baseColor);
    // Calculate a slightly darker color for the 3D shadow effect
    this.shadowColor = color(
      red(this.baseColor) * 0.7,
      green(this.baseColor) * 0.7,
      blue(this.baseColor) * 0.7
    );
    this.textColor = color(textColor);
    this.hover = false;
    this.scale = 1.0; // Used for the popping animation when hovered
  }

  // Checks if the mouse is hovering over the button to trigger animations
  update(mx, my) {
    // Simple rectangular collision detection (bounding box)
    if (
      mx > this.x - this.w / 2 &&
      mx < this.x + this.w / 2 &&
      my > this.y - this.h / 2 &&
      my < this.y + this.h / 2
    ) {
      this.hover = true;
      // lerp smooths the transition from size 1.0 to 1.1 (grow effect)
      this.scale = lerp(this.scale, 1.1, 0.2);
    } else {
      this.hover = false;
      // lerp smooths the transition back to normal size
      this.scale = lerp(this.scale, 1.0, 0.2);
    }
  }

  // Handles the visual rendering of the button to the canvas
  draw() {
    push(); // Save current drawing state (colors, transforms)
    translate(this.x, this.y); // Move origin point to button's location
    scale(this.scale); // Apply hover scaling

    // Draw shadow (bottom layer)
    fill(this.shadowColor);
    noStroke();
    rectMode(CENTER);
    rect(0, 8, this.w, this.h, 15); // Offset y by 8 pixels for 3D effect

    // Draw main button top layer
    fill(this.baseColor);
    stroke(0);
    strokeWeight(4);
    rect(0, 0, this.w, this.h, 15);

    // Draw text
    fill(this.textColor);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(this.h * 0.45);
    text(this.text, 0, -this.h * 0.05);
    pop(); // Restore previous drawing state
  }

  // Returns true if the user clicks while hovering over the button
  isClicked(mx, my) {
    return this.hover;
  }
}

// --- Player Class (Lobby visuals only) ---
// This is purely for displaying the big character models in the lobby, not for combat.
class Player {
  constructor(id, name, offsetX, col) {
    this.id = id; // 'blue' or 'red' side
    this.name = name; // Name of brawler to know which image to load
    this.offsetX = offsetX; // Distance from center of screen
    this.color = color(col);
    this.yOffset = 0; // Used for breathing animation
  }

  draw() {
    let px = width / 2 + this.offsetX;
    let py = height / 2 + 50 + this.yOffset;

    push();
    // Draw the dark oval shadow under the character
    fill(0, 0, 0, 100);
    noStroke();
    ellipse(px, height / 2 + 130, 100, 30);

    // Find the loaded image from our dictionary and draw it
    let img = brawlerImages[this.name];
    if (img) {
      let aspect = img.width / img.height; // Keep image proportions correct
      let drawH = 160;
      let drawW = drawH * aspect;
      imageMode(CENTER);
      image(img, px, py, drawW, drawH);
    }

    // Draw the character nameplate below them
    fill(0, 150);
    noStroke();
    rectMode(CORNER);
    rect(
      px - textWidth(this.name) / 2 - 10,
      py - 115,
      textWidth(this.name) + 20,
      30,
      5
    );
    fill(255);
    textAlign(CENTER, CENTER);
    textSize(20);
    text(this.name, px, py - 100);
    pop();

    // If this player won the last game, draw a golden crown over their head
    if (lastWinner === this.id) {
      push();
      fill("#f1c40f"); // Gold color
      stroke(0);
      strokeWeight(2);
      // beginShape and vertex draw a custom polygon point-by-point
      beginShape();
      vertex(px - 20, py - 130); // bottom left
      vertex(px - 25, py - 160); // top left spike
      vertex(px - 10, py - 145); // inner left
      vertex(px, py - 165); // top middle spike
      vertex(px + 10, py - 145); // inner right
      vertex(px + 25, py - 160); // top right spike
      vertex(px + 20, py - 130); // bottom right
      endShape(CLOSE);
      pop();
    }
  }

  // Runs every frame to update animation logic
  update() {
    // Using sin() creates an infinite, smooth up-and-down wave perfect for "breathing"
    this.yOffset = sin(frameCount * 0.05 + this.offsetX) * 5;
  }
}

  buttons = [];

      width - playW / 2 - 40,

// Builds the physical walls for the combat arena
function initMap() {
  walls = []; // Clear old map
  // Each wall is a simple rectangle {x, y, width, height}
  // Center block
  walls.push({ x: width / 2 - 40, y: height / 2 - 100, w: 80, h: 200 });
  // Top and Bottom horizontal covers
  walls.push({ x: width / 2 - 150, y: height * 0.15, w: 300, h: 60 });
  walls.push({ x: width / 2 - 150, y: height * 0.85 - 60, w: 300, h: 60 });
  // Side L-shapes / blockers
  walls.push({ x: width * 0.2, y: height * 0.3, w: 60, h: 250 });
  walls.push({ x: width * 0.8 - 60, y: height * 0.4, w: 60, h: 250 });
}

// Resets the entire match (score, map, character stats) when moving from Lobby to Game
function initGame() {
  blueWins = 0; // Reset wins for new match
  redWins = 0; // Reset wins for new match
  initMap(); // Build the map only at the start of a match

  // Grab the currently selected brawler names from the lobby screen
  let p1Name = players[0].name;
  bluePlayer.brawler = p1Name;
  // Lookup the stats from the dictionary
  bluePlayer.maxHp = BRAWLER_STATS[p1Name].hp;
  bluePlayer.damage = BRAWLER_STATS[p1Name].damage;
  bluePlayer.superDesc = BRAWLER_STATS[p1Name].superDesc;
  bluePlayer.hits = 0; // Reset super hits only at the start of a full match

  let p2Name = players[1].name;
  redPlayer.brawler = p2Name;
  redPlayer.maxHp = BRAWLER_STATS[p2Name].hp;
  redPlayer.damage = BRAWLER_STATS[p2Name].damage;
  redPlayer.superDesc = BRAWLER_STATS[p2Name].superDesc;
  redPlayer.hits = 0;

  // Now that stats are loaded, set up the first round of the match
  startNextRound();
}

/* =================================================================================
           COLLISION & PHYSICS LOGIC
           Functions that calculate whether things are hitting walls or being blocked.
           ================================================================================= */

// Checks if a circular player is colliding with a rectangular wall
function checkWallCollision(px, py, radius) {
  for (let w of walls) {
    // Find closest point on the rectangle's edge to the circle's center point
    let cx = constrain(px, w.x, w.x + w.w);
    let cy = constrain(py, w.y, w.y + w.h);
    // Calculate distance squared between closest point and circle center (Pythagorean theorem)
    let distSq = (px - cx) * (px - cx) + (py - cy) * (py - cy);
    // If distance squared is less than radius squared, they are colliding!
    if (distSq < radius * radius) {
      return true;
    }
  }
  return false;
}

// Checks if a single point (like a tiny bullet) is inside a rectangular wall
function checkProjWallCollision(px, py) {
  for (let w of walls) {
    if (px >= w.x && px <= w.x + w.w && py >= w.y && py <= w.y + w.h) {
      return true;
    }
  }
  return false;
}

// Fixes a bug where jumping brawlers (Piper, Edgar) land inside a wall and get permanently stuck.
function resolveWallStuck(player) {
  let pRad = player.r / 2;
  for (let w of walls) {
    // Check if the player's circle overlaps the wall's rectangular hit-box
    if (
      player.x + pRad > w.x &&
      player.x - pRad < w.x + w.w &&
      player.y + pRad > w.y &&
      player.y - pRad < w.y + w.h
    ) {
      // Find the distances to each of the 4 edges of the wall
      let distLeft = Math.abs(player.x + pRad - w.x);
      let distRight = Math.abs(player.x - pRad - (w.x + w.w));
      let distTop = Math.abs(player.y + pRad - w.y);
      let distBottom = Math.abs(player.y - pRad - (w.y + w.h));

      // Find the smallest distance and forcibly teleport (push) the player out via that shortest path
      let minD = Math.min(distLeft, distRight, distTop, distBottom);
      if (minD === distLeft) player.x = w.x - pRad;
      else if (minD === distRight) player.x = w.x + w.w + pRad;
      else if (minD === distTop) player.y = w.y - pRad;
      else if (minD === distBottom) player.y = w.y + w.h + pRad;
    }
  }
}

/* =================================================================================
           COMBAT & ABILITY LOGIC
           Functions handling attacks, spawning bullets, and applying special abilities.
           ================================================================================= */

// This is the master function called whenever a player presses their attack button.
function shootProjectile(shooter, target, isSuper = false) {
  // Basic checks: You can't shoot if stunned or if your attack cooldown isn't finished
  if (shooter.cooldown > 0 || shooter.stunTicks > 0) return;

  // 1. Verify resources before doing ANYTHING
  if (isSuper) {
    let requiredHits = BRAWLER_STATS[shooter.brawler].hitsToSuper;
    // If trying to super but haven't hit enough times, cancel attack
    if (shooter.hits < requiredHits) return;
  } else {
    // If it's a regular attack, make sure they have ammo
    if (shooter.ammo <= 0) return;
  }

  // 2. Consume resources & apply combat states
  if (isSuper) {
    shooter.hits = 0; // Spend the super charge
  } else {
    shooter.ammo--; // Consume 1 ammo
  }

  shooter.lastCombatTime = frameCount; // Resets the 3-second auto-heal timer

  // Cancel Leon's invisibility instantly if he attacks (unless he is actively activating his super)
  if (!(shooter.brawler === "Leon" && isSuper)) {
    shooter.isInvisible = false;
    shooter.invisTicks = 0;
  }

  // --- Invisibility Auto-Aim Logic ---
  let angle;
  if (target.isInvisible) {
    // If the enemy is invisible, auto-aim fails and shoots in a completely random direction!
    angle = random(TWO_PI);
  } else {
    // atan2 calculates the correct angle from the shooter to the target
    angle = atan2(target.y - shooter.y, target.x - shooter.x);
  }

  // ============================================
  // SPECIAL BRAWLER ATTACK LOGIC
  // Some brawlers don't shoot standard bullets. We handle them here.
  // ============================================

  // --- Doug Attack & Super ---
  if (shooter.brawler === "Doug") {
    if (isSuper) {
      shooter.hotdogTicks = 900; // Super gives hotdog buff for 15 seconds (60fps * 15)
    } else {
      // Doug heals himself with every attack
      shooter.hp = Math.min(shooter.hp + 480, shooter.maxHp);
      let aoeRadius = BRAWLER_STATS["Doug"].range / 2;
      // Spawn visual effect
      dougSplashes.push({
        x: shooter.x,
        y: shooter.y,
        radius: BRAWLER_STATS["Doug"].range,
        life: 15,
      });

      // Deal damage immediately to anyone inside the radius
      if (
        dist(shooter.x, shooter.y, target.x, target.y) <
        aoeRadius + target.r / 2
      ) {
        target.hp -= shooter.damage;
        shooter.hits++;
        target.lastCombatTime = frameCount;
      }
    }
    shooter.cooldown = shooter.maxCooldown;
    return; // Stop function here, Doug doesn't spawn projectiles
  }

  // --- Barley Super ---
  if (shooter.brawler === "Barley" && isSuper) {
    // Calculate the center target location
    let cx = shooter.x + cos(angle) * BRAWLER_STATS["Barley"].range;
    let cy = shooter.y + sin(angle) * BRAWLER_STATS["Barley"].range;
    let spacing = 60;

    // Array representing a dice 5-dot shape pattern
    let offsets = [
      [0, 0],
      [-spacing, -spacing],
      [spacing, -spacing],
      [-spacing, spacing],
      [spacing, spacing],
    ];

    // Spawn 5 projectiles targeting each offset location
    for (let off of offsets) {
      let tx = cx + off[0];
      let ty = cy + off[1];
      let tAngle = atan2(ty - shooter.y, tx - shooter.x);
      let tDist = dist(shooter.x, shooter.y, tx, ty);

      projectiles.push({
        x: shooter.x,
        y: shooter.y,
        startX: shooter.x,
        startY: shooter.y,
        maxRange: tDist,
        brawlerName: shooter.brawler,
        vx: cos(tAngle) * 12,
        vy: sin(tAngle) * 12,
        damage: shooter.damage,
        owner: shooter.id,
        ignoresWalls: true,
        isSuper: true,
        active: true,
      });
    }
    shooter.cooldown = shooter.maxCooldown;
    return; // Stop here
  }

  // --- Leon Super ---
  if (shooter.brawler === "Leon" && isSuper) {
    shooter.isInvisible = true;
    shooter.invisTicks = 360; // 6 seconds of invisibility
    shooter.cooldown = shooter.maxCooldown;
    return; // Stop here, no projectiles spawned
  }

  // --- Piper Super ---
  if (shooter.brawler === "Piper" && isSuper) {
    // Calculate angle AWAY from target by adding PI (180 degrees)
    let jumpAngle = angle + PI;
    shooter.jumpTicks = 45; // Jump lasts 45 frames (0.75 seconds)
    let jumpDist = 350;
    // Calculate velocity to travel jumpDist in 45 frames
    shooter.jumpVx = cos(jumpAngle) * (jumpDist / 45);
    shooter.jumpVy = sin(jumpAngle) * (jumpDist / 45);

    // Drop 4 bombs at takeoff location arranged in a square
    let offsets = [
      [-15, -15],
      [15, -15],
      [-15, 15],
      [15, 15],
    ];
    for (let off of offsets) {
      bombs.push({
        x: shooter.x + off[0],
        y: shooter.y + off[1],
        ticks: 60, // 1 second fuse
        damage: 1800, // Piper grenade damage
        owner: shooter.id,
      });
    }
    shooter.cooldown = shooter.maxCooldown;
    return;
  }

  // --- Edgar Super ---
  if (shooter.brawler === "Edgar" && isSuper) {
    let jumpAngle = angle;
    shooter.jumpTicks = 45;
    // Jump towards enemy. Capped at 400 distance. If enemy is invisible, jump blind distance (300).
    let jumpDist = target.isInvisible
      ? 300
      : Math.min(400, dist(shooter.x, shooter.y, target.x, target.y));
    shooter.jumpVx = cos(jumpAngle) * (jumpDist / 45);
    shooter.jumpVy = sin(jumpAngle) * (jumpDist / 45);
    shooter.cooldown = shooter.maxCooldown;
    return;
  }

  // --- Mortis Dash & Super ---
  if (shooter.brawler === "Mortis") {
    if (isSuper) {
      // Fire a wide shot that heals Mortis when it hits
      projectiles.push({
        x: shooter.x,
        y: shooter.y,
        startX: shooter.x,
        startY: shooter.y,
        maxRange: BRAWLER_STATS["Mortis"].range * 2, // Longer range for super
        brawlerName: shooter.brawler,
        vx: cos(angle) * 15,
        vy: sin(angle) * 15, // Moves faster (15)
        damage: 1800,
        owner: shooter.id,
        ignoresWalls: true,
        isSuper: true,
        active: true,
      });
      shooter.cooldown = shooter.maxCooldown;
    } else {
      // Standard Dash - Calculate velocity to cover range in 12 frames
      shooter.dashTicks = 12;
      let dashSpeed = BRAWLER_STATS["Mortis"].range / 12;
      shooter.dashVx = cos(angle) * dashSpeed;
      shooter.dashVy = sin(angle) * dashSpeed;
      shooter.hasDamagedInDash = false;
      shooter.cooldown = shooter.maxCooldown;
    }
    return; // Stop here
  }

  // --- Frank Windup ---
  if (shooter.brawler === "Frank") {
    // Animation is shorter the less health he has left
    let hpRatio = Math.max(0.1, shooter.hp / shooter.maxHp);
    shooter.attackWindup = floor(10 + 40 * hpRatio); // Windup takes between 10 to 50 frames
    shooter.windupAngle = angle;
    shooter.windupIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown + shooter.attackWindup; // Add windup time to cooldown
    return; // Stop here, attack executes later
  }

  // --- Leon Sequential Firing ---
  if (shooter.brawler === "Leon") {
    let projCount = BRAWLER_STATS["Leon"].projectiles;
    if (isSuper) projCount *= 2;
    // Instead of firing all at once, tell Leon he has X shots queued up
    shooter.leonShots = projCount;
    shooter.leonTimer = 0; // Shoot first one immediately
    shooter.leonAngle = angle;
    shooter.leonIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown;
    return; // Stop here, projectiles spawn over time in drawGame loop
  }

  // --- Edgar Sequential Firing ---
  if (shooter.brawler === "Edgar" && !isSuper) {
    // Edgar queues up his two punches to fire one after the other rapidly
    shooter.edgarShots = BRAWLER_STATS["Edgar"].projectiles;
    shooter.edgarTimer = 0;
    shooter.edgarAngle = angle;
    shooter.cooldown = shooter.maxCooldown;
    return;
  }

  // ============================================
  // STANDARD PROJECTILE SPAWNING LOGIC
  // ============================================

  // Determine if the attack type ignores walls
  let ignoresWalls =
    ["Doug", "Dynamike", "Barley"].includes(shooter.brawler) ||
    (shooter.brawler === "Colt" && isSuper);

  // Look up how many projectiles this specific brawler fires using our updated Stats Dictionary
  let projCount = isSuper
    ? BRAWLER_STATS[shooter.brawler].superProjectiles
    : BRAWLER_STATS[shooter.brawler].projectiles;

  // We use a standard "for" loop to fire multiple projectiles at once!
  for (let i = 0; i < projCount; i++) {
    let finalAngle = angle;
    let speed = 12;
    let spawnX = shooter.x;
    let spawnY = shooter.y;

    // Modifiers for multi-projectile attacks (spreads, lines, etc)
    if (projCount > 1) {
      if (shooter.brawler === "Colt") {
        // Colt fires in a straight line burst. By decreasing the speed slightly for each bullet,
        // they naturally trail behind each other creating a burst effect.
        speed = 12 - i * (isSuper ? 1.0 : 1.5);
      } else if (shooter.brawler === "Dynamike" && !isSuper) {
        // Dynamike sticks travel side-by-side, offset perpendicularly from the angle
        let perpAngle = angle + PI / 2;
        let offset = i === 0 ? -12 : 12;
        spawnX += cos(perpAngle) * offset;
        spawnY += sin(perpAngle) * offset;
      } else {
        // Wide shotgun spread (Shelly)
        let spreadAmount = isSuper ? 1.0 : 0.5; // Wider spread (in radians) for super
        let startAngle = angle - spreadAmount / 2;
        let angleStep = spreadAmount / (projCount - 1);
        finalAngle = startAngle + i * angleStep;
      }
    }

    // Actually create the projectile object and push it to the active array
    projectiles.push({
      x: spawnX,
      y: spawnY,
      startX: spawnX, // Track origin to calculate max range limits
      startY: spawnY,
      maxRange: BRAWLER_STATS[shooter.brawler].range,
      brawlerName: shooter.brawler,
      vx: cos(finalAngle) * speed, // Velocity X
      vy: sin(finalAngle) * speed, // Velocity Y
      damage: shooter.damage,
      owner: shooter.id,
      ignoresWalls: ignoresWalls,
      isSuper: isSuper,
      active: true, // Setting to false later marks it for deletion
    });
  }

  shooter.cooldown = shooter.maxCooldown;
}

// --- Additional Combat Helper Functions ---

// Executes Frank's attack after his windup timer finishes
function executeFrankSmash(frank, enemy) {
  let range = frank.windupIsSuper
    ? BRAWLER_STATS["Frank"].superRange
    : BRAWLER_STATS["Frank"].range;
  let spreadAngle = PI / 3; // 60-degree wide triangle cone

  // Spawn visual triangle effect
  smashEffects.push({
    x: frank.x,
    y: frank.y,
    angle: frank.windupAngle,
    range: range,
    spread: spreadAngle,
    life: 15,
    isSuper: frank.windupIsSuper,
  });

  // Complex Math: Check if enemy is inside the triangle cone
  let distToEnemy = dist(frank.x, frank.y, enemy.x, enemy.y);
  let eRad = enemy.r / 2;

  if (distToEnemy - eRad <= range) {
    // Determine angle to enemy relative to where Frank aimed
    let angleToEnemy = atan2(enemy.y - frank.y, enemy.x - frank.x);
    let diff = angleToEnemy - frank.windupAngle;

    // Normalize angle to handle wrapping around PI/-PI (Math fixes)
    while (diff > PI) diff -= TWO_PI;
    while (diff < -PI) diff += TWO_PI;

    // If they are within the cone spread angle, apply damage
    if (abs(diff) <= spreadAngle / 2) {
      enemy.hp -= frank.damage;
      frank.hits++;
      frank.lastCombatTime = frameCount;
      enemy.lastCombatTime = frameCount;
      if (frank.windupIsSuper) {
        enemy.stunTicks = floor(2.48 * 60); // Apply 2.48s Stun duration
      }
    }
  }

  // Frank Super Wall Breaking Logic
  if (frank.windupIsSuper) {
    // Loop backwards through walls because we might delete some (splicing)
    for (let i = walls.length - 1; i >= 0; i--) {
      let w = walls[i];
      // Find approximate center of the wall to test against the triangle cone
      let wx = w.x + w.w / 2;
      let wy = w.y + w.h / 2;
      let distToWall = dist(frank.x, frank.y, wx, wy);

      if (distToWall <= range + Math.max(w.w, w.h) / 2) {
        let angleToWall = atan2(wy - frank.y, wx - frank.x);
        let diff = angleToWall - frank.windupAngle;
        while (diff > PI) diff -= TWO_PI;
        while (diff < -PI) diff += TWO_PI;

        if (abs(diff) <= spreadAngle / 2) {
          walls.splice(i, 1); // Delete the wall array item (Breaks the wall)
        }
      }
    }
  }
}

// Spawns one of Leon's queued blades and offsets the angle so they curve slightly
function fireLeonBlade(leon) {
  let totalShots =
    BRAWLER_STATS["Leon"].projectiles * (leon.leonIsSuper ? 2 : 1);
  let shotIndex = totalShots - leon.leonShots;

  // Each shot curves slightly more to the left
  let angleOffset = -(shotIndex * 0.15);
  let finalAngle = leon.leonAngle + angleOffset;

  projectiles.push({
    x: leon.x,
    y: leon.y,
    startX: leon.x,
    startY: leon.y,
    maxRange: BRAWLER_STATS["Leon"].range,
    brawlerName: "Leon",
    vx: cos(finalAngle) * 12,
    vy: sin(finalAngle) * 12,
    damage: leon.damage,
    owner: leon.id,
    ignoresWalls: false,
    isSuper: leon.leonIsSuper,
    active: true,
  });
}

// Spawns one of Edgar's queued punches straight ahead
function fireEdgarPunch(edgar) {
  projectiles.push({
    x: edgar.x,
    y: edgar.y,
    startX: edgar.x,
    startY: edgar.y,
    maxRange: BRAWLER_STATS["Edgar"].range,
    brawlerName: "Edgar",
    vx: cos(edgar.edgarAngle) * 12,
    vy: sin(edgar.edgarAngle) * 12,
    damage: edgar.damage,
    owner: edgar.id,
    ignoresWalls: false,
    isSuper: false,
    active: true,
  });
}

/* =================================================================================
           VISUAL RENDERING LOGIC
           Functions specifically focused on drawing shapes, images, and HUDs to the screen.
           ================================================================================= */

// This function draws the specific weapon for each brawler.
function drawWeapon(player, angle) {
  // push() saves our current drawing settings (like colors and coordinates)
  push();

  // By translating to the player's position, we make the player (0,0).
  // Then, rotating by the angle points the canvas itself towards the enemy!
  // This means we just draw the weapon facing "right", and math handles pointing it correctly.
  translate(player.x, player.y);
  rotate(angle);

  // A 'switch' statement acts like multiple 'if' statements to check the brawler name
  switch (player.brawler) {
    case "Shelly":
      let wImg = brawlerImages["ShellyWeapon"];
      if (wImg && wImg.width > 0) {
        let aspect = wImg.width / wImg.height;
        let drawH = 25;
        let drawW = drawH * aspect;
        push();
        translate(20, 0); // Move weapon out slightly from body

        // The loaded image barrel naturally faces left, so flip horizontally (scale x by -1)
        // to make it face right
        scale(-1, 1);

        // If player is aiming to the left side of the screen, flip vertically so the gun isn't upside down
        if (cos(angle) < 0) {
          scale(1, -1);
        }

        imageMode(CENTER);
        image(wImg, 0, 0, drawW, drawH);
        pop();
      } else {
        // Fallback Shotgun graphic if image fails to load
        fill(150);
        rect(15, -5, 30, 10);
      }
      break;
    case "Colt":
      // Dual Pistols
      fill(100);
      rect(15, -12, 15, 6); // Left pistol
      rect(15, 6, 15, 6); // Right pistol
      break;
    case "Leon":
      // Shurikens
      fill("yellow");
      rect(20, -2, 10, 4);
      rect(23, -5, 4, 10);
      break;
    case "Piper":
      // Sniper Umbrella (Arc)
      stroke("#00a8ff");
      strokeWeight(4);
      line(10, 0, 40, 0);
      fill("#00a8ff");
      noStroke();
      arc(40, 0, 20, 20, -PI / 2, PI / 2);
      break;
    case "Mortis":
      // Shovel
      fill("#8B4513");
      rect(10, -3, 30, 6);
      fill(150);
      rect(40, -10, 10, 20);
      break;
    case "Dynamike":
      // 2 Dynamite sticks
      fill("red");
      rect(15, -12, 15, 8);
      rect(15, 4, 15, 8);
      fill("white");
      rect(30, -10, 4, 4);
      rect(30, 6, 4, 4);
      break;
    case "Frank":
      // Hammer
      if (player.attackWindup > 0) {
        rotate(-PI / 4); // Visually pull hammer back during his windup delay
      }
      fill("#8B4513");
      rect(10, -5, 40, 10);
      fill(100);
      rect(45, -20, 25, 40);
      break;
    case "Edgar":
      // Scarf stripes (Using lines)
      stroke(0);
      strokeWeight(6);
      line(0, -15, -20, -25);
      stroke("white");
      strokeWeight(3);
      line(0, -15, -20, -25);

      stroke(0);
      strokeWeight(6);
      line(0, 15, -20, 25);
      stroke("white");
      strokeWeight(3);
      line(0, 15, -20, 25);
      noStroke();
      break;
    case "Doug":
      // Mustard Bottle
      fill("#d4af37");
      rect(15, -8, 20, 16, 5);
      fill("red");
      rect(35, -2, 6, 4);
      break;
    case "Barley":
      // Molotov bottle
      fill("green");
      rect(20, -6, 12, 12, 4);
      rect(32, -3, 8, 6);
      fill("orange");
      rect(40, -4, 6, 8);
      break;
  }

  // pop() restores the settings we saved earlier so we don't mess up the rest of the game canvas!
  pop();
}

// draw() is the main p5.js loop. It acts as our game's engine, running 60 times a second.
// We use it as a router to decide which part of the game to render based on the gameState.
function draw() {
  if (gameState === "LOBBY") {
    drawLobby();
  } else if (gameState === "GAME") {
    drawGame();
  }
}

// Renders the main menu
function drawLobby() {
  drawBackground();
  // Call update and draw methods for UI objects
  for (let player of players) {
    player.update();
    player.draw();
  }
  for (let btn of buttons) {
    btn.update(mouseX, mouseY);
    btn.draw();
  }
  drawMenus();
}

// MAIN GAME ENGINE LOOP: Handles all moving parts, rendering, and logic while fighting.
function drawGame() {
  background("#e6cc98"); // Draw map sand

  // --- Process Active Combat States (Leon, Frank, Edgar windups and queues) ---
  let playersArray = [
    [bluePlayer, redPlayer],
    [redPlayer, bluePlayer],
  ];
  for (let [p, enemy] of playersArray) {
    if (p.stunTicks > 0) {
      p.attackWindup = 0; // Cancel windup if stunned
      p.leonShots = 0; // Cancel queued shots if stunned
      p.edgarShots = 0;
    } else {
      // Decrement timers and trigger attacks when they hit 0
      if (p.attackWindup > 0) {
        p.attackWindup--;
        if (p.attackWindup === 0) executeFrankSmash(p, enemy);
      }
      if (p.leonShots > 0) {
        if (p.leonTimer <= 0) {
          fireLeonBlade(p);
          p.leonShots--;
          p.leonTimer = 6; // Set delay before next shot fires
        } else {
          p.leonTimer--;
        }
      }
      if (p.edgarShots > 0) {
        if (p.edgarTimer <= 0) {
          fireEdgarPunch(p);
          p.edgarShots--;
          p.edgarTimer = 4; // Fast delay
        } else {
          p.edgarTimer--;
        }
      }
    }
  }

  // --- Cooldowns & Reloading ---
  // Reduce cooldown timers every frame
  if (bluePlayer.cooldown > 0) bluePlayer.cooldown--;
  if (redPlayer.cooldown > 0) redPlayer.cooldown--;

  // Handle ammo reloading over time
  for (let p of [bluePlayer, redPlayer]) {
    if (p.ammo < 3) {
      p.reloadTimer++;
      if (p.reloadTimer >= BRAWLER_STATS[p.brawler].reloadTime) {
        p.ammo++; // Give 1 ammo back
        p.reloadTimer = 0; // Reset timer for next ammo slot
      }
    } else {
      p.reloadTimer = 0;
    }
  }

  // --- Auto-Heal (out of combat for 180 frames = ~3 seconds) ---
  if (
    frameCount - bluePlayer.lastCombatTime > 180 &&
    bluePlayer.hp > 0 &&
    bluePlayer.hp < bluePlayer.maxHp
  ) {
    bluePlayer.hp = min(
      bluePlayer.maxHp,
      bluePlayer.hp + bluePlayer.maxHp * 0.002
    );
  }
  if (
    frameCount - redPlayer.lastCombatTime > 180 &&
    redPlayer.hp > 0 &&
    redPlayer.hp < redPlayer.maxHp
  ) {
    redPlayer.hp = min(redPlayer.maxHp, redPlayer.hp + redPlayer.maxHp * 0.002);
  }

  // --- Invisibility Tickers ---
  // Countdown Leon's invisibility timer
  if (bluePlayer.invisTicks > 0) {
    bluePlayer.invisTicks--;
    if (bluePlayer.invisTicks <= 0) bluePlayer.isInvisible = false;
  }
  if (redPlayer.invisTicks > 0) {
    redPlayer.invisTicks--;
    if (redPlayer.invisTicks <= 0) redPlayer.isInvisible = false;
  }

  // --- Movement Logic (With Sliding Collision) ---
  let bRad = bluePlayer.r / 2;
  let rRad = redPlayer.r / 2;
  let nextX, nextY;

  // -- Blue Player Handling (WASD, Dash, or Jump) --
  if (bluePlayer.stunTicks > 0) {
    // If stunned, they cannot move. Render a yellow star above them.
    bluePlayer.stunTicks--;
    if (!bluePlayer.isInvisible) {
      fill("yellow");
      textAlign(CENTER, CENTER);
      textSize(20);
      text("★", bluePlayer.x, bluePlayer.y - bluePlayer.r - 20);
    }
  } else if (bluePlayer.attackWindup > 0) {
    // Immobilized during Frank's windup
  } else if (bluePlayer.jumpTicks > 0) {
    // Jumping logic (Piper/Edgar). This skips wall collision so they hop over!
    bluePlayer.jumpTicks--;
    bluePlayer.x += bluePlayer.jumpVx;
    bluePlayer.y += bluePlayer.jumpVy;
    // Once they land, make sure they aren't stuck inside a wall graphic
    if (bluePlayer.jumpTicks === 0) resolveWallStuck(bluePlayer);
  } else if (bluePlayer.dashTicks > 0) {
    // Mortis dash logic
    bluePlayer.dashTicks--;
    nextX = bluePlayer.x + bluePlayer.dashVx;
    nextY = bluePlayer.y + bluePlayer.dashVy;
    // Move X and Y independently to allow sliding along walls instead of hard stopping
    if (!checkWallCollision(nextX, bluePlayer.y, bRad)) bluePlayer.x = nextX;
    if (!checkWallCollision(bluePlayer.x, nextY, bRad)) bluePlayer.y = nextY;

    // Mortis dash damage check: if he overlaps enemy while dashing, apply damage
    if (
      !bluePlayer.hasDamagedInDash &&
      dist(bluePlayer.x, bluePlayer.y, redPlayer.x, redPlayer.y) <
        bRad + rRad + 20
    ) {
      redPlayer.hp -= bluePlayer.damage;
      redPlayer.lastCombatTime = frameCount;
      bluePlayer.lastCombatTime = frameCount;
      bluePlayer.hits++;
      bluePlayer.hasDamagedInDash = true;
    }
  } else {
    // Normal WASD movement
    nextY = bluePlayer.y;
    if (keyIsDown(87)) nextY -= bluePlayer.speed; // W
    if (keyIsDown(83)) nextY += bluePlayer.speed; // S
    if (!checkWallCollision(bluePlayer.x, nextY, bRad)) bluePlayer.y = nextY;

    nextX = bluePlayer.x;
    if (keyIsDown(65)) nextX -= bluePlayer.speed; // A
    if (keyIsDown(68)) nextX += bluePlayer.speed; // D
    if (!checkWallCollision(nextX, bluePlayer.y, bRad)) bluePlayer.x = nextX;
  }

  // -- Red Player Handling (Arrows, Dash, or Jump) -- (Identical logic to Blue, but uses arrow keys)
  if (redPlayer.stunTicks > 0) {
    redPlayer.stunTicks--;
    if (!redPlayer.isInvisible) {
      fill("yellow");
      textAlign(CENTER, CENTER);
      textSize(20);
      text("★", redPlayer.x, redPlayer.y - redPlayer.r - 20);
    }
  } else if (redPlayer.attackWindup > 0) {
    // Immobilized during Frank's windup
  } else if (redPlayer.jumpTicks > 0) {
    redPlayer.jumpTicks--;
    redPlayer.x += redPlayer.jumpVx;
    redPlayer.y += redPlayer.jumpVy;
    if (redPlayer.jumpTicks === 0) resolveWallStuck(redPlayer);
  } else if (redPlayer.dashTicks > 0) {
    redPlayer.dashTicks--;
    nextX = redPlayer.x + redPlayer.dashVx;
    nextY = redPlayer.y + redPlayer.dashVy;
    if (!checkWallCollision(nextX, redPlayer.y, rRad)) redPlayer.x = nextX;
    if (!checkWallCollision(redPlayer.x, nextY, rRad)) redPlayer.y = nextY;

    if (
      !redPlayer.hasDamagedInDash &&
      dist(redPlayer.x, redPlayer.y, bluePlayer.x, bluePlayer.y) <
        bRad + rRad + 20
    ) {
      bluePlayer.hp -= redPlayer.damage;
      bluePlayer.lastCombatTime = frameCount;
      redPlayer.lastCombatTime = frameCount;
      redPlayer.hits++;
      redPlayer.hasDamagedInDash = true;
    }
  } else {
    nextY = redPlayer.y;
    if (keyIsDown(UP_ARROW)) nextY -= redPlayer.speed;
    if (keyIsDown(DOWN_ARROW)) nextY += redPlayer.speed;
    if (!checkWallCollision(redPlayer.x, nextY, rRad)) redPlayer.y = nextY;

    nextX = redPlayer.x;
    if (keyIsDown(LEFT_ARROW)) nextX -= redPlayer.speed;
    if (keyIsDown(RIGHT_ARROW)) nextX += redPlayer.speed;
    if (!checkWallCollision(nextX, redPlayer.y, rRad)) redPlayer.x = nextX;
  }

  // Constrain players to the screen borders so they can't walk off canvas
  bluePlayer.x = constrain(bluePlayer.x, bRad, width - bRad);
  bluePlayer.y = constrain(bluePlayer.y, bRad, height - bRad);
  redPlayer.x = constrain(redPlayer.x, rRad, width - rRad);
  redPlayer.y = constrain(redPlayer.y, rRad, height - rRad);

  // --- Shooting Input Checks ---
  // If the key is held down, try to execute an attack.
  // shootProjectile() will block it if on cooldown or out of ammo.
  if (keyIsDown(69)) shootProjectile(bluePlayer, redPlayer, false); // E
  if (keyIsDown(81)) shootProjectile(bluePlayer, redPlayer, true); // Q

  if (keyIsDown(16)) shootProjectile(redPlayer, bluePlayer, false); // Shift
  if (keyIsDown(191)) shootProjectile(redPlayer, bluePlayer, true); // /

  // --- Draw Frank Smash Effects (Triangles) ---
  // Loop backwards to safely delete expired items
  for (let i = smashEffects.length - 1; i >= 0; i--) {
    let fx = smashEffects[i];
    fx.life--;
    push();
    translate(fx.x, fx.y);
    rotate(fx.angle);
    // Reduce alpha (transparency) as life goes down to make it fade out
    fill(
      fx.isSuper
        ? color(241, 196, 15, fx.life * 15)
        : color(255, 50, 50, fx.life * 15)
    );
    noStroke();
    beginShape();
    vertex(0, 0);
    let hs = fx.spread / 2;
    vertex(cos(-hs) * fx.range, sin(-hs) * fx.range);
    vertex(cos(hs) * fx.range, sin(hs) * fx.range);
    endShape(CLOSE);
    pop();
    if (fx.life <= 0) smashEffects.splice(i, 1);
  }

  // --- Draw Walls ---
  stroke("#c79f58");
  strokeWeight(4);
  fill("#b88b44"); // Darker sand/rock color
  rectMode(CORNER);
  for (let w of walls) {
    rect(w.x, w.y, w.w, w.h, 10);
  }

  // --- Draw Piper & Dynamike Bombs ---
  for (let i = bombs.length - 1; i >= 0; i--) {
    let b = bombs[i];
    b.ticks--; // Countdown to explosion

    // Draw bomb visual based on character type
    if (b.isDynamike) {
      push();
      fill(b.radius > 50 ? "#8B4513" : "red"); // Barrel is brown, stick is red
      rectMode(CENTER);
      if (b.radius > 50) rect(b.x, b.y, 20, 24, 3);
      else rect(b.x, b.y, 10, 20, 2);
      // Blinking yellow fuse
      if (b.ticks % 10 < 5) {
        fill("yellow");
        circle(b.x, b.y - 10, 6);
      }
      pop();
    } else {
      // Piper Grenade
      fill(0);
      noStroke();
      circle(b.x, b.y, 14);
      if (b.ticks % 10 < 5) {
        fill("red");
        circle(b.x, b.y, 8);
      }
    }

    // Explosion Execution
    if (b.ticks <= 0) {
      // Explode Visual
      fill(255, 100, 0, 150);
      let r = b.radius || 40;
      circle(b.x, b.y, r * 2);

      // --- Wall Breaking for Explosions ---
      let breaksWalls = (b.isDynamike && b.radius > 50) || !b.isDynamike; // Piper bombs and Dyna Super break walls
      if (breaksWalls) {
        for (let j = walls.length - 1; j >= 0; j--) {
          let w = walls[j];
          // Rectangle vs Circle collision to see if explosion hits wall
          let testX = b.x;
          let testY = b.y;
          if (b.x < w.x) testX = w.x;
          else if (b.x > w.x + w.w) testX = w.x + w.w;
          if (b.y < w.y) testY = w.y;
          else if (b.y > w.y + w.h) testY = w.y + w.h;

          let distance = dist(b.x, b.y, testX, testY);
          if (distance <= r) {
            walls.splice(j, 1); // Break wall
          }
        }
      }

      // Check AoE Damage on Players
      if (
        b.owner !== "blue" &&
        dist(b.x, b.y, bluePlayer.x, bluePlayer.y) < bRad + r
      ) {
        bluePlayer.hp -= b.damage;
        redPlayer.hits++;
        bluePlayer.lastCombatTime = frameCount;
      }
      if (
        b.owner !== "red" &&
        dist(b.x, b.y, redPlayer.x, redPlayer.y) < rRad + r
      ) {
        redPlayer.hp -= b.damage;
        bluePlayer.hits++;
        redPlayer.lastCombatTime = frameCount;
      }
      bombs.splice(i, 1); // Remove the bomb after it explodes
    }
  }

  // --- Draw Doug Splashes ---
  for (let i = dougSplashes.length - 1; i >= 0; i--) {
    let ds = dougSplashes[i];
    ds.life--;
    push();
    fill(255, 105, 180, ds.life * 15); // Transparent Pink
    noStroke();
    circle(ds.x, ds.y, ds.radius);
    pop();
    if (ds.life <= 0) dougSplashes.splice(i, 1);
  }

  // --- Draw & Update Barley Puddles ---
  for (let i = puddles.length - 1; i >= 0; i--) {
    let pd = puddles[i];
    pd.ticks--;

    push();
    fill(255, 140, 0, 120); // Orange/Fire puddle
    noStroke();
    circle(pd.x, pd.y, pd.radius * 2);
    pop();

    // Deal tick damage over time (every 30 frames = 0.5s)
    if (pd.ticks % 30 === 0) {
      if (
        pd.owner !== "blue" &&
        dist(pd.x, pd.y, bluePlayer.x, bluePlayer.y) < pd.radius + bRad
      ) {
        bluePlayer.hp -= pd.damage;
        bluePlayer.lastCombatTime = frameCount;
        redPlayer.hits++;
      }
      if (
        pd.owner !== "red" &&
        dist(pd.x, pd.y, redPlayer.x, redPlayer.y) < pd.radius + rRad
      ) {
        redPlayer.hp -= pd.damage;
        redPlayer.lastCombatTime = frameCount;
        bluePlayer.hits++;
      }
    }
    if (pd.ticks <= 0) puddles.splice(i, 1);
  }

  // --- Draw & Update Projectiles ---
  // Iterating backwards is necessary when splicing (deleting) array items so indexes don't shift improperly
  for (let i = projectiles.length - 1; i >= 0; i--) {
    let p = projectiles[i];
    // Move projectile by its velocity
    p.x += p.vx;
    p.y += p.vy;

    // Max Range Deletion
    let travelDist = dist(p.startX, p.startY, p.x, p.y);
    if (travelDist > p.maxRange) {
      p.active = false;
    }

    // --- Colt & Shelly Super Wall Break ---
    if (p.isSuper && (p.brawlerName === "Colt" || p.brawlerName === "Shelly")) {
      for (let j = walls.length - 1; j >= 0; j--) {
        let w = walls[j];
        if (p.x >= w.x && p.x <= w.x + w.w && p.y >= w.y && p.y <= w.y + w.h) {
          walls.splice(j, 1); // Break the wall instantly!
        }
      }
    }

    // Draw the bullet graphics
    noStroke();
    if (p.brawlerName === "Dynamike") {
      push();
      fill(p.isSuper ? "#8B4513" : "red");
      translate(p.x, p.y);
      rotate(frameCount * 0.2); // Make the sticks/barrel spin visually
      rectMode(CENTER);
      if (p.isSuper) rect(0, 0, 20, 24, 3);
      else rect(0, 0, 8, 16, 2);
      pop();
    } else if (p.isSuper) {
      if (p.brawlerName === "Mortis") {
        // Wide purple bat shot for Mortis super
        fill("#8e44ad");
        push();
        translate(p.x, p.y);
        rotate(atan2(p.vy, p.vx));
        ellipse(0, 0, 15, 40);
        pop();
      } else {
        fill("#f1c40f"); // Standard yellow super bullet
        circle(p.x, p.y, 18);
      }
    } else {
      // Standard team-colored bullets
      fill(p.owner === "blue" ? "#3498db" : "#e74c3c");
      circle(p.x, p.y, 14);
    }

    // Wall collision handling
    if (!p.ignoresWalls && checkProjWallCollision(p.x, p.y)) {
      p.active = false;
    }

    // Screen boundary deletion
    if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
      p.active = false;
    }

    // Hit Detection with Players
    let hitRadius = p.isSuper && p.brawlerName === "Mortis" ? 20 : 7;
    let hitEnemy = false;

    // Check collision against Blue Player
    if (
      p.owner !== "blue" &&
      dist(p.x, p.y, bluePlayer.x, bluePlayer.y) < bRad + hitRadius
    ) {
      hitEnemy = true;
      // Barley/Dynamike projectiles don't instantly damage directly (they spawn pools/bombs)
      if (p.brawlerName !== "Barley" && p.brawlerName !== "Dynamike") {
        let dmg = p.damage;
        if (p.brawlerName === "Piper") {
          // Piper damage scaling: 30% damage point blank, 100% damage at max range
          dmg *= constrain(travelDist / p.maxRange, 0.3, 1.0);
        }
        bluePlayer.hp -= dmg;
        bluePlayer.lastCombatTime = frameCount;
        redPlayer.lastCombatTime = frameCount;
        redPlayer.hits++;

        // Special on-hit abilities
        if (p.isSuper && p.brawlerName === "Mortis") {
          redPlayer.hp = min(redPlayer.hp + p.damage, redPlayer.maxHp); // Mortis heal
        }
        if (p.brawlerName === "Edgar") {
          redPlayer.hp = min(redPlayer.hp + dmg * 0.5, redPlayer.maxHp); // Edgar lifesteal
        }
      }
    }
    // Check collision against Red Player
    if (
      p.owner !== "red" &&
      dist(p.x, p.y, redPlayer.x, redPlayer.y) < rRad + hitRadius
    ) {
      hitEnemy = true;
      if (p.brawlerName !== "Barley" && p.brawlerName !== "Dynamike") {
        let dmg = p.damage;
        if (p.brawlerName === "Piper") {
          dmg *= constrain(travelDist / p.maxRange, 0.3, 1.0);
        }
        redPlayer.hp -= dmg;
        redPlayer.lastCombatTime = frameCount;
        bluePlayer.lastCombatTime = frameCount;
        bluePlayer.hits++;

        if (p.isSuper && p.brawlerName === "Mortis") {
          bluePlayer.hp = min(bluePlayer.hp + p.damage, bluePlayer.maxHp);
        }
        if (p.brawlerName === "Edgar") {
          bluePlayer.hp = min(bluePlayer.hp + dmg * 0.5, bluePlayer.maxHp);
        }
      }
    }

    // If bullet hit, mark inactive and flag it
    if (hitEnemy) {
      p.active = false;
      p.hitEnemy = true;
    }

    // If inactive, spawn necessary secondary objects before deleting bullet
    if (!p.active) {
      if (p.brawlerName === "Barley") {
        puddles.push({
          x: p.x,
          y: p.y,
          radius: 45,
          damage: p.damage / 2,
          ticks: 180,
          owner: p.owner,
        });
      } else if (p.brawlerName === "Dynamike") {
        let blastRadius = p.isSuper ? 90 : 45;
        let dmg = p.isSuper ? 4400 : 1600;
        let fuse = p.hitEnemy ? 0 : 30; // Explode instantly if hit enemy directly, else 0.5s fuse on ground
        bombs.push({
          x: p.x,
          y: p.y,
          ticks: fuse,
          damage: dmg,
          owner: p.owner,
          radius: blastRadius,
          isDynamike: true,
        });
      }
      projectiles.splice(i, 1); // Delete bullet array item
    }
  }

  // --- Draw Players ---
  noStroke();

  // Calculate angles so visual weapons point at the enemy.
  // atan2 computes the angle between the two coordinate points.
  let blueAngle = atan2(redPlayer.y - bluePlayer.y, redPlayer.x - bluePlayer.x);
  let redAngle = atan2(bluePlayer.y - redPlayer.y, bluePlayer.x - redPlayer.x);

  // Blue Player Visuals
  if (bluePlayer.hp > 0 && !bluePlayer.isInvisible) {
    // If blue player has enough hits for their super, draw a yellow ring underneath!
    if (bluePlayer.hits >= BRAWLER_STATS[bluePlayer.brawler].hitsToSuper) {
      noFill();
      stroke("yellow");
      strokeWeight(4);
      circle(bluePlayer.x, bluePlayer.y, bluePlayer.r + 15);
      noStroke();
    }

    fill(0, 0, 0, 50); // Small drop shadow
    ellipse(bluePlayer.x, bluePlayer.y + bRad, bluePlayer.r, bRad);
    fill("#3498db"); // Main blue circle
    circle(bluePlayer.x, bluePlayer.y, bluePlayer.r);

    // Call our function to draw the weapon on top
    drawWeapon(bluePlayer, blueAngle);

    // Doug Hotdog Visual (Moved so it sits on top of the blue circle head)
    if (bluePlayer.hotdogTicks > 0) {
      push();
      fill("#d2691e");
      rectMode(CENTER);
      rect(bluePlayer.x, bluePlayer.y - bRad - 5, 24, 10, 5);
      fill("#e74c3c");
      rect(bluePlayer.x, bluePlayer.y - bRad - 5, 28, 6, 5);
      pop();
    }
  }

  // Red Player Visuals
  if (redPlayer.hp > 0 && !redPlayer.isInvisible) {
    if (redPlayer.hits >= BRAWLER_STATS[redPlayer.brawler].hitsToSuper) {
      noFill();
      stroke("yellow");
      strokeWeight(4);
      circle(redPlayer.x, redPlayer.y, redPlayer.r + 15);
      noStroke();
    }

    fill(0, 0, 0, 50);
    ellipse(redPlayer.x, redPlayer.y + rRad, redPlayer.r, rRad);
    fill("#e74c3c");
    circle(redPlayer.x, redPlayer.y, redPlayer.r);

    drawWeapon(redPlayer, redAngle);

    if (redPlayer.hotdogTicks > 0) {
      push();
      fill("#d2691e");
      rectMode(CENTER);
      rect(redPlayer.x, redPlayer.y - rRad - 5, 24, 10, 5);
      fill("#e74c3c");
      rect(redPlayer.x, redPlayer.y - rRad - 5, 28, 6, 5);
      pop();
    }
  }

  // --- Draw Health Bars & Ammo ---
  let barW = 60;
  let barH = 10;
  rectMode(CENTER);

  // Render Blue HUD over character
  if (bluePlayer.hp > 0 && !bluePlayer.isInvisible) {
    fill(0); // Black backing
    rectMode(CENTER);
    rect(bluePlayer.x, bluePlayer.y - bluePlayer.r - 10, barW + 4, barH + 4, 4);
    fill("#2ecc71"); // Green fill
    let hpPctB = max(0, bluePlayer.hp / bluePlayer.maxHp);
    rectMode(CORNER);
    rect(
      bluePlayer.x - barW / 2,
      bluePlayer.y - bluePlayer.r - 10 - barH / 2,
      barW * hpPctB,
      barH,
      2
    );
    fill(255);
    textSize(10);
    textAlign(CENTER, CENTER);
    // Math.floor cleans up decimals generated during auto-heal
    text(
      Math.floor(bluePlayer.hp),
      bluePlayer.x,
      bluePlayer.y - bluePlayer.r - 10
    );

    // Draw segmented Ammo Bar below health
    let ammoY = bluePlayer.y - bluePlayer.r + 2;
    fill(0);
    rectMode(CENTER);
    rect(bluePlayer.x, ammoY, barW + 4, 6, 2);
    rectMode(CORNER);
    let segW = barW / 3;
    for (let i = 0; i < 3; i++) {
      if (i < bluePlayer.ammo) {
        fill("#f39c12"); // Ready Ammo (Orange)
        rect(bluePlayer.x - barW / 2 + i * segW + 1, ammoY - 2, segW - 2, 4, 1);
      } else if (i === bluePlayer.ammo) {
        fill(255, 165, 0, 100); // Reloading Ammo (Faded Orange rendering progress)
        let reloadPct =
          bluePlayer.reloadTimer / BRAWLER_STATS[bluePlayer.brawler].reloadTime;
        rect(
          bluePlayer.x - barW / 2 + i * segW + 1,
          ammoY - 2,
          (segW - 2) * reloadPct,
          4,
          1
        );
      }
    }
  }

  // Render Red HUD over character
  if (redPlayer.hp > 0 && !redPlayer.isInvisible) {
    fill(0);
    rectMode(CENTER);
    rect(redPlayer.x, redPlayer.y - redPlayer.r - 10, barW + 4, barH + 4, 4);
    fill("#2ecc71");
    let hpPctR = max(0, redPlayer.hp / redPlayer.maxHp);
    rectMode(CORNER);
    rect(
      redPlayer.x - barW / 2,
      redPlayer.y - redPlayer.r - 10 - barH / 2,
      barW * hpPctR,
      barH,
      2
    );
    fill(255);
    textSize(10);
    textAlign(CENTER, CENTER);
    text(Math.floor(redPlayer.hp), redPlayer.x, redPlayer.y - redPlayer.r - 10);

    // Draw Ammo Bar
    let ammoY = redPlayer.y - redPlayer.r + 2;
    fill(0);
    rectMode(CENTER);
    rect(redPlayer.x, ammoY, barW + 4, 6, 2);
    rectMode(CORNER);
    let segW = barW / 3;
    for (let i = 0; i < 3; i++) {
      if (i < redPlayer.ammo) {
        fill("#f39c12");
        rect(redPlayer.x - barW / 2 + i * segW + 1, ammoY - 2, segW - 2, 4, 1);
      } else if (i === redPlayer.ammo) {
        fill(255, 165, 0, 100);
        let reloadPct =
          redPlayer.reloadTimer / BRAWLER_STATS[redPlayer.brawler].reloadTime;
        rect(
          redPlayer.x - barW / 2 + i * segW + 1,
          ammoY - 2,
          (segW - 2) * reloadPct,
          4,
          1
        );
      }
    }
  }

  // --- Draw Screen Edge HUD (Stats Displays) ---
  rectMode(CORNER);

  // Blue Screen Corner HUD
  fill(0, 150);
  rect(20, height - 100, 360, 80, 10);
  fill(255);
  textAlign(LEFT, TOP);
  textSize(20);

  // Look up the projectile count to display in the HUD (e.g. 600 (x5))
  let bProj = BRAWLER_STATS[bluePlayer.brawler].projectiles;
  let bDmgText =
    bProj > 1 ? `${bluePlayer.damage} (x${bProj})` : bluePlayer.damage;
  text(`${bluePlayer.brawler} - ATK: ${bDmgText}`, 30, height - 90);

  textSize(14);
  fill(200);
  text(`${bluePlayer.superDesc}\nE to Attack | Q to Super`, 30, height - 60);

  // Red Screen Corner HUD
  fill(0, 150);
  rect(width - 380, height - 100, 360, 80, 10);
  fill(255);
  textAlign(RIGHT, TOP);
  textSize(20);

  let rProj = BRAWLER_STATS[redPlayer.brawler].projectiles;
  let rDmgText =
    rProj > 1 ? `${redPlayer.damage} (x${rProj})` : redPlayer.damage;
  text(`ATK: ${rDmgText} - ${redPlayer.brawler}`, width - 30, height - 90);

  textSize(14);
  fill(200);
  text(
    `${redPlayer.superDesc}\nSHIFT to Attack | / to Super`,
    width - 30,
    height - 60
  );

  // Instructions to exit in top left
  fill(0, 150);
  noStroke();
  textSize(20);
  textAlign(LEFT, TOP);
  text("ESC = Lobby | Blue: WASD | Red: Arrows", 20, 20);

  // Draw round score (Best of 3 Tracking)
  fill("#f1c40f");
  textSize(24);
  textAlign(LEFT, TOP);
  text(`WINS: ${blueWins}`, 20, height - 135);
  textAlign(RIGHT, TOP);
  text(`WINS: ${redWins}`, width - 20, height - 135);

  // --- Win / Tie / Respawn Conditions ---

  // First, check Doug Revive mechanic
  if (bluePlayer.hp <= 0 && bluePlayer.hotdogTicks > 0) {
    bluePlayer.hp = bluePlayer.maxHp;
    bluePlayer.hotdogTicks = 0; // Consume the hotdog
  }
  if (redPlayer.hp <= 0 && redPlayer.hotdogTicks > 0) {
    redPlayer.hp = redPlayer.maxHp;
    redPlayer.hotdogTicks = 0;
  }

  // Check if the round is actually over
  let roundOver = false;
  if (bluePlayer.hp <= 0 && redPlayer.hp <= 0) {
    roundOver = true; // Tie round! No points awarded.
  } else if (bluePlayer.hp <= 0) {
    redWins++;
    roundOver = true;
  } else if (redPlayer.hp <= 0) {
    blueWins++;
    roundOver = true;
  }

  // Process round over logic
  if (roundOver) {
    if (blueWins >= 2 || redWins >= 2) {
      // Match is completely over! Return to Lobby UI
      if (blueWins === redWins) lastWinner = "tie";
      else if (blueWins > redWins) lastWinner = "blue";
      else lastWinner = "red";

      gameState = "LOBBY";
      gameMusic.pause();
      lobbyMusic.play().catch((e) => {});
    } else {
      // Match continues! Reset positions for the next round
      startNextRound();
    }
  }
}

// Optimization: Generates the complicated neon background circles ONCE and saves it to a graphic object.
// This prevents the game from lagging by not having to calculate 100 circles every single frame.
function renderStaticBackground() {
  bgGraphics.background("#1a2a6c");
  let center_x = bgGraphics.width / 2;
  let center_y = bgGraphics.height / 2;

  bgGraphics.noFill();
  // Loop from max screen size down to 0, drawing circles smaller and smaller
  for (let r = max(bgGraphics.width, bgGraphics.height); r > 0; r -= 15) {
    let inter = map(r, 0, max(bgGraphics.width, bgGraphics.height), 0, 1);
    let c = lerpColor(color("#11998e"), color("#38ef7d"), inter); // Smooth color gradient
    bgGraphics.stroke(c);
    bgGraphics.strokeWeight(16);
    bgGraphics.ellipse(center_x, center_y, r, r * 0.8);
  }

  // Add center darkening effect
  bgGraphics.fill(0, 0, 0, 80);
  bgGraphics.noStroke();
  bgGraphics.ellipse(
    bgGraphics.width / 2,
    bgGraphics.height / 2 + 120,
    400,
    100
  );
}

// Simply pastes the pre-rendered image to the screen
function drawBackground() {
  imageMode(CORNER);
  image(bgGraphics, 0, 0);
}

// Renders the pop-up Character Select menus in the Lobby
function drawMenus() {
  let menuItems = ["<- BACK"].concat(brawlerList); // Create array of options
  let itemHeight = height / menuItems.length; // Space them evenly

  if (leftMenuOpen) {
    fill(0, 0, 0, 230); // Transparent black background overlay
    rectMode(CORNER);
    rect(0, 0, width / 2, height);
    // Loop through and draw all character names
    for (let i = 0; i < menuItems.length; i++) {
      let y = i * itemHeight;
      // Hover effect
      if (
        mouseX > 0 &&
        mouseX < width / 2 &&
        mouseY > y &&
        mouseY < y + itemHeight
      ) {
        fill(255, 255, 255, 40);
        rect(0, y, width / 2, itemHeight);
      }
      stroke(255, 255, 255, 50);
      strokeWeight(1);
      line(0, y + itemHeight, width / 2, y + itemHeight);
      if (i === 0) fill(255, 100, 100);
      // Red color for "BACK" button
      else fill(255);
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(min(itemHeight * 0.4, 40));
      text(menuItems[i], width / 4, y + itemHeight / 2 - 5);
    }
  }

  if (rightMenuOpen) {
    fill(0, 0, 0, 230);
    rectMode(CORNER);
    rect(width / 2, 0, width / 2, height);
    for (let i = 0; i < menuItems.length; i++) {
      let y = i * itemHeight;
      if (
        mouseX > width / 2 &&
        mouseX < width &&
        mouseY > y &&
        mouseY < y + itemHeight
      ) {
        fill(255, 255, 255, 40);
        rect(width / 2, y, width / 2, itemHeight);
      }
      stroke(255, 255, 255, 50);
      strokeWeight(1);
      line(width / 2, y + itemHeight, width, y + itemHeight);
      if (i === 0) fill(255, 100, 100);
      else fill(255);
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(min(itemHeight * 0.4, 40));
      text(menuItems[i], width * 0.75, y + itemHeight / 2 - 5);
    }
  }
}

/* =================================================================================
           INPUT EVENTS
           Native p5.js functions that trigger when hardware (mouse, keyboard) is used.
           ================================================================================= */

function mousePressed() {
  // Browsers block auto-playing audio until the user interacts with the page.
  // This catches the first click and starts the music.
  if (gameState === "LOBBY" && lobbyMusic.paused) {
    lobbyMusic
      .play()
      .catch((e) => console.log("Waiting for user to interact..."));
  }

  if (gameState !== "LOBBY") return; // Menu clicks only work in Lobby state

  let menuItems = ["<- BACK"].concat(brawlerList);
  let itemHeight = height / menuItems.length;

  // Handle clicking items in the Left character select menu
  if (leftMenuOpen && mouseX < width / 2) {
    let index = floor(mouseY / itemHeight); // Math to find which index was clicked
    if (index === 0) {
      leftMenuOpen = false; // "BACK" clicked
    } else if (index > 0 && index < menuItems.length) {
      players[0].name = menuItems[index]; // Update selected brawler string
      leftMenuOpen = false;
    }
    return;
  }

  // Handle clicking items in the Right character select menu
  if (rightMenuOpen && mouseX > width / 2) {
    let index = floor(mouseY / itemHeight);
    if (index === 0) {
      rightMenuOpen = false;
    } else if (index > 0 && index < menuItems.length) {
      players[1].name = menuItems[index];
      rightMenuOpen = false;
    }
    return;
  }

  // Loop through our UI buttons and trigger logic if clicked
  for (let btn of buttons) {
    if (btn.isClicked(mouseX, mouseY)) {
      if (btn.id === "play") {
        gameState = "GAME";
        lobbyMusic.pause(); // Pause menu music
        gameMusic.currentTime = 0; // Restart battle music from beginning
        gameMusic.play().catch((e) => {});
        initGame(); // Starts the logic resetting the map and characters
      } else if (btn.id === "brawlers_left") {
        leftMenuOpen = !leftMenuOpen;
      } else if (btn.id === "brawlers_right") {
        rightMenuOpen = !rightMenuOpen;
      }
    }
  }
}

function keyPressed() {
  // keyCode 27 is the ESC key. Allows quitting mid-match.
  if (keyCode === ESCAPE && gameState === "GAME") {
    gameState = "LOBBY";
    gameMusic.pause();
    lobbyMusic.play().catch((e) => {});
  }
}

function windowResized() {
  // Allows the canvas to shrink or grow dynamically if the user resizes the browser window
  resizeCanvas(windowWidth, windowHeight);

  // Since our cached background graphic is size-specific, we have to rebuild it
  bgGraphics = createGraphics(windowWidth, windowHeight);
  renderStaticBackground();

  // Re-run initialization to fix positions based on new screen width
  if (gameState === "LOBBY") initScene();
  else if (gameState === "GAME") initMap();
}
    </script>
