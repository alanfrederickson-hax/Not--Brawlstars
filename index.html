<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrawlStars 2.0</title>
    
    <link rel="icon" type="image/png" href="Brawlogo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script>
let buttons = [];
let players = [];
let lobbyMusic;
let gameMusic;
let customFont;
let controllerSwitch;
let cpuSwitch;

let brawlerList = [
  "Shelly", "Colt", "Leon", "Piper", "Mortis", 
  "Dynamike", "Frank", "Edgar", "Doug", "Barley",
];

let leftMenuOpen = false; 
let rightMenuOpen = false; 
let brawlerImages = {}; 
let bgGraphics; 

let gameState = "SPLASH"; 
let loadedAssets = 0; 
let totalAssets = 0; 
let splashStartBtn;

let lastWinner = null; 
let blueWins = 0; 
let redWins = 0; 
let blueTotalWins = 0; 
let redTotalWins = 0;  
let blueTotalDamage = 0; 
let redTotalDamage = 0;  

let useControllers = false; 
let cpuMode = false;
let showLobbyTitle = true;

// NEW: Game Modes Support
let gameModes = ["KNOCKOUT", "BRAWL BALL", "HEIST"];
let currentModeIndex = 0;
let ball = null;
let safes = [];

let activePlayers = [];
let roundStartFrame = 0;

let walls = [];
let projectiles = [];
let smashEffects = [];
let bombs = [];
let puddles = [];
let dougSplashes = [];

const BRAWLER_STATS = {
  Frank: { hp: 13400, damage: 2480, superDesc: "Stunning Blow: 2.48s Stun", hitsToSuper: 3, projectiles: 1, superProjectiles: 1, range: 160, superRange: 250, reloadTime: 48 }, 
  Piper: { hp: 4800, damage: 3400, superDesc: "Poppin': Jump + 4 Grenades", hitsToSuper: 3, projectiles: 1, superProjectiles: 4, range: 700, reloadTime: 138 }, 
  Dynamike: { hp: 5600, damage: 1600, superDesc: "Big Barrel o' Boom: 4,400 dmg", hitsToSuper: 4, projectiles: 2, superProjectiles: 1, range: 350, reloadTime: 102 }, 
  Mortis: { hp: 7600, damage: 1880, superDesc: "Life Blood: 1,800 dmg + Heal", hitsToSuper: 5, projectiles: 0, superProjectiles: 1, range: 200, reloadTime: 144 }, 
  Doug: { hp: 10000, damage: 2400, superDesc: "Second Serving: Revive Ally", hitsToSuper: 3, projectiles: 1, superProjectiles: 1, range: 250, reloadTime: 90 }, 
  Barley: { hp: 4800, damage: 1600, superDesc: "Last Call: AoE Fire Puddles", hitsToSuper: 5, projectiles: 1, superProjectiles: 5, range: 450, reloadTime: 120 }, 
  Leon: { hp: 6400, damage: 960, superDesc: "Smoke Bomb: Invisibility", hitsToSuper: 9, projectiles: 4, superProjectiles: 0, range: 500, reloadTime: 114 }, 
  Shelly: { hp: 7400, damage: 600, superDesc: "Super Shell: Knockback/Dmg", hitsToSuper: 10, projectiles: 5, superProjectiles: 9, range: 400, reloadTime: 90 }, 
  Colt: { hp: 5600, damage: 720, superDesc: "Bullet Storm: 12 Bullets", hitsToSuper: 12, projectiles: 6, superProjectiles: 12, range: 550, reloadTime: 102 }, 
  Edgar: { hp: 6600, damage: 1080, superDesc: "Vault: Jump + Speed Boost", hitsToSuper: 12, projectiles: 2, superProjectiles: 0, range: 150, reloadTime: 42 }, 
};

class ToggleSwitch {
  constructor(x, y, w, h, label, initialState, onToggleCallback) {
    this.x = x; this.y = y; this.w = w; this.h = h; this.label = label;
    this.hover = false; this.state = initialState; this.knobPos = this.state ? 1 : 0;
    this.onToggle = onToggleCallback;
  }
  update(mx, my) {
    this.hover = (mx > this.x - this.w / 2 && mx < this.x + this.w / 2 && my > this.y - this.h / 2 && my < this.y + this.h / 2);
    this.knobPos = lerp(this.knobPos, this.state ? 1 : 0, 0.2);
  }
  draw() {
    push(); translate(this.x, this.y);
    fill(255); noStroke(); textAlign(CENTER, BOTTOM); textSize(20); text(this.label, 0, -this.h / 2 - 5);
    let bgCol = lerpColor(color("#34495e"), color("#e74c3c"), this.knobPos);
    fill(bgCol);
    if (this.hover) { stroke(255, 255, 255, 100); strokeWeight(3); } else { noStroke(); }
    rectMode(CENTER); rect(0, 0, this.w, this.h, this.h); 
    let knobTravel = this.w - this.h; 
    let knobX = map(this.knobPos, 0, 1, -knobTravel / 2, knobTravel / 2);
    fill(0, 50); noStroke(); circle(knobX, 2, this.h * 0.8);
    fill(255); circle(knobX, 0, this.h * 0.8);
    pop();
  }
  isClicked() {
    if (this.hover) { this.state = !this.state; if (this.onToggle) this.onToggle(this.state); return true; }
    return false;
  }
}

class Button {
  constructor(id, text, x, y, w, h, baseColor, textColor) {
    this.id = id; this.text = text; this.x = x; this.y = y; this.w = w; this.h = h; 
    this.baseColor = color(baseColor);
    this.shadowColor = color(red(this.baseColor) * 0.7, green(this.baseColor) * 0.7, blue(this.baseColor) * 0.7);
    this.textColor = color(textColor); this.hover = false; this.scale = 1.0; 
  }
  update(mx, my) {
    this.hover = (mx > this.x - this.w / 2 && mx < this.x + this.w / 2 && my > this.y - this.h / 2 && my < this.y + this.h / 2);
    this.scale = lerp(this.scale, this.hover ? 1.1 : 1.0, 0.2);
  }
  draw() {
    push(); translate(this.x, this.y); scale(this.scale); 
    fill(this.shadowColor); noStroke(); rectMode(CENTER); rect(0, 8, this.w, this.h, 15); 
    fill(this.baseColor); stroke(0); strokeWeight(4); rect(0, 0, this.w, this.h, 15);
    fill(this.textColor); noStroke(); textAlign(CENTER, CENTER); textSize(this.h * 0.45); text(this.text, 0, -this.h * 0.05); 
    pop(); 
  }
  isClicked() { return this.hover; }
}

class Player {
  constructor(id, name, offsetX, col) {
    this.id = id; this.name = name; this.offsetX = offsetX; this.color = color(col); this.yOffset = 0; 
  }
  draw() {
    let px = width / 2 + this.offsetX; let py = height / 2 + 50 + this.yOffset;
    push(); fill(0, 0, 0, 100); noStroke(); ellipse(px, height / 2 + 130, 100, 30);
    let img = brawlerImages[this.name];
    if (img && img.width > 10 && img.height > 10) { 
      let drawH = 160; let drawW = drawH * (img.width / img.height); 
      imageMode(CENTER); image(img, px, py, drawW, drawH);
    }
    fill(0, 150); noStroke(); rectMode(CORNER);
    rect(px - textWidth(this.name) / 2 - 10, py - 115, textWidth(this.name) + 20, 30, 5);
    fill(255); textAlign(CENTER, CENTER); textSize(20); text(this.name, px, py - 100);
    pop();
    if (lastWinner === this.id) {
      push(); fill("#f1c40f"); stroke(0); strokeWeight(2);
      beginShape(); vertex(px - 20, py - 130); vertex(px - 25, py - 160); vertex(px - 10, py - 145); 
      vertex(px, py - 165); vertex(px + 10, py - 145); vertex(px + 25, py - 160); vertex(px + 20, py - 130); 
      endShape(CLOSE); pop();
    }
  }
  update() { this.yOffset = sin(frameCount * 0.05 + this.offsetX) * 5; }
}

function preload() {
  let isPreview = window.location.protocol === 'data:' || window.location.protocol === 'blob:' || window.location.hostname.includes("usercontent.goog");
  if (!isPreview) {
    try { loadFont('./LilitaOne.ttf', (f) => { customFont = f; }); } catch (e) {}
  }
  loadImage('Brawlogo.png', (img) => { brawlerImages["Logo"] = img; }, (err) => {});
}

function beginLoadingAssets() {
  let toLoad = [
    {name: "Doug", path: "./Doug.webp"}, {name: "Leon", path: "./Leon.webp"}, {name: "Shelly", path: "./Shelly.webp"},
    {name: "Frank", path: "./Frank.webp"}, {name: "Edgar", path: "./edgar.gif"}, {name: "Barley", path: "./Barley.webp"},
    {name: "Dynamike", path: "./Dynamike.webp"}, {name: "Colt", path: "./Colt.webp"}, {name: "Mortis", path: "./Mortis.png"},
    {name: "Piper", path: "./Piper.webp"}, {name: "ShellyWeapon", path: "./shotgun.png"}
  ];
  totalAssets = toLoad.length; loadedAssets = 0;
  for(let item of toLoad) {
    loadImage(item.path, (img) => { brawlerImages[item.name] = img; loadedAssets++; }, (err) => { loadedAssets++; });
  }
}

p5.disableFriendlyErrors = true;

function setup() {
  setAttributes('alpha', false);
  createCanvas(windowWidth, windowHeight, P2D);
  frameRate(60); 
  
  if (customFont) textFont(customFont); else textFont('Lilita One'); 

  bgGraphics = createGraphics(windowWidth, windowHeight);
  renderStaticBackground();

  lobbyMusic = new Audio("https://files.catbox.moe/re03vh.mp3"); lobbyMusic.loop = true; lobbyMusic.volume = 0.4; 
  gameMusic = new Audio("https://files.catbox.moe/pswebv.mp3"); gameMusic.loop = true; gameMusic.volume = 0.4;

  initScene();
}

function initScene() {
  buttons = []; players = []; 
  players.push(new Player("blue", "Shelly", -100, "#3498db"));
  players.push(new Player("red", "Shelly", 100, "#e74c3c"));

  let playW = min(width * 0.25, 250); let playH = playW * 0.35;
  let playX = width - playW / 2 - 40; let playY = height - playH / 2 - 40;
  
  buttons.push(new Button("play", "PLAY", playX, playY, playW, playH, "#f1c40f", "#ffffff"));
  controllerSwitch = new ToggleSwitch(playX, playY - playH / 2 - 50, 80, 36, "Controller Mode", useControllers, (val) => useControllers = val);

  buttons.push(new Button("mode_select", "MODE: " + gameModes[currentModeIndex], 150, height - 50, 220, 50, "#e67e22", "#ffffff"));
  cpuSwitch = new ToggleSwitch(150, height - 130, 80, 36, "CPU MATCH (3v3)", cpuMode, (val) => cpuMode = val);

  let sideBtnW = min(width * 0.15, 180); let sideBtnH = sideBtnW * 0.4;
  buttons.push(new Button("brawlers_left", "BRAWLERS", sideBtnW / 2 + 20, height / 2, sideBtnW, sideBtnH, "#9b59b6", "#ffffff"));
  buttons.push(new Button("brawlers_right", "BRAWLERS", width - sideBtnW / 2 - 20, height / 2, sideBtnW, sideBtnH, "#2ecc71", "#ffffff"));
}

function initMap() {
  walls = []; 
  let mode = gameModes[currentModeIndex];
  
  if (mode === "BRAWL BALL") {
    // Brawl Ball Specific Map - Goals covered by long center walls, open middle
    walls.push({ x: width * 0.15, y: height / 2 - 150, w: 60, h: 300 }); 
    walls.push({ x: width * 0.85 - 60, y: height / 2 - 150, w: 60, h: 300 });
  } else {
    // Knockout & Heist Map
    walls.push({ x: width / 2 - 40, y: height / 2 - 100, w: 80, h: 200 }); 
    walls.push({ x: width / 2 - 150, y: height * 0.15, w: 300, h: 60 });   
    walls.push({ x: width / 2 - 150, y: height * 0.85 - 60, w: 300, h: 60 }); 
    walls.push({ x: width * 0.2, y: height * 0.3, w: 60, h: 250 });        
    walls.push({ x: width * 0.8 - 60, y: height * 0.4, w: 60, h: 250 });   
  }
}

function getRandomBrawler(excludeList) {
  let available = brawlerList.filter(b => !excludeList.includes(b));
  return available.length === 0 ? brawlerList[0] : available[Math.floor(Math.random() * available.length)];
}

function createPlayerObject(id, team, brawlerName, isBot) {
  let stats = BRAWLER_STATS[brawlerName];
  return {
    id: id, team: team, brawler: brawlerName, isBot: isBot,
    x: 0, y: 0, startX: 0, startY: 0, r: 35, speed: isBot ? 3.5 : 4, cooldown: 0, maxCooldown: 30, 
    hits: 0, ammo: 3, reloadTimer: 0, lastCombatTime: 0, dashTicks: 0, dashVx: 0, dashVy: 0, hasDamagedInDash: false,
    hp: stats.hp, maxHp: stats.hp, damage: stats.damage, superDesc: stats.superDesc,
    stunTicks: 0, attackWindup: 0, leonShots: 0, edgarShots: 0, coltShots: 0, jumpTicks: 0, isInvisible: false, invisTicks: 0, hotdogTicks: 0,
    aimingSuper: false, prevRB: false, respawnTimer: 0, superCooldown: 0
  };
}

function initGame() {
  blueWins = 0; redWins = 0; initMap(); 

  activePlayers = [];
  let p1Name = players[0].name; let p2Name = players[1].name;

  if (cpuMode) {
    let bTeam = [p1Name];
    activePlayers.push(createPlayerObject("blue1", "blue", bTeam[0], false));
    bTeam.push(getRandomBrawler(bTeam)); activePlayers.push(createPlayerObject("blue2", "blue", bTeam[1], true)); 
    bTeam.push(getRandomBrawler(bTeam)); activePlayers.push(createPlayerObject("blue3", "blue", bTeam[2], true)); 

    let rTeam = [];
    rTeam.push(getRandomBrawler(rTeam)); activePlayers.push(createPlayerObject("red1", "red", rTeam[0], true)); 
    rTeam.push(getRandomBrawler(rTeam)); activePlayers.push(createPlayerObject("red2", "red", rTeam[1], true)); 
    rTeam.push(getRandomBrawler(rTeam)); activePlayers.push(createPlayerObject("red3", "red", rTeam[2], true)); 
  } else {
    activePlayers.push(createPlayerObject("blue1", "blue", p1Name, false));
    activePlayers.push(createPlayerObject("red1", "red", p2Name, false));
  }
  startNextRound();
}

function startNextRound() {
  projectiles = []; smashEffects = []; bombs = []; puddles = []; dougSplashes = [];
  roundStartFrame = frameCount;
  ball = null; safes = [];

  let mode = gameModes[currentModeIndex];
  if (mode === "BRAWL BALL") {
    ball = {x: width / 2, y: height / 2, vx: 0, vy: 0, owner: null};
  } else if (mode === "HEIST") {
    safes.push({id: "blueSafe", team: "blue", hp: 58000, maxHp: 58000, x: width * 0.08, y: height / 2, r: 80});
    safes.push({id: "redSafe", team: "red", hp: 58000, maxHp: 58000, x: width * 0.92, y: height / 2, r: 80});
  }

  let bCount = 0; let rCount = 0;
  for (let p of activePlayers) {
    if (p.team === "blue") {
      p.x = width * 0.1; p.y = bCount === 0 ? height * 0.5 : (bCount === 1 ? height * 0.25 : height * 0.75); bCount++;
    } else {
      p.x = width * 0.9; p.y = rCount === 0 ? height * 0.5 : (rCount === 1 ? height * 0.25 : height * 0.75); rCount++;
    }
    p.startX = p.x; p.startY = p.y;
    p.hp = p.maxHp; p.cooldown = 0; p.ammo = 3; p.reloadTimer = 0; p.stunTicks = 0; p.attackWindup = 0;
    p.leonShots = 0; p.edgarShots = 0; p.coltShots = 0; p.lastCombatTime = frameCount; 
    p.dashTicks = 0; p.jumpTicks = 0; p.isInvisible = false; p.invisTicks = 0; p.hotdogTicks = 0;
    p.aimingSuper = false; p.prevRB = false; p.respawnTimer = 0; p.superCooldown = 0;
  }
}

function checkWallCollision(px, py, radius) {
  let rSq = radius * radius;
  for (let w of walls) {
    let cx = constrain(px, w.x, w.x + w.w); let cy = constrain(py, w.y, w.y + w.h);
    let dx = px - cx; let dy = py - cy;
    if ((dx * dx + dy * dy) < rSq) return true; 
  }
  return false; 
}

function checkProjWallCollision(px, py) {
  for (let w of walls) { if (px >= w.x && px <= w.x + w.w && py >= w.y && py <= w.y + w.h) return true; }
  return false;
}

function addDamage(ownerId, amount) {
  if (ownerId === "blue1") blueTotalDamage += amount;
  else if (ownerId === "red1" && !cpuMode) redTotalDamage += amount;
}

function checkLineOfSight(x1, y1, x2, y2) {
  let d = dist(x1, y1, x2, y2); let steps = Math.max(1, d / 25); 
  for (let i = 0; i <= steps; i++) {
    if (checkProjWallCollision(lerp(x1, x2, i / steps), lerp(y1, y2, i / steps))) return false; 
  }
  return true; 
}

function resolveWallStuck(player) {
  let pRad = player.r / 2;
  for (let w of walls) {
    if (player.x + pRad > w.x && player.x - pRad < w.x + w.w && player.y + pRad > w.y && player.y - pRad < w.y + w.h) {
      let distLeft = Math.abs(player.x + pRad - w.x); let distRight = Math.abs(player.x - pRad - (w.x + w.w));
      let distTop = Math.abs(player.y + pRad - w.y); let distBottom = Math.abs(player.y - pRad - (w.y + w.h));
      let minD = Math.min(distLeft, distRight, distTop, distBottom);
      if (minD === distLeft) player.x = w.x - pRad; else if (minD === distRight) player.x = w.x + w.w + pRad;
      else if (minD === distTop) player.y = w.y - pRad; else if (minD === distBottom) player.y = w.y + w.h + pRad;
    }
  }
}

// Bot Math - Checks enemies & safes seamlessly!
function getNearestEnemy(player) {
  let nearest = null; let minDistSq = Infinity;
  for (let e of activePlayers) {
    if (e.team !== player.team && e.hp > 0 && !e.isInvisible) {
      let dx = player.x - e.x; let dy = player.y - e.y; let dSq = dx * dx + dy * dy;
      if (dSq < minDistSq) { minDistSq = dSq; nearest = e; }
    }
  }
  if (gameModes[currentModeIndex] === "HEIST") {
    for (let s of safes) {
      if (s.team !== player.team && s.hp > 0) {
        let dx = player.x - s.x; let dy = player.y - s.y; let dSq = dx * dx + dy * dy;
        if (dSq < minDistSq) { minDistSq = dSq; nearest = s; }
      }
    }
  }
  return { target: nearest, distSq: minDistSq };
}

function shootProjectile(shooter, target, isSuper = false, overrideAngle = null) {
  if (shooter.stunTicks > 0 || shooter.attackWindup > 0) return; 
  if (isSuper && shooter.superCooldown > 0) return;
  if (!isSuper && shooter.cooldown > 0) return;

  // NEW: Ball Shooting Logic overrides normal weapons!
  if (gameModes[currentModeIndex] === "BRAWL BALL" && ball && ball.owner === shooter.id) {
    if (isSuper) { 
      if (shooter.hits < BRAWLER_STATS[shooter.brawler].hitsToSuper) return; 
      shooter.hits = 0; 
    } else { 
      if (shooter.ammo <= 0) return; 
      shooter.ammo--; 
    }
    let bAngle = overrideAngle !== null ? overrideAngle : random(TWO_PI);
    
    if (overrideAngle === null) {
      let targetGoalX = shooter.team === "blue" ? width : 0;
      bAngle = atan2(height / 2 - shooter.y, targetGoalX - shooter.x);
    }
    
    ball.owner = null;
    ball.vx = cos(bAngle) * (isSuper ? 25 : 15);
    ball.vy = sin(bAngle) * (isSuper ? 25 : 15);
    ball.x += ball.vx * 2; ball.y += ball.vy * 2; // Offset it slightly so they don't instapickup
    
    if (isSuper) shooter.superCooldown = shooter.maxCooldown; else shooter.cooldown = shooter.maxCooldown;
    shooter.lastCombatTime = frameCount;
    return; 
  }

  if (isSuper) { if (shooter.hits < BRAWLER_STATS[shooter.brawler].hitsToSuper) return; } 
  else { if (shooter.ammo <= 0) return; }

  if (isSuper) shooter.hits = 0; else shooter.ammo--; 
  shooter.lastCombatTime = frameCount; 

  if (!(shooter.brawler === "Leon" && isSuper)) { shooter.isInvisible = false; shooter.invisTicks = 0; }

  let angle = overrideAngle !== null ? overrideAngle : random(TWO_PI);
  if (target && overrideAngle === null && !target.isInvisible) angle = atan2(target.y - shooter.y, target.x - shooter.x);

  if (shooter.brawler === "Doug") {
    if (isSuper) { shooter.hotdogTicks = 900; } else {
      shooter.hp = Math.min(shooter.hp + 480, shooter.maxHp);
      let aoeRadius = BRAWLER_STATS["Doug"].range / 2;
      dougSplashes.push({ x: shooter.x, y: shooter.y, radius: aoeRadius*2, life: 15, team: shooter.team, owner: shooter.id, damage: shooter.damage });
      for (let e of activePlayers) {
        if (e.team !== shooter.team && e.hp > 0) {
          let dx = shooter.x - e.x; let dy = shooter.y - e.y; let threshold = aoeRadius + e.r / 2;
          if (dx*dx + dy*dy < threshold*threshold) { e.hp -= shooter.damage; addDamage(shooter.id, shooter.damage); shooter.hits++; e.lastCombatTime = frameCount; }
        }
      }
    }
    if (isSuper) shooter.superCooldown = shooter.maxCooldown; else shooter.cooldown = shooter.maxCooldown; 
    return; 
  }

  if (shooter.brawler === "Barley" && isSuper) {
    let cx = shooter.x + cos(angle) * BRAWLER_STATS["Barley"].range; let cy = shooter.y + sin(angle) * BRAWLER_STATS["Barley"].range;
    let offsets = [[0, 0], [-60, -60], [60, -60], [-60, 60], [60, 60]];
    for (let off of offsets) {
      let tx = cx + off[0]; let ty = cy + off[1];
      projectiles.push({ x: shooter.x, y: shooter.y, startX: shooter.x, startY: shooter.y, maxRange: dist(shooter.x, shooter.y, tx, ty), brawlerName: shooter.brawler, vx: cos(atan2(ty - shooter.y, tx - shooter.x)) * 12, vy: sin(atan2(ty - shooter.y, tx - shooter.x)) * 12, damage: shooter.damage, owner: shooter.id, ownerTeam: shooter.team, ignoresWalls: true, isSuper: true, active: true, });
    }
    shooter.superCooldown = shooter.maxCooldown; return; 
  }

  if (shooter.brawler === "Leon" && isSuper) { shooter.isInvisible = true; shooter.invisTicks = 360; shooter.superCooldown = shooter.maxCooldown; return; }

  if (shooter.brawler === "Piper" && isSuper) {
    shooter.jumpTicks = 45; shooter.jumpVx = cos(angle + PI) * (350 / 45); shooter.jumpVy = sin(angle + PI) * (350 / 45);
    let offsets = [[-15, -15], [15, -15], [-15, 15], [15, 15]];
    for (let off of offsets) bombs.push({ x: shooter.x + off[0], y: shooter.y + off[1], ticks: 60, damage: 1800, owner: shooter.id, ownerTeam: shooter.team });
    shooter.superCooldown = shooter.maxCooldown; return;
  }

  if (shooter.brawler === "Edgar" && isSuper) {
    shooter.jumpTicks = 45; let jumpDist = (target && target.isInvisible) ? 300 : Math.min(400, target ? dist(shooter.x, shooter.y, target.x, target.y) : 300);
    shooter.jumpVx = cos(angle) * (jumpDist / 45); shooter.jumpVy = sin(angle) * (jumpDist / 45); shooter.superCooldown = shooter.maxCooldown; return;
  }

  if (shooter.brawler === "Mortis") {

  let menuItems = ["<- BACK"].concat(brawlerList); let itemHeight = height / menuItems.length;
  if (leftMenuOpen && mouseX < width / 2) {
    let index = floor(mouseY / itemHeight); if (index === 0) leftMenuOpen = false; else if (index > 0 && index < menuItems.length) { players[0].name = menuItems[index]; leftMenuOpen = false; }
    return;
  }
  if (rightMenuOpen && mouseX > width / 2) {
    let index = floor(mouseY / itemHeight); if (index === 0) rightMenuOpen = false; else if (index > 0 && index < menuItems.length) { players[1].name = menuItems[index]; rightMenuOpen = false; }
    return;
  }
  if (controllerSwitch && controllerSwitch.isClicked()) return; 
  if (cpuSwitch && cpuSwitch.isClicked()) return; 

  for (let btn of buttons) {
    if (btn.isClicked()) {
      if (btn.id === "play") { gameState = "GAME"; lobbyMusic.pause(); gameMusic.currentTime = 0; gameMusic.play().catch((e) => {}); initGame(); } 
      else if (btn.id === "brawlers_left") leftMenuOpen = !leftMenuOpen; 
      else if (btn.id === "brawlers_right") rightMenuOpen = !rightMenuOpen;
      else if (btn.id === "mode_select") {
        currentModeIndex = (currentModeIndex + 1) % gameModes.length;
        btn.text = "MODE: " + gameModes[currentModeIndex];
      }
    }
  }
}

function keyPressed() {
  if (keyCode === ESCAPE && gameState === "GAME") { gameState = "LOBBY"; gameMusic.pause(); lobbyMusic.play().catch((e) => {}); }
  if ((key === 't' || key === 'T') && gameState === "LOBBY") showLobbyTitle = !showLobbyTitle;
}

function windowResized() {
  if (windowWidth > 0 && windowHeight > 0) {
    resizeCanvas(windowWidth, windowHeight); bgGraphics = createGraphics(windowWidth, windowHeight); renderStaticBackground();
    if (gameState === "LOBBY") initScene(); else if (gameState === "GAME") initMap();
  }
}
    </script>
