class ToggleSwitch {
  constructor(x, y, w, h, label) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.label = label;
    this.hover = false;
    this.knobPos = useControllers ? 1 : 0;
  }

  update(mx, my) {
    if (mx > this.x - this.w / 2 && mx < this.x + this.w / 2 && my > this.y - this.h / 2 && my < this.y + this.h / 2) {
      this.hover = true;
    } else {
      this.hover = false;
    }

    let target = useControllers ? 1 : 0;
    this.knobPos = lerp(this.knobPos, target, 0.2);
  }

  draw() {
    push();
    translate(this.x, this.y);

    fill(255);
    noStroke();
    textAlign(CENTER, BOTTOM);
    textSize(20);
    text(this.label, 0, -this.h / 2 - 5);

    let bgCol = lerpColor(color("#34495e"), color("#e74c3c"), this.knobPos);
    fill(bgCol);
    
    if (this.hover) {
      stroke(255, 255, 255, 100);
      strokeWeight(3);
    } else {
      noStroke();
    }
    
    rectMode(CENTER);
    rect(0, 0, this.w, this.h, this.h); 

    let knobTravel = this.w - this.h; 
    let knobX = map(this.knobPos, 0, 1, -knobTravel / 2, knobTravel / 2);
    
    fill(0, 50);
    noStroke();
    circle(knobX, 2, this.h * 0.8);
    
    fill(255);
    circle(knobX, 0, this.h * 0.8);

    pop();
  }

  isClicked(mx, my) {
    if (this.hover) {
      useControllers = !useControllers; 
      return true;
    }
    return false;
  }
}

class Button {
  constructor(id, text, x, y, w, h, baseColor, textColor) {
    this.id = id;
    this.text = text;
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h; 
    this.baseColor = color(baseColor);
    this.shadowColor = color(
      red(this.baseColor) * 0.7,
      green(this.baseColor) * 0.7,
      blue(this.baseColor) * 0.7
    );
    this.textColor = color(textColor);
    this.hover = false; 
    this.scale = 1.0; 
  }

  update(mx, my) {
    if (
      mx > this.x - this.w / 2 &&
      mx < this.x + this.w / 2 &&
      my > this.y - this.h / 2 &&
      my < this.y + this.h / 2
    ) {
      this.hover = true;
      this.scale = lerp(this.scale, 1.1, 0.2);
    } else {
      this.hover = false;
      this.scale = lerp(this.scale, 1.0, 0.2); 
    }
  }

  draw() {
    push();
    translate(this.x, this.y); 
    scale(this.scale); 

    fill(this.shadowColor);
    noStroke();
    rectMode(CENTER);
    rect(0, 8, this.w, this.h, 15); 

    fill(this.baseColor);
    stroke(0);
    strokeWeight(4);
    rect(0, 0, this.w, this.h, 15);

    fill(this.textColor);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(this.h * 0.45);
    text(this.text, 0, -this.h * 0.05); 
    pop(); 
  }

  isClicked(mx, my) {
    return this.hover; 
  }
}

class Player {
  constructor(id, name, offsetX, col) {
    this.id = id; 
    this.name = name; 
    this.offsetX = offsetX; 
    this.color = color(col);
    this.yOffset = 0; 
  }

  draw() {
    let px = width / 2 + this.offsetX;
    let py = height / 2 + 50 + this.yOffset;

    push();
    fill(0, 0, 0, 100);
    noStroke();
    ellipse(px, height / 2 + 130, 100, 30);

    let img = brawlerImages[this.name];
    
    if (img && img.width > 10 && img.height > 10) { 
      let aspect = img.width / img.height; 
      let drawH = 160; 
      let drawW = drawH * aspect; 
      imageMode(CENTER);
      image(img, px, py, drawW, drawH);
    }

    fill(0, 150);
    noStroke();
    rectMode(CORNER);
    rect(
      px - textWidth(this.name) / 2 - 10,
      py - 115,
      textWidth(this.name) + 20,
      30,
      5
    );
    fill(255);
    textAlign(CENTER, CENTER);
    textSize(20);

      vertex(px + 25, py - 160); 
      vertex(px + 20, py - 130); 
      endShape(CLOSE); 
      pop();
    }
  }

  update() {
    this.yOffset = sin(frameCount * 0.05 + this.offsetX) * 5;
  }
}

function checkWallCollision(px, py, radius) {
  for (let w of walls) {
    let cx = constrain(px, w.x, w.x + w.w); 
    let cy = constrain(py, w.y, w.y + w.h);
    let distSq = (px - cx) * (px - cx) + (py - cy) * (py - cy);
    if (distSq < radius * radius) {
      return true; 
    }
  }
  return false; 
}

function checkProjWallCollision(px, py) {
  for (let w of walls) {
    if (px >= w.x && px <= w.x + w.w && py >= w.y && py <= w.y + w.h) {
      return true;
    }
  }
  return false;
}

function checkLineOfSight(x1, y1, x2, y2) {
  let d = dist(x1, y1, x2, y2);
  let steps = Math.max(1, d / 10); // Check every 10 pixels along the path
  for (let i = 0; i <= steps; i++) {
    let px = lerp(x1, x2, i / steps);
    let py = lerp(y1, y2, i / steps);
    if (checkProjWallCollision(px, py)) {
      return false; // The line of sight hit a wall!
    }
  }
  return true; // The path is clear
}

function resolveWallStuck(player) {
  let pRad = player.r / 2;
  for (let w of walls) {
    if (
      player.x + pRad > w.x &&
      player.x - pRad < w.x + w.w &&
      player.y + pRad > w.y &&
      player.y - pRad < w.y + w.h
    ) {
      let distLeft = Math.abs(player.x + pRad - w.x);
      let distRight = Math.abs(player.x - pRad - (w.x + w.w));
      let distTop = Math.abs(player.y + pRad - w.y);
      let distBottom = Math.abs(player.y - pRad - (w.y + w.h));

      let minD = Math.min(distLeft, distRight, distTop, distBottom);
      if (minD === distLeft) player.x = w.x - pRad;
      else if (minD === distRight) player.x = w.x + w.w + pRad;
      else if (minD === distTop) player.y = w.y - pRad;
      else if (minD === distBottom) player.y = w.y + w.h + pRad;
    }
  }
}

function shootProjectile(shooter, target, isSuper = false, overrideAngle = null) {
  if (shooter.cooldown > 0 || shooter.stunTicks > 0) return; 

  if (isSuper) {
    let requiredHits = BRAWLER_STATS[shooter.brawler].hitsToSuper;
    if (shooter.hits < requiredHits) return; 
  } else {
    if (shooter.ammo <= 0) return;
  }

  if (isSuper) {
    shooter.hits = 0; 
  } else {
    shooter.ammo--; 
  }

  shooter.lastCombatTime = frameCount; 

  if (!(shooter.brawler === "Leon" && isSuper)) {
    shooter.isInvisible = false;
    shooter.invisTicks = 0;
  }

  let angle;
  if (overrideAngle !== null) {
    angle = overrideAngle;
  } else if (target.isInvisible) {
    angle = random(TWO_PI);
  } else {
    angle = atan2(target.y - shooter.y, target.x - shooter.x);
  }

  if (shooter.brawler === "Doug") {
    if (isSuper) {
      shooter.hotdogTicks = 900; 
    } else {
      shooter.hp = Math.min(shooter.hp + 480, shooter.maxHp);
      let aoeRadius = BRAWLER_STATS["Doug"].range / 2;
      dougSplashes.push({
        x: shooter.x,
        y: shooter.y,
        radius: BRAWLER_STATS["Doug"].range,
        life: 15,
      });
      if (dist(shooter.x, shooter.y, target.x, target.y) < aoeRadius + target.r / 2) {
        target.hp -= shooter.damage;
        if (shooter.id === "blue") blueTotalDamage += shooter.damage;
        else redTotalDamage += shooter.damage;
        shooter.hits++;
        target.lastCombatTime = frameCount;
      }
    }
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }

  if (shooter.brawler === "Barley" && isSuper) {
    let cx = shooter.x + cos(angle) * BRAWLER_STATS["Barley"].range;
    let cy = shooter.y + sin(angle) * BRAWLER_STATS["Barley"].range;
    let spacing = 60;
    let offsets = [[0, 0], [-spacing, -spacing], [spacing, -spacing], [-spacing, spacing], [spacing, spacing]];

    for (let off of offsets) {
      let tx = cx + off[0];
      let ty = cy + off[1];
      let tAngle = atan2(ty - shooter.y, tx - shooter.x); 
      let tDist = dist(shooter.x, shooter.y, tx, ty);     

      projectiles.push({
        x: shooter.x, y: shooter.y, startX: shooter.x, startY: shooter.y,
        maxRange: tDist, brawlerName: shooter.brawler,
        vx: cos(tAngle) * 12, vy: sin(tAngle) * 12, damage: shooter.damage,
        owner: shooter.id, ignoresWalls: true, isSuper: true, active: true,
      });
    }
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }

  if (shooter.brawler === "Leon" && isSuper) {
    shooter.isInvisible = true;
    shooter.invisTicks = 360; 
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }

  if (shooter.brawler === "Piper" && isSuper) {
    let jumpAngle = angle + PI;
    shooter.jumpTicks = 45; 
    let jumpDist = 350;     

    shooter.jumpVx = cos(jumpAngle) * (jumpDist / 45);
    shooter.jumpVy = sin(jumpAngle) * (jumpDist / 45);

    let offsets = [[-15, -15], [15, -15], [-15, 15], [15, 15]];
    for (let off of offsets) {
      bombs.push({
        x: shooter.x + off[0], y: shooter.y + off[1],
        ticks: 60, damage: 1800, owner: shooter.id,
      });
    }
    shooter.cooldown = shooter.maxCooldown;
    return;
  }

  if (shooter.brawler === "Edgar" && isSuper) {
    let jumpAngle = angle;
    shooter.jumpTicks = 45;
    let jumpDist = target.isInvisible ? 300 : Math.min(400, dist(shooter.x, shooter.y, target.x, target.y));
    shooter.jumpVx = cos(jumpAngle) * (jumpDist / 45);
    shooter.jumpVy = sin(jumpAngle) * (jumpDist / 45);
    shooter.cooldown = shooter.maxCooldown;
    return;
  }

  if (shooter.brawler === "Mortis") {
    if (isSuper) {
      projectiles.push({
        x: shooter.x, y: shooter.y, startX: shooter.x, startY: shooter.y,
        maxRange: BRAWLER_STATS["Mortis"].range * 2, brawlerName: shooter.brawler,
        vx: cos(angle) * 15, vy: sin(angle) * 15, damage: 1800,
        owner: shooter.id, ignoresWalls: true, isSuper: true, active: true,
      });
      shooter.cooldown = shooter.maxCooldown;
    } else {
      shooter.dashTicks = 12; 
      let dashSpeed = BRAWLER_STATS["Mortis"].range / 12; 
      shooter.dashVx = cos(angle) * dashSpeed;
      shooter.dashVy = sin(angle) * dashSpeed;
      shooter.hasDamagedInDash = false; 
      shooter.cooldown = shooter.maxCooldown;
    }
    return; 
  }

  if (shooter.brawler === "Frank") {
    let hpRatio = Math.max(0.1, shooter.hp / shooter.maxHp);
    shooter.attackWindup = floor(10 + 40 * hpRatio); 
    shooter.windupAngle = angle;
    shooter.windupIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown + shooter.attackWindup; 
    return; 
  }

  if (shooter.brawler === "Leon") {
    let projCount = BRAWLER_STATS["Leon"].projectiles;
    if (isSuper) projCount *= 2;
    shooter.leonShots = projCount;
    shooter.leonTimer = 0; 
    shooter.leonAngle = angle;
    shooter.leonIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }

  if (shooter.brawler === "Edgar" && !isSuper) {
    shooter.edgarShots = BRAWLER_STATS["Edgar"].projectiles;
    shooter.edgarTimer = 0;
    shooter.edgarAngle = angle;
    shooter.cooldown = shooter.maxCooldown;
    return;
  }

  if (shooter.brawler === "Colt") {
    let projCount = isSuper ? BRAWLER_STATS["Colt"].superProjectiles : BRAWLER_STATS["Colt"].projectiles;
    shooter.coltShots = projCount;
    shooter.coltTimer = 0; 
    shooter.coltAngle = angle;
    shooter.coltIsSuper = isSuper;
    shooter.cooldown = shooter.maxCooldown;
    return; 
  }

  let ignoresWalls = ["Doug", "Dynamike", "Barley"].includes(shooter.brawler);
  let projCount = isSuper ? BRAWLER_STATS[shooter.brawler].superProjectiles : BRAWLER_STATS[shooter.brawler].projectiles;

  for (let i = 0; i < projCount; i++) {
    let finalAngle = angle;
    let speed = 12;
    let spawnX = shooter.x;
    let spawnY = shooter.y;

    if (projCount > 1) {
      if (shooter.brawler === "Dynamike" && !isSuper) {
        let perpAngle = angle + PI / 2; 
        let offset = i === 0 ? -12 : 12; 
        spawnX += cos(perpAngle) * offset;
        spawnY += sin(perpAngle) * offset;
      } else {
        let spreadAmount = isSuper ? 1.0 : 0.5; 
        let startAngle = angle - spreadAmount / 2; 
        let angleStep = spreadAmount / (projCount - 1); 
        finalAngle = startAngle + i * angleStep; 
      }
    }

    projectiles.push({
      x: spawnX, y: spawnY, startX: spawnX, startY: spawnY,
      maxRange: BRAWLER_STATS[shooter.brawler].range, brawlerName: shooter.brawler,
      vx: cos(finalAngle) * speed, vy: sin(finalAngle) * speed,
      damage: shooter.damage, owner: shooter.id, ignoresWalls: ignoresWalls,
      isSuper: isSuper, active: true, 
    });
  }
  shooter.cooldown = shooter.maxCooldown;
}

function executeFrankSmash(frank, enemy) {
  let range = frank.windupIsSuper ? BRAWLER_STATS["Frank"].superRange : BRAWLER_STATS["Frank"].range;
  let spreadAngle = PI / 3; 

  smashEffects.push({
    x: frank.x, y: frank.y, angle: frank.windupAngle, range: range, spread: spreadAngle,
    life: 15, isSuper: frank.windupIsSuper,
  });

  let distToEnemy = dist(frank.x, frank.y, enemy.x, enemy.y);
  let eRad = enemy.r / 2;

  if (distToEnemy - eRad <= range) {
    let angleToEnemy = atan2(enemy.y - frank.y, enemy.x - frank.x);
    let diff = angleToEnemy - frank.windupAngle;
    while (diff > PI) diff -= TWO_PI;
    while (diff < -PI) diff += TWO_PI;

    if (abs(diff) <= spreadAngle / 2) {
      // Check Line of Sight if it's a normal attack (Super pierces walls)
      let canHit = true;
      if (!frank.windupIsSuper) {
        canHit = checkLineOfSight(frank.x, frank.y, enemy.x, enemy.y);
      }

      if (canHit) {
        enemy.hp -= frank.damage;
        if (frank.id === "blue") blueTotalDamage += frank.damage;
        else redTotalDamage += frank.damage;
        frank.hits++;
        frank.lastCombatTime = frameCount;
        enemy.lastCombatTime = frameCount;
        if (frank.windupIsSuper) {
          enemy.stunTicks = floor(2.48 * 60); 
        }
      }
    }
  }

  if (frank.windupIsSuper) {
    for (let i = walls.length - 1; i >= 0; i--) {
      let w = walls[i];
      
      // Test multiple points on the wall to ensure reliable breaking (corners, center, and closest edge)
      let cx = constrain(frank.x, w.x, w.x + w.w); 
      let cy = constrain(frank.y, w.y, w.y + w.h);
      
      let testPoints = [
        {x: w.x, y: w.y}, 
        {x: w.x + w.w, y: w.y}, 
        {x: w.x, y: w.y + w.h}, 
        {x: w.x + w.w, y: w.y + w.h}, 
        {x: w.x + w.w / 2, y: w.y + w.h / 2}, 
        {x: cx, y: cy} 
      ];

      let hitWall = false;
      for (let pt of testPoints) {
        if (dist(frank.x, frank.y, pt.x, pt.y) <= range) {
          let angleToPt = atan2(pt.y - frank.y, pt.x - frank.x);
          let diff = angleToPt - frank.windupAngle;
          while (diff > PI) diff -= TWO_PI;
          while (diff < -PI) diff += TWO_PI;

          if (abs(diff) <= spreadAngle / 2) {
            hitWall = true;
            break; // Break the inner loop, we found a hit!
          }
        }
      }

      if (hitWall) {
        walls.splice(i, 1); 
      }
    }
  }
}

function fireLeonBlade(leon) {
  let totalShots = BRAWLER_STATS["Leon"].projectiles * (leon.leonIsSuper ? 2 : 1);
  let shotIndex = totalShots - leon.leonShots;
  let angleOffset = -(shotIndex * 0.15);
  let finalAngle = leon.leonAngle + angleOffset;

  projectiles.push({
    x: leon.x, y: leon.y, startX: leon.x, startY: leon.y,
    maxRange: BRAWLER_STATS["Leon"].range, brawlerName: "Leon",
    vx: cos(finalAngle) * 12, vy: sin(finalAngle) * 12, damage: leon.damage,
    owner: leon.id, ignoresWalls: false, isSuper: leon.leonIsSuper, active: true,
  });
}

function fireEdgarPunch(edgar) {
  projectiles.push({
    x: edgar.x, y: edgar.y, startX: edgar.x, startY: edgar.y,
    maxRange: BRAWLER_STATS["Edgar"].range, brawlerName: "Edgar",
    vx: cos(edgar.edgarAngle) * 12, vy: sin(edgar.edgarAngle) * 12,
    damage: edgar.damage, owner: edgar.id, ignoresWalls: false, isSuper: false, active: true,
  });
}

function fireColtBullet(colt) {
  let totalShots = colt.coltIsSuper ? BRAWLER_STATS["Colt"].superProjectiles : BRAWLER_STATS["Colt"].projectiles;
  let shotIndex = totalShots - colt.coltShots;
  
  let sideOffset = (shotIndex % 2 === 0) ? -12 : 12; // Alternate left and right pistol spacing
  let perpAngle = colt.coltAngle + PI / 2;
  let spawnX = colt.x + cos(perpAngle) * sideOffset;
  let spawnY = colt.y + sin(perpAngle) * sideOffset;
  
  projectiles.push({
    x: spawnX, y: spawnY, startX: spawnX, startY: spawnY,
    maxRange: BRAWLER_STATS["Colt"].range, brawlerName: "Colt",
    vx: cos(colt.coltAngle) * 14, vy: sin(colt.coltAngle) * 14, // Slightly slower constant speed
    damage: colt.damage, owner: colt.id, ignoresWalls: colt.coltIsSuper, isSuper: colt.coltIsSuper, active: true,
  });
}

function drawWeapon(player, angle) {
  push();
  translate(player.x, player.y);
  rotate(angle);

  switch (player.brawler) {
    case "Shelly":
      let wImg = brawlerImages["ShellyWeapon"];
      if (wImg && wImg.width > 10 && wImg.height > 10) {
        let aspect = wImg.width / wImg.height;
        let drawH = 25;
        let drawW = drawH * aspect;
        push();
        translate(20, 0); 
        scale(-1, 1);
        if (cos(angle) < 0) {
          scale(1, -1);
        }
        imageMode(CENTER);
        image(wImg, 0, 0, drawW, drawH);
        pop();
      } else {
        fill(100);
        rect(15, -4, 35, 8); 
        fill("#8B4513");
        rect(5, -4, 15, 10); 
      }
      break;
    case "Colt":
      fill(100);
      rect(15, -12, 15, 6); 
      rect(15, 6, 15, 6); 
      break;
    case "Leon":
      fill("yellow");
      rect(20, -2, 10, 4);
      rect(23, -5, 4, 10);
      break;
    case "Piper":
      stroke("#00a8ff");
      strokeWeight(4);
      line(10, 0, 40, 0);
      fill("#00a8ff");
      noStroke();
      arc(40, 0, 20, 20, -PI / 2, PI / 2);
      break;
    case "Mortis":
      fill("#8B4513");
      rect(10, -3, 30, 6);
      fill(150);
      rect(40, -10, 10, 20);
      break;
    case "Dynamike":
      fill("red");
      rect(15, -12, 15, 8);
      rect(15, 4, 15, 8);
      fill("white");
      rect(30, -10, 4, 4);
      rect(30, 6, 4, 4);
      break;
    case "Frank":
      if (player.attackWindup > 0) {
        rotate(-PI / 4); 
      }
      fill("#8B4513");
      rect(10, -5, 40, 10);
      fill(100);
      rect(45, -20, 25, 40);
      break;
    case "Edgar":
      stroke(0);
      strokeWeight(6);
      line(0, -15, -20, -25);
      stroke("white");
      strokeWeight(3);
      line(0, -15, -20, -25);

      stroke(0);
      strokeWeight(6);
      line(0, 15, -20, 25);
      stroke("white");
      strokeWeight(3);
      line(0, 15, -20, 25);
      noStroke();
      break;
    case "Doug":
      fill("#d4af37");
      rect(15, -8, 20, 16, 5); 
      fill("red");
      rect(35, -2, 6, 4);
      break;
    case "Barley":
      fill("green");
      rect(20, -6, 12, 12, 4);
      rect(32, -3, 8, 6);
      fill("orange");
      rect(40, -4, 6, 8);
      break;
  }
  pop();
}

function draw() {
  if (gameState === "LOBBY") {
    drawLobby();
  } else if (gameState === "GAME") {
    drawGame();
  }
}

function drawLobby() {
  drawBackground(); 
  
  if (showLobbyTitle) {
    push();
    fill("#ff2e43"); 
    stroke("#000000");
    strokeWeight(8);
    textAlign(CENTER, TOP);
    textSize(80);
    text("BrawlTards", width / 2, 40);
    pop();
  }

  for (let player of players) {
    player.update();
    player.draw();
  }
  for (let btn of buttons) {
    btn.update(mouseX, mouseY);
    btn.draw();
  }
  
  if (controllerSwitch) {
    controllerSwitch.update(mouseX, mouseY);
    controllerSwitch.draw();
  }

  drawMenus();

  push();
  fill(0, 0, 0, 150); 
  rectMode(CORNER);
  rect(20, 20, 280, 80, 10); 

  fill("#f1c40f"); 
  textSize(30);
  textAlign(LEFT, TOP);
  text(`P1 WINS: ${blueTotalWins}`, 30, 30);
  fill(255); 
  textSize(20);
  text(`TOTAL DMG: ${Math.floor(blueTotalDamage)}`, 30, 65);

  fill(0, 0, 0, 150); 
  rectMode(CORNER);
  rect(width - 300, 20, 280, 80, 10); 

  fill("#f1c40f");
  textSize(30);
  textAlign(RIGHT, TOP);
  text(`P2 WINS: ${redTotalWins}`, width - 30, 30);
  fill(255);
  textSize(20);
  text(`TOTAL DMG: ${Math.floor(redTotalDamage)}`, width - 30, 65);
  pop();
}

function drawGame() {
  background("#e6cc98"); 

  let playersArray = [
    [bluePlayer, redPlayer],
    [redPlayer, bluePlayer],
  ];
  
  for (let [p, enemy] of playersArray) {
    if (p.stunTicks > 0) {
      p.attackWindup = 0; 
      p.leonShots = 0; 
      p.edgarShots = 0;
      p.coltShots = 0;
    } else {
      if (p.attackWindup > 0) {
        p.attackWindup--;
        if (p.attackWindup === 0) executeFrankSmash(p, enemy);
      }
      if (p.leonShots > 0) {
        if (p.leonTimer <= 0) {
          fireLeonBlade(p);
          p.leonShots--; 
          p.leonTimer = 6; 
        } else {
          p.leonTimer--;
        }
      }
      if (p.edgarShots > 0) {
        if (p.edgarTimer <= 0) {
          fireEdgarPunch(p);
          p.edgarShots--;
          p.edgarTimer = 4; 
        } else {
          p.edgarTimer--;
        }
      }
      if (p.coltShots > 0) {
        if (p.coltTimer <= 0) {
          fireColtBullet(p);
          p.coltShots--;
          p.coltTimer = 3; // Ultra-fast burst delay between shots
        } else {
          p.coltTimer--;
        }
      }
    }
  }

  if (bluePlayer.cooldown > 0) bluePlayer.cooldown--;
  if (redPlayer.cooldown > 0) redPlayer.cooldown--;

  for (let p of [bluePlayer, redPlayer]) {
    if (p.ammo < 3) {
      p.reloadTimer++;
      if (p.reloadTimer >= BRAWLER_STATS[p.brawler].reloadTime) {
        p.ammo++; 
        p.reloadTimer = 0; 
      }
    } else {
      p.reloadTimer = 0; 
    }
  }

  if (frameCount - bluePlayer.lastCombatTime > 180 && bluePlayer.hp > 0 && bluePlayer.hp < bluePlayer.maxHp) {
    bluePlayer.hp = min(bluePlayer.maxHp, bluePlayer.hp + bluePlayer.maxHp * 0.002);
  }
  if (frameCount - redPlayer.lastCombatTime > 180 && redPlayer.hp > 0 && redPlayer.hp < redPlayer.maxHp) {
    redPlayer.hp = min(redPlayer.maxHp, redPlayer.hp + redPlayer.maxHp * 0.002);
  }

  if (bluePlayer.invisTicks > 0) {
    bluePlayer.invisTicks--;
    if (bluePlayer.invisTicks <= 0) bluePlayer.isInvisible = false;
  }
  if (redPlayer.invisTicks > 0) {
    redPlayer.invisTicks--;
    if (redPlayer.invisTicks <= 0) redPlayer.isInvisible = false;
  }

  let bRad = bluePlayer.r / 2;
  let rRad = redPlayer.r / 2;
  let nextX, nextY; 

  if (bluePlayer.stunTicks > 0) {
    bluePlayer.stunTicks--;
    if (!bluePlayer.isInvisible) {
      fill("yellow");
      textAlign(CENTER, CENTER);
      textSize(20);
      text("★", bluePlayer.x, bluePlayer.y - bluePlayer.r - 20);
    }
  } else if (bluePlayer.attackWindup > 0) {
  } else if (bluePlayer.jumpTicks > 0) {
    bluePlayer.jumpTicks--;
    bluePlayer.x += bluePlayer.jumpVx;
    bluePlayer.y += bluePlayer.jumpVy;
    if (bluePlayer.jumpTicks === 0) resolveWallStuck(bluePlayer);
  } else if (bluePlayer.dashTicks > 0) {
    bluePlayer.dashTicks--;
    nextX = bluePlayer.x + bluePlayer.dashVx;
    nextY = bluePlayer.y + bluePlayer.dashVy;
    if (!checkWallCollision(nextX, bluePlayer.y, bRad)) bluePlayer.x = nextX;
    if (!checkWallCollision(bluePlayer.x, nextY, bRad)) bluePlayer.y = nextY;

    if (!bluePlayer.hasDamagedInDash && dist(bluePlayer.x, bluePlayer.y, redPlayer.x, redPlayer.y) < bRad + rRad + 20) {
      redPlayer.hp -= bluePlayer.damage;
      blueTotalDamage += bluePlayer.damage;
      redPlayer.lastCombatTime = frameCount;
      bluePlayer.lastCombatTime = frameCount;
      bluePlayer.hits++;
      bluePlayer.hasDamagedInDash = true; 
    }
  } else {
    nextY = bluePlayer.y;
    nextX = bluePlayer.x;

    let gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    
    if (useControllers && gamepads[0]) {
      let gp = gamepads[0];
      if (Math.abs(gp.axes[3]) > 0.2) nextY += gp.axes[3] * bluePlayer.speed;
      if (Math.abs(gp.axes[2]) > 0.2) nextX += gp.axes[2] * bluePlayer.speed;
    } else {
      if (keyIsDown(87)) nextY -= bluePlayer.speed; 
      if (keyIsDown(83)) nextY += bluePlayer.speed; 
      if (keyIsDown(65)) nextX -= bluePlayer.speed; 
      if (keyIsDown(68)) nextX += bluePlayer.speed; 
    }

    if (!checkWallCollision(bluePlayer.x, nextY, bRad)) bluePlayer.y = nextY;
    if (!checkWallCollision(nextX, bluePlayer.y, bRad)) bluePlayer.x = nextX;
  }

  if (redPlayer.stunTicks > 0) {
    redPlayer.stunTicks--;
    if (!redPlayer.isInvisible) {
      fill("yellow");
      textAlign(CENTER, CENTER);
      textSize(20);
      text("★", redPlayer.x, redPlayer.y - redPlayer.r - 20);
    }
  } else if (redPlayer.attackWindup > 0) {
  } else if (redPlayer.jumpTicks > 0) {
    redPlayer.jumpTicks--;
    redPlayer.x += redPlayer.jumpVx;
    redPlayer.y += redPlayer.jumpVy;
    if (redPlayer.jumpTicks === 0) resolveWallStuck(redPlayer);
  } else if (redPlayer.dashTicks > 0) {
    redPlayer.dashTicks--;
    nextX = redPlayer.x + redPlayer.dashVx;
    nextY = redPlayer.y + redPlayer.dashVy;
    if (!checkWallCollision(nextX, redPlayer.y, rRad)) redPlayer.x = nextX;
    if (!checkWallCollision(redPlayer.x, nextY, rRad)) redPlayer.y = nextY;

    if (!redPlayer.hasDamagedInDash && dist(redPlayer.x, redPlayer.y, bluePlayer.x, bluePlayer.y) < bRad + rRad + 20) {
      bluePlayer.hp -= redPlayer.damage;
      redTotalDamage += redPlayer.damage;
      bluePlayer.lastCombatTime = frameCount;
      redPlayer.lastCombatTime = frameCount;
      redPlayer.hits++;
      redPlayer.hasDamagedInDash = true;
    }
  } else {
    nextY = redPlayer.y;
    nextX = redPlayer.x;

    let gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

    if (useControllers && gamepads[1]) {
      let gp = gamepads[1];
      if (Math.abs(gp.axes[3]) > 0.2) nextY += gp.axes[3] * redPlayer.speed;
      if (Math.abs(gp.axes[2]) > 0.2) nextX += gp.axes[2] * redPlayer.speed;
    } else {
      if (keyIsDown(UP_ARROW)) nextY -= redPlayer.speed;
      if (keyIsDown(DOWN_ARROW)) nextY += redPlayer.speed;
      if (keyIsDown(LEFT_ARROW)) nextX -= redPlayer.speed;
      if (keyIsDown(RIGHT_ARROW)) nextX += redPlayer.speed;
    }

    if (!checkWallCollision(redPlayer.x, nextY, rRad)) redPlayer.y = nextY;
    if (!checkWallCollision(nextX, redPlayer.y, rRad)) redPlayer.x = nextX;
  }

  bluePlayer.x = constrain(bluePlayer.x, bRad, width - bRad);
  bluePlayer.y = constrain(bluePlayer.y, bRad, height - bRad);
  redPlayer.x = constrain(redPlayer.x, rRad, width - rRad);
  redPlayer.y = constrain(redPlayer.y, rRad, height - rRad);

  let gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

  if (useControllers && gamepads[0]) {
    let gp = gamepads[0];
    let isAiming = Math.abs(gp.axes[0]) > 0.2 || Math.abs(gp.axes[1]) > 0.2;
    let aimAngle = isAiming ? atan2(gp.axes[1], gp.axes[0]) : null;
    
    if (gp.buttons[7].pressed || gp.buttons[7].value > 0.5) shootProjectile(bluePlayer, redPlayer, false, aimAngle);
    if (gp.buttons[6].pressed || gp.buttons[6].value > 0.5) shootProjectile(bluePlayer, redPlayer, true, aimAngle);
  } else {
    if (keyIsDown(69)) shootProjectile(bluePlayer, redPlayer, false); 
    if (keyIsDown(81)) shootProjectile(bluePlayer, redPlayer, true);  
  }

  if (useControllers && gamepads[1]) {
    let gp = gamepads[1];
    let isAiming = Math.abs(gp.axes[0]) > 0.2 || Math.abs(gp.axes[1]) > 0.2;
    let aimAngle = isAiming ? atan2(gp.axes[1], gp.axes[0]) : null;
    
    if (gp.buttons[7].pressed || gp.buttons[7].value > 0.5) shootProjectile(redPlayer, bluePlayer, false, aimAngle);
    if (gp.buttons[6].pressed || gp.buttons[6].value > 0.5) shootProjectile(redPlayer, bluePlayer, true, aimAngle);
  } else {
    if (keyIsDown(16)) shootProjectile(redPlayer, bluePlayer, false); 
    if (keyIsDown(191)) shootProjectile(redPlayer, bluePlayer, true); 
  }

  for (let i = smashEffects.length - 1; i >= 0; i--) {
    let fx = smashEffects[i];
    fx.life--;
    push();
    translate(fx.x, fx.y);
    rotate(fx.angle);
    fill(fx.isSuper ? color(241, 196, 15, fx.life * 15) : color(255, 50, 50, fx.life * 15));
    noStroke();
    beginShape();
    vertex(0, 0);
    let hs = fx.spread / 2;
    vertex(cos(-hs) * fx.range, sin(-hs) * fx.range);
    vertex(cos(hs) * fx.range, sin(hs) * fx.range);
    endShape(CLOSE);
    pop();
    if (fx.life <= 0) smashEffects.splice(i, 1);
  }

  stroke("#c79f58");
  strokeWeight(4);
  fill("#b88b44"); 
  rectMode(CORNER);
  for (let w of walls) {
    rect(w.x, w.y, w.w, w.h, 10);
  }

  for (let i = bombs.length - 1; i >= 0; i--) {
    let b = bombs[i];
    b.ticks--; 

    if (b.isDynamike) {
      push();
      fill(b.radius > 50 ? "#8B4513" : "red"); 
      rectMode(CENTER);
      if (b.radius > 50) rect(b.x, b.y, 20, 24, 3);
      else rect(b.x, b.y, 10, 20, 2);
      
      if (b.ticks % 10 < 5) {
        fill("yellow");
        circle(b.x, b.y - 10, 6);
      }
      pop();
    } else {
      fill(0);
      noStroke();
      circle(b.x, b.y, 14);
      if (b.ticks % 10 < 5) {
        fill("red");
        circle(b.x, b.y, 8);
      }
    }

    if (b.ticks <= 0) {
      fill(255, 100, 0, 150);
      let r = b.radius || 40; 
      circle(b.x, b.y, r * 2);

      let breaksWalls = (b.isDynamike && b.radius > 50) || !b.isDynamike; 
      if (breaksWalls) {
        for (let j = walls.length - 1; j >= 0; j--) {
          let w = walls[j];
          let testX = b.x;
          let testY = b.y;
          if (b.x < w.x) testX = w.x;
          else if (b.x > w.x + w.w) testX = w.x + w.w;
          if (b.y < w.y) testY = w.y;
          else if (b.y > w.y + w.h) testY = w.y + w.h;

          let distance = dist(b.x, b.y, testX, testY);
          if (distance <= r) {
            walls.splice(j, 1); 
          }
        }
      }

      if (b.owner !== "blue" && dist(b.x, b.y, bluePlayer.x, bluePlayer.y) < bRad + r) {
        bluePlayer.hp -= b.damage;
        redTotalDamage += b.damage;
        redPlayer.hits++;
        bluePlayer.lastCombatTime = frameCount;
      }
      if (b.owner !== "red" && dist(b.x, b.y, redPlayer.x, redPlayer.y) < rRad + r) {
        redPlayer.hp -= b.damage;
        blueTotalDamage += b.damage;
        bluePlayer.hits++;
        redPlayer.lastCombatTime = frameCount;
      }
      bombs.splice(i, 1); 
    }
  }

  for (let i = dougSplashes.length - 1; i >= 0; i--) {
    let ds = dougSplashes[i];
    ds.life--;
    push();
    fill(255, 105, 180, ds.life * 15); 
    noStroke();
    circle(ds.x, ds.y, ds.radius);
    pop();
    if (ds.life <= 0) dougSplashes.splice(i, 1);
  }

  for (let i = puddles.length - 1; i >= 0; i--) {
    let pd = puddles[i];
    pd.ticks--;

    push();
    fill(255, 140, 0, 120); 
    noStroke();
    circle(pd.x, pd.y, pd.radius * 2);
    pop();

    if (pd.ticks % 30 === 0) {
      if (pd.owner !== "blue" && dist(pd.x, pd.y, bluePlayer.x, bluePlayer.y) < pd.radius + bRad) {
        bluePlayer.hp -= pd.damage;
        redTotalDamage += pd.damage;
        bluePlayer.lastCombatTime = frameCount;
        redPlayer.hits++;
      }
      if (pd.owner !== "red" && dist(pd.x, pd.y, redPlayer.x, redPlayer.y) < pd.radius + rRad) {
        redPlayer.hp -= pd.damage;
        blueTotalDamage += pd.damage;
        redPlayer.lastCombatTime = frameCount;
        bluePlayer.hits++;
      }
    }
    if (pd.ticks <= 0) puddles.splice(i, 1);
  }

  for (let i = projectiles.length - 1; i >= 0; i--) {
    let p = projectiles[i];
    
    p.x += p.vx;
    p.y += p.vy;

    let travelDist = dist(p.startX, p.startY, p.x, p.y);
    if (travelDist > p.maxRange) {
      p.active = false;
    }

    if (p.isSuper && (p.brawlerName === "Colt" || p.brawlerName === "Shelly")) {
      for (let j = walls.length - 1; j >= 0; j--) {
        let w = walls[j];
        if (p.x >= w.x && p.x <= w.x + w.w && p.y >= w.y && p.y <= w.y + w.h) {
          walls.splice(j, 1); 
        }
      }
    }

    noStroke();
    if (p.brawlerName === "Dynamike") {
      push();
      fill(p.isSuper ? "#8B4513" : "red");
      translate(p.x, p.y);
      rotate(frameCount * 0.2); 
      rectMode(CENTER);
      if (p.isSuper) rect(0, 0, 20, 24, 3);
      else rect(0, 0, 8, 16, 2);
      pop();
    } else if (p.isSuper) {
      if (p.brawlerName === "Mortis") {
        fill("#8e44ad");
        push();
        translate(p.x, p.y);
        rotate(atan2(p.vy, p.vx)); 
        ellipse(0, 0, 15, 40);
        pop();
      } else {
        fill("#f1c40f"); 
        circle(p.x, p.y, 18);
      }
    } else {
      fill(p.owner === "blue" ? "#3498db" : "#e74c3c");
      circle(p.x, p.y, 14);
    }

    if (!p.ignoresWalls && checkProjWallCollision(p.x, p.y)) {
      p.active = false;
    }

    if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
      p.active = false;
    }

    let hitRadius = p.isSuper && p.brawlerName === "Mortis" ? 20 : 7; 
    let hitEnemy = false;

    if (p.owner !== "blue" && dist(p.x, p.y, bluePlayer.x, bluePlayer.y) < bRad + hitRadius) {
      hitEnemy = true;
      if (p.brawlerName !== "Barley" && p.brawlerName !== "Dynamike") {
        let dmg = p.damage;
        if (p.brawlerName === "Piper") {
          dmg *= constrain(travelDist / p.maxRange, 0.3, 1.0);
        }
        bluePlayer.hp -= dmg;
        redTotalDamage += dmg;
        bluePlayer.lastCombatTime = frameCount;
        redPlayer.lastCombatTime = frameCount;
        redPlayer.hits++; 

        if (p.isSuper && p.brawlerName === "Mortis") {
          redPlayer.hp = min(redPlayer.hp + p.damage, redPlayer.maxHp); 
        }
        if (p.brawlerName === "Edgar") {
          redPlayer.hp = min(redPlayer.hp + dmg * 0.5, redPlayer.maxHp); 
        }
      }
    }
    
    if (p.owner !== "red" && dist(p.x, p.y, redPlayer.x, redPlayer.y) < rRad + hitRadius) {
      hitEnemy = true;
      if (p.brawlerName !== "Barley" && p.brawlerName !== "Dynamike") {
        let dmg = p.damage;
        if (p.brawlerName === "Piper") {
          dmg *= constrain(travelDist / p.maxRange, 0.3, 1.0);
        }
        redPlayer.hp -= dmg;
        blueTotalDamage += dmg;
        redPlayer.lastCombatTime = frameCount;
        bluePlayer.lastCombatTime = frameCount;
        bluePlayer.hits++;

        if (p.isSuper && p.brawlerName === "Mortis") {
          bluePlayer.hp = min(bluePlayer.hp + p.damage, bluePlayer.maxHp);
        }
        if (p.brawlerName === "Edgar") {
          bluePlayer.hp = min(bluePlayer.hp + dmg * 0.5, bluePlayer.maxHp);
        }
      }
    }

    if (hitEnemy) {
      p.active = false;
      p.hitEnemy = true;
    }

    if (!p.active) {
      if (p.brawlerName === "Barley") {
        puddles.push({
          x: p.x, y: p.y, radius: 45, damage: p.damage / 2, ticks: 180, owner: p.owner,
        });
      } else if (p.brawlerName === "Dynamike") {
        let blastRadius = p.isSuper ? 90 : 45;
        let dmg = p.isSuper ? 4400 : 1600;
        let fuse = p.hitEnemy ? 0 : 30; 
        bombs.push({
          x: p.x, y: p.y, ticks: fuse, damage: dmg, owner: p.owner, radius: blastRadius, isDynamike: true,
        });
      }
      projectiles.splice(i, 1); 
    }
  }

  noStroke();

  let blueAngle = atan2(redPlayer.y - bluePlayer.y, redPlayer.x - bluePlayer.x);
  let redAngle = atan2(bluePlayer.y - redPlayer.y, bluePlayer.x - redPlayer.x);

  if (bluePlayer.hp > 0 && !bluePlayer.isInvisible) {
    if (bluePlayer.hits >= BRAWLER_STATS[bluePlayer.brawler].hitsToSuper) {
      noFill();
      stroke("yellow");
      strokeWeight(4);
      circle(bluePlayer.x, bluePlayer.y, bluePlayer.r + 15);
      noStroke();
    }

    fill(0, 0, 0, 50); 
    ellipse(bluePlayer.x, bluePlayer.y + bRad, bluePlayer.r, bRad);
    fill("#3498db"); 
    circle(bluePlayer.x, bluePlayer.y, bluePlayer.r);

    drawWeapon(bluePlayer, blueAngle);

    if (bluePlayer.hotdogTicks > 0) {
      push();
      fill("#d2691e");
      rectMode(CENTER);
      rect(bluePlayer.x, bluePlayer.y - bRad - 5, 24, 10, 5);
      fill("#e74c3c");
      rect(bluePlayer.x, bluePlayer.y - bRad - 5, 28, 6, 5);
      pop();
    }
  }

  if (redPlayer.hp > 0 && !redPlayer.isInvisible) {
    if (redPlayer.hits >= BRAWLER_STATS[redPlayer.brawler].hitsToSuper) {
      noFill();
      stroke("yellow");
      strokeWeight(4);
      circle(redPlayer.x, redPlayer.y, redPlayer.r + 15);
      noStroke();
    }

    fill(0, 0, 0, 50);
    ellipse(redPlayer.x, redPlayer.y + rRad, redPlayer.r, rRad);
    fill("#e74c3c");
    circle(redPlayer.x, redPlayer.y, redPlayer.r);

    drawWeapon(redPlayer, redAngle);

    if (redPlayer.hotdogTicks > 0) {
      push();
      fill("#d2691e");
      rectMode(CENTER);
      rect(redPlayer.x, redPlayer.y - rRad - 5, 24, 10, 5);
      fill("#e74c3c");
      rect(redPlayer.x, redPlayer.y - rRad - 5, 28, 6, 5);
      pop();
    }
  }

  let barW = 60; 
  let barH = 10;
  rectMode(CENTER);

  if (bluePlayer.hp > 0 && !bluePlayer.isInvisible) {
    fill(0); 
    rectMode(CENTER);
    rect(bluePlayer.x, bluePlayer.y - bluePlayer.r - 10, barW + 4, barH + 4, 4);
    fill("#2ecc71"); 
    
    let hpPctB = max(0, bluePlayer.hp / bluePlayer.maxHp);
    rectMode(CORNER);
    rect(
      bluePlayer.x - barW / 2,
      bluePlayer.y - bluePlayer.r - 10 - barH / 2,
      barW * hpPctB,
      barH,
      2
    );
    
    fill(255);
    textSize(10);
    textAlign(CENTER, CENTER);
    text(Math.floor(bluePlayer.hp), bluePlayer.x, bluePlayer.y - bluePlayer.r - 10);

    let ammoY = bluePlayer.y - bluePlayer.r + 2;
    fill(0);
    rectMode(CENTER);
    rect(bluePlayer.x, ammoY, barW + 4, 6, 2);
    rectMode(CORNER);
    let segW = barW / 3; 
    for (let i = 0; i < 3; i++) {
      if (i < bluePlayer.ammo) {
        fill("#f39c12"); 
        rect(bluePlayer.x - barW / 2 + i * segW + 1, ammoY - 2, segW - 2, 4, 1);
      } else if (i === bluePlayer.ammo) {
        fill(255, 165, 0, 100); 
        let reloadPct = bluePlayer.reloadTimer / BRAWLER_STATS[bluePlayer.brawler].reloadTime;
        rect(
          bluePlayer.x - barW / 2 + i * segW + 1,
          ammoY - 2,
          (segW - 2) * reloadPct,
          4,
          1
        );
      }
    }
  }

  if (redPlayer.hp > 0 && !redPlayer.isInvisible) {
    fill(0);
    rectMode(CENTER);
    rect(redPlayer.x, redPlayer.y - redPlayer.r - 10, barW + 4, barH + 4, 4);
    fill("#2ecc71");
    let hpPctR = max(0, redPlayer.hp / redPlayer.maxHp);
    rectMode(CORNER);
    rect(
      redPlayer.x - barW / 2,
      redPlayer.y - redPlayer.r - 10 - barH / 2,
      barW * hpPctR,
      barH,
      2
    );
    fill(255);
    textSize(10);
    textAlign(CENTER, CENTER);
    text(Math.floor(redPlayer.hp), redPlayer.x, redPlayer.y - redPlayer.r - 10);

    let ammoY = redPlayer.y - redPlayer.r + 2;
    fill(0);
    rectMode(CENTER);
    rect(redPlayer.x, ammoY, barW + 4, 6, 2);
    rectMode(CORNER);
    let segW = barW / 3;
    for (let i = 0; i < 3; i++) {
      if (i < redPlayer.ammo) {
        fill("#f39c12");
        rect(redPlayer.x - barW / 2 + i * segW + 1, ammoY - 2, segW - 2, 4, 1);
      } else if (i === redPlayer.ammo) {
        fill(255, 165, 0, 100);
        let reloadPct = redPlayer.reloadTimer / BRAWLER_STATS[redPlayer.brawler].reloadTime;
        rect(
          redPlayer.x - barW / 2 + i * segW + 1,
          ammoY - 2,
          (segW - 2) * reloadPct,
          4,
          1
        );
      }
    }
  }

  rectMode(CORNER);

  fill(0, 150);
  rect(20, height - 100, 360, 80, 10);
  fill(255);
  textAlign(LEFT, TOP);
  textSize(20);

  let bProj = BRAWLER_STATS[bluePlayer.brawler].projectiles;
  let bDmgText = bProj > 1 ? `${bluePlayer.damage} (x${bProj})` : bluePlayer.damage;
  text(`${bluePlayer.brawler} - ATK: ${bDmgText}`, 30, height - 90);

  textSize(14);
  fill(200);
  text(`${bluePlayer.superDesc}\nE to Attack | Q to Super`, 30, height - 60);

  fill(0, 150);
  rect(width - 380, height - 100, 360, 80, 10);
  fill(255);
  textAlign(RIGHT, TOP);
  textSize(20);

  let rProj = BRAWLER_STATS[redPlayer.brawler].projectiles;
  let rDmgText = rProj > 1 ? `${redPlayer.damage} (x${rProj})` : redPlayer.damage;
  text(`ATK: ${rDmgText} - ${redPlayer.brawler}`, width - 30, height - 90);

  textSize(14);
  fill(200);
  text(`${redPlayer.superDesc}\nSHIFT to Attack | / to Super`, width - 30, height - 60);

  fill(0, 150);
  noStroke();
  textSize(20);
  textAlign(LEFT, TOP);
  text("ESC = Lobby | Blue: WASD | Red: Arrows", 20, 20);

  push();
  fill(0, 0, 0, 150); 
  rectMode(CORNER);
  rect(10, height - 145, 120, 40, 8); 
  rect(width - 130, height - 145, 120, 40, 8); 
  
  fill("#f1c40f");
  textSize(24);
  textAlign(LEFT, TOP);
  text(`WINS: ${blueWins}`, 20, height - 135);
  textAlign(RIGHT, TOP);
  text(`WINS: ${redWins}`, width - 20, height - 135);
  pop();

  if (bluePlayer.hp <= 0 && bluePlayer.hotdogTicks > 0) {
    bluePlayer.hp = bluePlayer.maxHp;
    bluePlayer.hotdogTicks = 0; 
  }
  if (redPlayer.hp <= 0 && redPlayer.hotdogTicks > 0) {
    redPlayer.hp = redPlayer.maxHp;
    redPlayer.hotdogTicks = 0;
  }

  let roundOver = false;
  if (bluePlayer.hp <= 0 && redPlayer.hp <= 0) {
    roundOver = true; 
  } else if (bluePlayer.hp <= 0) {
    redWins++; 
    roundOver = true;
  } else if (redPlayer.hp <= 0) {
    blueWins++; 
    roundOver = true;
  }

  if (roundOver) {
    if (blueWins >= 2 || redWins >= 2) {
      if (blueWins === redWins) lastWinner = "tie";
      else if (blueWins > redWins) { lastWinner = "blue"; blueTotalWins++; }
      else { lastWinner = "red"; redTotalWins++; }

      gameState = "LOBBY"; 
      gameMusic.pause();
      lobbyMusic.play().catch((e) => {}); 
    } else {
      startNextRound();
    }
  }
}

function renderStaticBackground() {
  bgGraphics.background("#1a2a6c");
  let center_x = bgGraphics.width / 2;
  let center_y = bgGraphics.height / 2;

  bgGraphics.noFill();
  for (let r = max(bgGraphics.width, bgGraphics.height); r > 0; r -= 15) {
    let inter = map(r, 0, max(bgGraphics.width, bgGraphics.height), 0, 1);
    let c = lerpColor(color("#11998e"), color("#38ef7d"), inter); 
    bgGraphics.stroke(c);
    bgGraphics.strokeWeight(16);
    bgGraphics.ellipse(center_x, center_y, r, r * 0.8);
  }

  bgGraphics.fill(0, 0, 0, 80);
  bgGraphics.noStroke();
  bgGraphics.ellipse(
    bgGraphics.width / 2,
    bgGraphics.height / 2 + 120,
    400,
    100
  );
}

function drawBackground() {
  if (bgGraphics && bgGraphics.width > 0 && bgGraphics.height > 0) {
    imageMode(CORNER);
    image(bgGraphics, 0, 0);
  } else {
    background("#1a2a6c"); 
  }
}

function drawMenus() {
  let menuItems = ["<- BACK"].concat(brawlerList); 
  let itemHeight = height / menuItems.length; 

  if (leftMenuOpen) {
    fill(0, 0, 0, 230); 
    rectMode(CORNER);
    rect(0, 0, width / 2, height);
    
    for (let i = 0; i < menuItems.length; i++) {
      let y = i * itemHeight;
      if (mouseX > 0 && mouseX < width / 2 && mouseY > y && mouseY < y + itemHeight) {
        fill(255, 255, 255, 40); 
        rect(0, y, width / 2, itemHeight);
      }
      stroke(255, 255, 255, 50);
      strokeWeight(1);
      line(0, y + itemHeight, width / 2, y + itemHeight); 
      
      if (i === 0) fill(255, 100, 100); 
      else fill(255);
      
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(min(itemHeight * 0.4, 40));
      text(menuItems[i], width / 4, y + itemHeight / 2 - 5);
    }
  }

  if (rightMenuOpen) {
    fill(0, 0, 0, 230);
    rectMode(CORNER);
    rect(width / 2, 0, width / 2, height);
    for (let i = 0; i < menuItems.length; i++) {
      let y = i * itemHeight;
      if (mouseX > width / 2 && mouseX < width && mouseY > y && mouseY < y + itemHeight) {
        fill(255, 255, 255, 40);
        rect(width / 2, y, width / 2, itemHeight);
      }
      stroke(255, 255, 255, 50);
      strokeWeight(1);
      line(width / 2, y + itemHeight, width, y + itemHeight);
      if (i === 0) fill(255, 100, 100);
      else fill(255);
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(min(itemHeight * 0.4, 40));
      text(menuItems[i], width * 0.75, y + itemHeight / 2 - 5);
    }
  }
}

function mousePressed() {
  if (gameState !== "LOBBY") return; 

  let menuItems = ["<- BACK"].concat(brawlerList);
  let itemHeight = height / menuItems.length;

  if (leftMenuOpen && mouseX < width / 2) {
    let index = floor(mouseY / itemHeight); 
    if (index === 0) {
      leftMenuOpen = false; 
    } else if (index > 0 && index < menuItems.length) {
      players[0].name = menuItems[index]; 
      leftMenuOpen = false;
    }
    return;
  }

  if (rightMenuOpen && mouseX > width / 2) {
    let index = floor(mouseY / itemHeight);
    if (index === 0) {
      rightMenuOpen = false;
    } else if (index > 0 && index < menuItems.length) {
      players[1].name = menuItems[index];
      rightMenuOpen = false;
    }
    return;
  }

  if (controllerSwitch && controllerSwitch.isClicked(mouseX, mouseY)) {
    return; 
  }

  for (let btn of buttons) {
    if (btn.isClicked(mouseX, mouseY)) {
      if (btn.id === "play") {
        gameState = "GAME";
        lobbyMusic.pause(); 
        gameMusic.currentTime = 0; 
        gameMusic.play().catch((e) => {});
        initGame(); 
      } else if (btn.id === "brawlers_left") {
        leftMenuOpen = !leftMenuOpen; 
      } else if (btn.id === "brawlers_right") {
        rightMenuOpen = !rightMenuOpen;
      }
    }
  }
}

function keyPressed() {
  if (keyCode === ESCAPE && gameState === "GAME") {
    gameState = "LOBBY";
    gameMusic.pause();
    lobbyMusic.play().catch((e) => {});
  }
  if ((key === 't' || key === 'T') && gameState === "LOBBY") {
    showLobbyTitle = !showLobbyTitle;
  }
}

function windowResized() {
  if (windowWidth > 0 && windowHeight > 0) {
    resizeCanvas(windowWidth, windowHeight);
    bgGraphics = createGraphics(windowWidth, windowHeight);
    renderStaticBackground();

    if (gameState === "LOBBY") initScene();
    else if (gameState === "GAME") initMap();
  }
}
    </script>
